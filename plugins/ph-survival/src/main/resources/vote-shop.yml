# Benannte Deko-Items (kein Kauf, reine Anzeige)
decorations:
  header:
    slot: 4
    material: NETHER_STAR
    name: "&5&l✦ VoteShop ✦"
    lore:
      - "&7Kaufe tolle Belohnungen"
      - "&7mit deinen &dVoteCoins&7!"
  crate_header:
    slot: 22
    material: ENDER_CHEST
    name: "&d&l✦ Kisten-Schlüssel ✦"
    lore:
      - "&7Öffne exklusive Crate-Truhen"
      - "&7und gewinne seltene Belohnungen!"

# ── Shop-Items ───────────────────────────────────────────────────────────────
items:
  # ── Reihe 1: Grundlegende Items ─────────────────────────────────────────
  claim_slot:
    slot: 10
    material: GRASS_BLOCK
    name: "&a&l★ +1 Claim-Slot"
    cost: 1
    lore:
      - "&7Schalte einen extra Chunk-Claim"
      - "&7dauerhaft frei."
    commands:
      - "claimadd [player] 1"

  extra_home:
    slot: 13
    material: RED_BED
    name: "&e&l★ +1 Home-Slot"
    cost: 1
    lore:
      - "&7Schalte einen extra Home-Slot"
      - "&7dauerhaft frei."
    commands:
      - "homeadd [player] 1"

  villager_egg:
    slot: 16
    material: VILLAGER_SPAWN_EGG
    name: "&b&l★ Villager-Ei"
    cost: 2
    lore:
      - "&7Fange einen Dorfbewohner ein"
      - "&7und bringe ihn in deine Base!"
    commands:
      - "give [player] villager_spawn_egg 1"

  # ── Reihe 3: Crate-Schlüssel ─────────────────────────────────────────────
  eco_crate:
    slot: 28
    material: TRIPWIRE_HOOK
    name: "&6&l✦ Eco-Schlüssel"
    cost: 10
    lore:
      - "&7Öffnet die &6Eco-Truhe&7."
      - "&7Gewinne &f10k – 150k &7Coins!"
    commands:
      - "crate give [player] eco 1"

  claims_crate:
    slot: 31
    material: TRIPWIRE_HOOK
    name: "&a&l✦ Claims-Schlüssel"
    cost: 15
    lore:
      - "&7Öffnet die &aClaims-Truhe&7."
      - "&7Gewinne &f1 – 3 &7extra Claim-Slots!"
    commands:
      - "crate give [player] claims 1"

  spawner_crate:
    slot: 34
    material: TRIPWIRE_HOOK
    name: "&d&l✦ Spawner-Schlüssel"
    cost: 20
    lore:
      - "&7Öffnet die &dSpawner-Truhe&7."
      - "&7Gewinne einen &fzufälligen Spawner&7!"
    commands:
      - "crate give [player] spawner 1"

name: PH-Survival
version: '1.0.0'
main: de.pinkhorizon.survival.PHSurvival
api-version: '1.21'
description: Survival-Plugin fuer Pink Horizon
authors: [ PinkHorizon ]
depend: [ PH-Core ]
softdepend: [ FastAsyncWorldEdit, LuckPerms ]

commands:
  claim:
    description: Chunk beanspruchen
    usage: /claim
  unclaim:
    description: Chunk-Claim entfernen
    usage: /unclaim
  claimlist:
    description: Eigene Claims auflisten
    usage: /claimlist
  balance:
    description: Kontostand anzeigen
    usage: /balance
  pay:
    description: Coins ueberweisen
    usage: /pay <Spieler> <Betrag>
  shop:
    description: Server-Shop oeffnen
    usage: /shop
  baltop:
    description: Top 10 Spieler nach Coins
    usage: /baltop
  eco:
    description: Wirtschaft verwalten (Admin)
    usage: /eco <give|take|set|check> <Spieler> [Betrag]
  sell:
    description: Items verkaufen
    usage: /sell <hand|all>
  sethome:
    description: Home setzen
    usage: /sethome [Name]
  home:
    description: Zu Home teleportieren
    usage: /home [Name]
  delhome:
    description: Home loeschen
    usage: /delhome [Name]
  homes:
    description: Alle Homes anzeigen
    usage: /homes
  back:
    description: Zum letzten Sterbeort
    usage: /back
  spawn:
    description: Zum Spawn teleportieren
    usage: /spawn
  setspawn:
    description: Spawn setzen (Admin)
    usage: /setspawn
  tpa:
    description: Teleportanfrage senden
    usage: /tpa <Spieler>
  tpaccept:
    description: Teleportanfrage annehmen
    usage: /tpaccept
  tpdeny:
    description: Teleportanfrage ablehnen
    usage: /tpdeny
  setwarp:
    description: Warp setzen (Admin)
    usage: /setwarp <Name>
  warp:
    description: Zu Warp teleportieren
    usage: /warp <Name>
  delwarp:
    description: Warp loeschen (Admin)
    usage: /delwarp <Name>
  warps:
    description: Alle Warps anzeigen
    usage: /warps
  srank:
    description: Spielerrang verwalten (Admin)
    usage: /srank <set|info|list>
  trust:
    description: Spieler im eigenen Claim vertrauen
    usage: /trust <Spieler>
  untrust:
    description: Vertrauen entfernen
    usage: /untrust <Spieler>
  trustlist:
    description: Vertrauensliste anzeigen
    usage: /trustlist
  trustall:
    description: Spieler auf allen eigenen Claims vertrauen
    usage: /trustall <Spieler>
  jobs:
    description: Job-System öffnen
    usage: /jobs
  stats:
    description: Spielerstatistiken anzeigen
    usage: /stats [Spieler]
  kit:
    description: Starter-Kit erhalten
    usage: /kit <starter>
  report:
    description: Spieler melden
    usage: /report <Spieler> <Grund>
  rtp:
    description: Zufällig teleportieren
    usage: /rtp
  helpholo:
    description: Hilfe-Hologram setzen/entfernen
    usage: /helpholo [place|remove]
  createshop:
    description: Chest-Shop erstellen
    usage: /createshop <Menge> <Kaufpreis> [Verkaufspreis]
  removeshop:
    description: Chest-Shop entfernen
    usage: /removeshop
  mail:
    description: Nachrichten senden und lesen
    usage: /mail <send|read|clear>
  friend:
    description: Freundesliste verwalten
    usage: /friend <add|remove|accept|deny|list|requests>
  bank:
    description: Bank-Konto verwalten
    usage: /bank [deposit|withdraw] [Betrag]
  achievements:
    description: Achievements anzeigen
    usage: /achievements
  quests:
    description: Tägliche Quests anzeigen
    usage: /quests
  lb:
    description: Leaderboard anzeigen
    usage: /lb [coins|kills|playtime]
  trade:
    description: Mit einem Spieler handeln
    usage: /trade <Spieler|accept|deny>
  schem:
    description: Schematics laden und einfügen (Admin)
    usage: /schem <list|load|paste|save>
  spawnborder:
    description: Spawn-Border Polygon verwalten (Admin)
    usage: /spawnborder <wand|add|remove|list|clear|show|tp>
  resetworld:
    description: Survival-Welt komplett zurücksetzen (Admin)
    usage: /resetworld [confirm]
  flatarea:
    description: Fläche um den Spieler planieren (Admin, benötigt FAWE)
    usage: /flatarea [radius] [y-level]
  npc:
    description: NPCs erstellen und verwalten (Admin)
    usage: /npc <create|delete|addcmd|removecmd|info|list>
  tutorial:
    description: Tutorial-GUI öffnen
    usage: /tutorial
  ah:
    description: Auktionshaus öffnen
    usage: /ah [sell <Preis>]
  phinfo:
    description: Strukturierte Spielerdaten (Dashboard-intern)
    usage: /phinfo <Spieler>
    permission: survival.admin
  itemclear:
    description: Alle Items auf dem Boden löschen (Admin)
    usage: /itemclear
    permission: survival.admin
  claimmap:
    description: Interaktive Claim-Karte öffnen
    usage: /claimmap
  chunkborder:
    description: Chunk-Grenzen ein-/ausblenden
    usage: /chunkborder
  claimadd:
    description: Extra Claim-Slots für einen Spieler hinzufügen (Admin)
    usage: /claimadd <Spieler> <Anzahl>
    permission: survival.admin
  voteshop:
    description: VoteShop öffnen
    usage: /voteshop
  votecoins:
    description: VoteCoins-Guthaben anzeigen
    usage: /votecoins

permissions:
  survival.admin:
    description: Vollzugriff auf alle Admin-Befehle (eco, setspawn, srank, schem, resetworld, etc.)
    default: op
  survival.mod:
    description: Moderator-Rechte (zukünftige Erweiterungen)
    default: false
  survival.vip:
    description: VIP-Vorteile (zukünftige Erweiterungen)
    default: false
  survival.claim:
    description: Chunks claimen
    default: true

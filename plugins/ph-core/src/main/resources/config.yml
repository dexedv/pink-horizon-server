# Pink Horizon Core - Konfiguration
database:
  # 'sqlite' fuer lokal, 'mysql' fuer Produktion
  type: sqlite
  # MySQL-Einstellungen (nur wenn type: mysql)
  mysql:
    host: localhost
    port: 3306
    database: pinkhorizon
    username: ph_user
    password: AENDERN

messages:
  prefix: '&d[&5Pink&dHorizon&d] &r'
  no-permission: '&cDu hast keine Berechtigung!'
  player-not-found: '&cSpieler nicht gefunden!'

chat:
  format: '&7[{rank}] &f{player}: &7{message}'

# VoteShop – wird auf allen Servern genutzt die ph-core als Dependency haben
vote-shop:
  title: "&5&lVoteShop &8| &7Deine Coins: %coins%"
  rows: 3
  items:
    speed:
      slot: 10
      material: SUGAR
      name: "&6⚡ Speed II &8(15 Min)"
      cost: 1
      lore:
        - "&7Gibt dir für 15 Minuten"
        - "&6Schnelligkeit II"
      commands:
        - "effect give [player] speed 900 1 true"
    saturation:
      slot: 12
      material: COOKED_BEEF
      name: "&aSättigung &8(15 Min)"
      cost: 1
      lore:
        - "&7Du wirst für 15 Minuten"
        - "&asatt gehalten"
      commands:
        - "effect give [player] saturation 900 0 true"
    xp_bottle:
      slot: 14
      material: EXPERIENCE_BOTTLE
      name: "&aErfahrungsflaschen &8x32"
      cost: 2
      lore:
        - "&732 Erfahrungsflaschen"
      commands:
        - "give [player] experience_bottle 32"
    diamond:
      slot: 16
      material: DIAMOND
      name: "&bDiamantenpaket &8x5"
      cost: 3
      lore:
        - "&75 Diamanten"
      commands:
        - "give [player] diamond 5"
    nether_star:
      slot: 22
      material: NETHER_STAR
      name: "&5Mystery Box"
      cost: 5
      lore:
        - "&7Eine zufällige Belohnung"
        - "&8Überrasch dich selbst!"
      commands:
        - "ph-vote-mystery [player]"

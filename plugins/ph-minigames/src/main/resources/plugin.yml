name: PH-Minigames
version: '1.0.0'
main: de.pinkhorizon.minigames.PHMinigames
api-version: '1.21'
description: Minigames-Plugin fuer Pink Horizon (BedWars)
authors: [ PinkHorizon ]
soft-depend: [ PH-Core ]

commands:
  bw:
    description: BedWars – Spielen und verwalten
    usage: /bw <join|leave|shop|stats|arenas|create|setspawn|setbed|addspawner|hologram>
    aliases: [ bedwars ]
    permission: minigames.play

permissions:
  minigames.play:
    description: BedWars spielen
    default: true
  minigames.admin:
    description: BedWars-Admin-Befehle
    default: op

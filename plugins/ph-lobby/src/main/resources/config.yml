# PH-Lobby Konfiguration
spawn:
  world: world
  x: -60.922
  y: 6.0
  z: 67.624
  yaw: 0.0
  pitch: 0.0

messages:
  welcome: '&dWillkommen auf &5Pink Horizon&d, &f{player}&d!'
  welcome-back: '&7Willkommen zurueck, &f{player}&7!'

# MOTD die im Tab angezeigt wird
tab-header: '&d&lPink Horizon'
tab-footer: '&7play.pinkhorizon.de'

# Schild-Navigation: Schilder mit [PH-Nav] im ersten Header aktivieren Navigation
signs:
  survival: 'Survival'
  skyblock: 'SkyBlock'
  minigames: 'Minigames'

# Server-Status BossBar: Adressen der Sub-Server zum Anpingen
# Für Docker: host = Container-Name (z.B. "survival"), port = 25565
# Für lokal:  host = localhost, port = individueller Server-Port
servers:
  survival:
    display: "Survival"
    host: "survival"
    port: 25567
  skyblock:
    display: "SkyBlock"
    host: "skyblock"
    port: 25568
  minigames:
    display: "Minigames"
    host: "minigames"
    port: 25569

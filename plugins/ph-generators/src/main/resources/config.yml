# PH-Generators Konfiguration

database:
  # Für Dashboard-Integration "mysql" verwenden!
  # Für lokale Entwicklung/Test reicht "sqlite"
  type: mysql   # "sqlite" oder "mysql"
  mysql:
    host: ph-mysql   # Docker-Service-Name (oder "localhost" für lokale Entwicklung)
    port: 3306
    database: ph_generators
    username: ph_user
    password: "ph-db-2024"

# Island-Spawn: Koordinaten auf dem Skyblock-Template wo Spieler spawnen
# Passe diese an deinen Map-Spawn an!
island:
  spawn-x: 0.5
  spawn-y: 64.0
  spawn-z: 0.5
  spawn-yaw: 0.0
  spawn-pitch: 0.0

# Welt in der Generatoren platziert werden dürfen
# "island" = nur auf eigener Insel (Standard, empfohlen)
# leer = alle Welten erlaubt
generator-world: ""

# Max. Generatoren pro Spieler (ohne Prestige-Erweiterungen)
max-generators: 10

# Generatoren-Erweiterung durch Prestige: alle X Prestige-Stufen +1 Slot
generator-slot-per-prestige: 2

# Offline-Einkommen Cap in Stunden
offline-cap-hours: 8

# Datenbankspeiherung alle X Sekunden
db-save-interval: 30

# Hologramm-Update alle X Ticks (20 Ticks = 1 Sekunde)
hologram-update-ticks: 40

# AFK-Belohnungsbox nach X Minuten AFK
afk-reward-minutes: 120

# Prestige max
max-prestige: 1000

# Booster-Dauer in Minuten (Standard-Shop-Booster)
default-booster-duration: 60

# Serverweiter Event-Booster Multiplikator
server-booster-multiplier: 2.0

# Basis Enchant-Chance bei Platzierung (5%)
enchant-base-chance: 0.05

# Auto-Upgrade: Tick-Intervall in Sekunden (separat vom Income-Ticker, hier im Income-Ticker integriert)
# Community-Goal für Server-Booster (in Dollar)
community-goal: 1000000000000

# Mining-Pet
pet:
  coins-per-level: 2   # Passives Einkommen pro Pet-Level pro Sekunde (Level 1 = 2/s, Level 500 = 1000/s)

# Mining-Block (fester Block neben Insel-Spawn)
mining-block:
  offset-x: 3           # X-Offset vom Island-Spawn
  base-money: 5          # Geld pro Schlag bei Level 1
  shard-chance: 0.10     # Basis-Chance für Shard-Drop (10%)
  upgrade-shards: 5      # Shards pro Level für Upgrade (level × dieser Wert)
  max-level: 100
  cooldown-ms: 500       # Mindestzeit zwischen Schlägen in ms
  pickaxe-max-level: 50
  pickaxe-upgrade-shards: 8  # Shards pro Level für Spitzhacke-Upgrade (level × dieser Wert)

# Automatische Community-Events
auto-events:
  enabled: true
  initial-delay-minutes: 15    # Wie lange nach Server-Start bis zum ersten Event
  cooldown-minutes: 90         # Pause zwischen zwei Events
  duration-minutes: 30         # Wie lange ein Event läuft
  announce-before-minutes: 5   # Ankündigung X Minuten vorher

# Marktplatz aktiv?
market-enabled: true

# Seasonal Events (Generatoren die zeitlich begrenzt kaufbar sind)
seasonal-events:
  halloween:
    active-from: "10-25"   # MM-DD
    active-until: "11-03"
    generator-name: "<orange>Kürbis-Generator</orange>"
    block: PUMPKIN
    base-income: 200.0
    buy-price: 75000
    base-upgrade-cost: 10000
  winter:
    active-from: "12-20"
    active-until: "01-05"
    generator-name: "<aqua>Eis-Generator</aqua>"
    block: PACKED_ICE
    base-income: 300.0
    buy-price: 100000
    base-upgrade-cost: 15000


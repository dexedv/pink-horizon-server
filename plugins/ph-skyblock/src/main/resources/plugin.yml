name: PH-SkyBlock
version: '2.0.0'
main: de.pinkhorizon.skyblock.PHSkyBlock
api-version: '1.21'
description: SkyBlock-Plugin fuer Pink Horizon
authors: [ PinkHorizon ]
depend: [ PH-Core ]

commands:
  island:
    description: SkyBlock Insel-Verwaltung
    usage: /island <create|home|spawn|members|invite|kick|setHome|warp|top|info|reset|upgrade|chat|visit>
    aliases: [ is, sky ]
  isadmin:
    description: SkyBlock Admin-Befehle
    usage: /isadmin <tp|reload|setspawn|delete|info>

permissions:
  skyblock.island:
    description: Eigene Insel verwalten
    default: true
  skyblock.admin:
    description: Admin-Zugriff fuer SkyBlock
    default: op

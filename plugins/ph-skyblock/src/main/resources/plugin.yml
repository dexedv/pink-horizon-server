name: PH-SkyBlock
version: '2.2.0'
main: de.pinkhorizon.skyblock.PHSkyBlock
api-version: '1.21'
description: SkyBlock Custom-Features fuer Pink Horizon (BentoBox Companion)
authors: [ PinkHorizon ]
depend: [ PH-Core, BentoBox ]
softdepend: [ Level, Challenges, Visit, Warps, IslandFly, Border, Chat, TwerkingForTrees ]

commands:
  phsk:
    description: Generator & Coins Verwaltung
    usage: /phsk [bal|quests|achievements|titles|top|give|reload]
    aliases: [ skygen, skycoins ]

permissions:
  skyblock.admin:
    description: Admin-Zugriff fuer SkyBlock
    default: op

services:

  # ── MySQL Datenbank ───────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: ph-mysql
    mem_limit: 2g
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE:      "${MYSQL_DATABASE}"
      MYSQL_USER:          "${MYSQL_USER}"
      MYSQL_PASSWORD:      "${MYSQL_PASSWORD}"
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./data/mysql-init:/docker-entrypoint-initdb.d:ro
    networks:
      - ph-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Velocity Proxy ────────────────────────────────────────────────────
  velocity:
    image: itzg/bungeecord:latest
    container_name: ph-velocity
    mem_limit: 1g
    environment:
      TYPE: VELOCITY
      MEMORY: "768m"
      TZ: Europe/Berlin
    ports:
      - "25565:25565"      # Spieler connecten hier
    volumes:
      - ./proxy:/server
    networks:
      - ph-net
    restart: unless-stopped
    depends_on:
      - lobby
      - survival

  # ── Lobby ─────────────────────────────────────────────────────────────
  lobby:
    image: itzg/minecraft-server:latest
    container_name: ph-lobby
    mem_limit: 2g
    healthcheck:
      start_period: 2m
    environment:
      EULA: "TRUE"
      TYPE: PAPER
      VERSION: "1.21.4"
      INIT_MEMORY: "512m"
      MEMORY: "1600m"
      USE_AIKAR_FLAGS: "true"
      ONLINE_MODE: "false"
      ENABLE_RCON: "true"
      RCON_PORT: "25575"
      RCON_PASSWORD: "${RCON_PASSWORD}"
      TZ: Europe/Berlin
    ports:
      - "25575:25575"             # RCON
      - "25566:25566"             # Minecraft (intern für Velocity)
      - "8192:8192"               # NuVotifier
    volumes:
      - ./servers/lobby:/data
    networks:
      - ph-net
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

  # ── Survival ──────────────────────────────────────────────────────────
  survival:
    image: itzg/minecraft-server:latest
    container_name: ph-survival
    mem_limit: 12g
    healthcheck:
      start_period: 3m
    environment:
      EULA: "TRUE"
      TYPE: PAPER
      VERSION: "1.21.4"
      INIT_MEMORY: "2g"
      MEMORY: "10240m"
      USE_AIKAR_FLAGS: "true"
      ONLINE_MODE: "false"
      ENABLE_RCON: "true"
      RCON_PORT: "25575"
      RCON_PASSWORD: "${RCON_PASSWORD}"
      TZ: Europe/Berlin
    ports:
      - "25576:25575"             # RCON
      - "25567:25567"             # Minecraft (intern für Velocity)
    volumes:
      - ./servers/survival:/data
    networks:
      - ph-net
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy


  # ── Minigames ─────────────────────────────────────────────────────────
  minigames:
    profiles: ["disabled"]
    image: itzg/minecraft-server:latest
    container_name: ph-minigames
    mem_limit: 6g
    healthcheck:
      start_period: 3m
    environment:
      EULA: "TRUE"
      TYPE: PAPER
      VERSION: "1.21.4"
      INIT_MEMORY: "1g"
      MEMORY: "5000m"
      USE_AIKAR_FLAGS: "true"
      ONLINE_MODE: "false"
      ENABLE_RCON: "true"
      RCON_PORT: "25575"
      RCON_PASSWORD: "${RCON_PASSWORD}"
      SERVER_PORT: "25569"
      TZ: Europe/Berlin
    ports:
      - "25578:25575"             # RCON
      - "25569:25569"             # Minecraft (intern für Velocity)
    volumes:
      - ./servers/minigames:/data
    networks:
      - ph-net
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

  # ── IdleForge Generators ─────────────────────────────────────────────
  generators:
    image: itzg/minecraft-server:latest
    container_name: ph-generators
    mem_limit: 4g
    healthcheck:
      start_period: 3m
    environment:
      EULA: "TRUE"
      TYPE: PAPER
      VERSION: "1.21.4"
      INIT_MEMORY: "512m"
      MEMORY: "3500m"
      USE_AIKAR_FLAGS: "true"
      ONLINE_MODE: "false"
      ENABLE_RCON: "true"
      RCON_PORT: "25575"
      RCON_PASSWORD: "${RCON_PASSWORD}"
      SERVER_PORT: "25571"
      TZ: Europe/Berlin
    ports:
      - "25580:25575"             # RCON
      - "25571:25571"             # Minecraft (intern für Velocity)
    volumes:
      - ./servers/generators:/data
    networks:
      - ph-net
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

  # ── Smash the Boss ────────────────────────────────────────────────────
  smash:
    image: itzg/minecraft-server:latest
    container_name: ph-smash
    mem_limit: 4g
    healthcheck:
      start_period: 3m
    environment:
      EULA: "TRUE"
      TYPE: PAPER
      VERSION: "1.21.4"
      INIT_MEMORY: "512m"
      MEMORY: "3500m"
      USE_AIKAR_FLAGS: "true"
      ONLINE_MODE: "false"
      ENABLE_RCON: "true"
      RCON_PORT: "25575"
      RCON_PASSWORD: "${RCON_PASSWORD}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
      SERVER_PORT: "25570"
      TZ: Europe/Berlin
    ports:
      - "25579:25575"             # RCON
      - "25570:25570"             # Minecraft (intern für Velocity)
    volumes:
      - ./servers/smash:/data
    networks:
      - ph-net
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

  # ── SkyBlock ──────────────────────────────────────────────────────────
  skyblock:
    image: itzg/minecraft-server:latest
    container_name: ph-skyblock
    mem_limit: 6g
    healthcheck:
      start_period: 3m
    environment:
      EULA: "TRUE"
      TYPE: PAPER
      VERSION: "1.21.4"
      INIT_MEMORY: "1g"
      MEMORY: "5000m"
      USE_AIKAR_FLAGS: "true"
      ONLINE_MODE: "false"
      ENABLE_RCON: "true"
      RCON_PORT: "25577"
      RCON_PASSWORD: "${RCON_PASSWORD}"
      SERVER_PORT: "25568"
      TZ: Europe/Berlin
    ports:
      - "25581:25577"             # RCON
      - "25568:25568"             # Minecraft (intern für Velocity)
    volumes:
      - ./servers/skyblock:/data
    networks:
      - ph-net
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

  # ── Dashboard ─────────────────────────────────────────────────────────
  dashboard:
    build: ./dashboard
    container_name: ph-dashboard
    mem_limit: 512m
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./servers/lobby:/data/lobby:ro
      - ./servers/survival:/data/survival:ro
      - ./servers/smash:/data/smash:ro
      - ./servers/skyblock:/data/skyblock:ro
      - ./servers/generators:/data/generators:ro
      - ./data/dashboard:/data/dashboard
      - ./backups:/data/backups
    environment:
      BACKUP_DIR:         "/data/backups"
      DASHBOARD_PASSWORD: "${DASHBOARD_PASSWORD}"
      LOBBY_RCON_HOST:    "lobby"
      SURVIVAL_RCON_HOST: "survival"
      RCON_PASSWORD:      "${RCON_PASSWORD}"
      DB_HOST:            "ph-mysql"
      DB_PORT:            "3306"
      DB_USER:            "${MYSQL_USER}"
      DB_PASS:            "${MYSQL_PASSWORD}"
      TZ: Europe/Berlin
    networks:
      - ph-net
    restart: unless-stopped
    depends_on:
      - lobby
      - survival

  # ── Discord Bot ───────────────────────────────────────────────────────────
  discord-bot:
    build: ./discord-bot
    container_name: ph-discord-bot
    mem_limit: 256m
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DISCORD_TOKEN:     "${DISCORD_TOKEN}"
      DISCORD_CLIENT_ID: "${DISCORD_CLIENT_ID}"
      DISCORD_GUILD_ID:  "${DISCORD_GUILD_ID}"
      MC_ADDRESS:        "play.pinkhorizon.fun"
      PROXY_HOST:        "velocity"
      PROXY_PORT:        "25565"
      SMASH_HOST:        "smash"
      SMASH_PORT:        "25570"
      SURVIVAL_HOST:     "survival"
      SURVIVAL_PORT:     "25565"
      LOBBY_HOST:        "lobby"
      LOBBY_PORT:        "25565"
      DB_HOST:           "ph-mysql"
      DB_PORT:           "3306"
      DB_USER:           "${MYSQL_USER}"
      DB_PASS:           "${MYSQL_PASSWORD}"
      DB_NAME:           "${MYSQL_DATABASE}"
      TZ:                Europe/Berlin
    networks:
      - ph-net
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

networks:
  ph-net:
    driver: bridge

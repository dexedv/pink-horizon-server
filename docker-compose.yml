services:

  # ── Velocity Proxy ────────────────────────────────────────────────────
  velocity:
    image: itzg/bungeecord:latest
    container_name: ph-velocity
    environment:
      TYPE: VELOCITY
      MEMORY: "512m"
    ports:
      - "25565:25565"      # Spieler connecten hier
    volumes:
      - ./proxy:/server
    networks:
      - ph-net
    restart: unless-stopped
    depends_on:
      - lobby
      - survival
      - skyblock
      - minigames

  # ── Lobby ─────────────────────────────────────────────────────────────
  lobby:
    image: itzg/minecraft-server:latest
    container_name: ph-lobby
    healthcheck:
      start_period: 3m
    environment:
      EULA: "TRUE"
      TYPE: PAPER
      VERSION: "1.21.4"
      MEMORY: "2G"
      ONLINE_MODE: "false"
      ENABLE_RCON: "true"
      RCON_PORT: "25575"
      RCON_PASSWORD: "ph-admin-2024"
    ports:
      - "25575:25575"             # RCON
      - "25566:25566"             # Minecraft (intern für Velocity)
    volumes:
      - ./servers/lobby:/data
    networks:
      - ph-net
    restart: unless-stopped

  # ── Survival ──────────────────────────────────────────────────────────
  survival:
    image: itzg/minecraft-server:latest
    container_name: ph-survival
    healthcheck:
      start_period: 3m
    environment:
      EULA: "TRUE"
      TYPE: PAPER
      VERSION: "1.21.4"
      MEMORY: "2G"
      ONLINE_MODE: "false"
      ENABLE_RCON: "true"
      RCON_PORT: "25575"
      RCON_PASSWORD: "ph-admin-2024"
    ports:
      - "25576:25575"             # RCON
      - "25567:25567"             # Minecraft (intern für Velocity)
    volumes:
      - ./servers/survival:/data
    networks:
      - ph-net
    restart: unless-stopped

  # ── SkyBlock ──────────────────────────────────────────────────────────
  skyblock:
    image: itzg/minecraft-server:latest
    container_name: ph-skyblock
    healthcheck:
      start_period: 3m
    environment:
      EULA: "TRUE"
      TYPE: PAPER
      VERSION: "1.21.4"
      MEMORY: "2G"
      ONLINE_MODE: "false"
      ENABLE_RCON: "true"
      RCON_PORT: "25575"
      RCON_PASSWORD: "ph-admin-2024"
    ports:
      - "25577:25575"             # RCON
      - "25568:25568"             # Minecraft (intern für Velocity)
    volumes:
      - ./servers/skyblock:/data
    networks:
      - ph-net
    restart: unless-stopped

  # ── Minigames ─────────────────────────────────────────────────────────
  minigames:
    image: itzg/minecraft-server:latest
    container_name: ph-minigames
    healthcheck:
      start_period: 3m
    environment:
      EULA: "TRUE"
      TYPE: PAPER
      VERSION: "1.21.4"
      MEMORY: "2G"
      ONLINE_MODE: "false"
      ENABLE_RCON: "true"
      RCON_PORT: "25575"
      RCON_PASSWORD: "ph-admin-2024"
    ports:
      - "25578:25575"             # RCON
      - "25569:25569"             # Minecraft (intern für Velocity)
    volumes:
      - ./servers/minigames:/data
    networks:
      - ph-net
    restart: unless-stopped

networks:
  ph-net:
    driver: bridge

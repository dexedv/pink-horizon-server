services:

  # ── Velocity Proxy ────────────────────────────────────────────────────
  velocity:
    image: itzg/bungeecord:latest
    container_name: ph-velocity
    environment:
      TYPE: VELOCITY
      MEMORY: "512m"
    ports:
      - "25565:25565"      # Spieler connecten hier
    volumes:
      - ./proxy:/server
    networks:
      - ph-net
    restart: unless-stopped
    depends_on:
      - lobby
      - survival

  # ── Lobby ─────────────────────────────────────────────────────────────
  lobby:
    image: itzg/minecraft-server:latest
    container_name: ph-lobby
    healthcheck:
      start_period: 2m
    environment:
      EULA: "TRUE"
      TYPE: PAPER
      VERSION: "1.21.4"
      INIT_MEMORY: "256m"
      MEMORY: "512m"
      USE_AIKAR_FLAGS: "true"
      ONLINE_MODE: "false"
      ENABLE_RCON: "true"
      RCON_PORT: "25575"
      RCON_PASSWORD: "ph-admin-2024"
    ports:
      - "25575:25575"             # RCON
      - "25566:25566"             # Minecraft (intern für Velocity)
    volumes:
      - ./servers/lobby:/data
    networks:
      - ph-net
    restart: unless-stopped

  # ── Survival ──────────────────────────────────────────────────────────
  survival:
    image: itzg/minecraft-server:latest
    container_name: ph-survival
    healthcheck:
      start_period: 3m
    environment:
      EULA: "TRUE"
      TYPE: PAPER
      VERSION: "1.21.4"
      INIT_MEMORY: "256m"
      MEMORY: "1500m"
      USE_AIKAR_FLAGS: "true"
      ONLINE_MODE: "false"
      ENABLE_RCON: "true"
      RCON_PORT: "25575"
      RCON_PASSWORD: "ph-admin-2024"
    ports:
      - "25576:25575"             # RCON
      - "25567:25567"             # Minecraft (intern für Velocity)
    volumes:
      - ./servers/survival:/data
    networks:
      - ph-net
    restart: unless-stopped


  # ── Dashboard ─────────────────────────────────────────────────────────
  dashboard:
    build: ./dashboard
    container_name: ph-dashboard
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./servers/lobby:/data/lobby:ro
      - ./servers/survival:/data/survival:ro
    environment:
      DASHBOARD_PASSWORD: "pinkhorizon2024"
      LOBBY_RCON_HOST:    "lobby"
      SURVIVAL_RCON_HOST: "survival"
      RCON_PASSWORD:      "ph-admin-2024"
    networks:
      - ph-net
    restart: unless-stopped
    depends_on:
      - lobby
      - survival

networks:
  ph-net:
    driver: bridge

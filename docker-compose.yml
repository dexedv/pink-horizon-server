services:

  # ── MySQL Datenbank ───────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: ph-mysql
    mem_limit: 512m
    environment:
      MYSQL_ROOT_PASSWORD: "ph-root-2024"
      MYSQL_DATABASE:      "pinkhorizon"
      MYSQL_USER:          "ph_user"
      MYSQL_PASSWORD:      "ph-db-2024"
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./data/mysql-init:/docker-entrypoint-initdb.d:ro
    networks:
      - ph-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uph_user", "-pph-db-2024"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Velocity Proxy ────────────────────────────────────────────────────
  velocity:
    image: itzg/bungeecord:latest
    container_name: ph-velocity
    mem_limit: 512m
    environment:
      TYPE: VELOCITY
      MEMORY: "384m"
    ports:
      - "25565:25565"      # Spieler connecten hier
    volumes:
      - ./proxy:/server
    networks:
      - ph-net
    restart: unless-stopped
    depends_on:
      - lobby
      - survival

  # ── Lobby ─────────────────────────────────────────────────────────────
  lobby:
    image: itzg/minecraft-server:latest
    container_name: ph-lobby
    mem_limit: 768m
    healthcheck:
      start_period: 2m
    environment:
      EULA: "TRUE"
      TYPE: PAPER
      VERSION: "1.21.4"
      INIT_MEMORY: "256m"
      MEMORY: "576m"
      USE_AIKAR_FLAGS: "true"
      ONLINE_MODE: "false"
      ENABLE_RCON: "true"
      RCON_PORT: "25575"
      RCON_PASSWORD: "ph-admin-2024"
    ports:
      - "25575:25575"             # RCON
      - "25566:25566"             # Minecraft (intern für Velocity)
    volumes:
      - ./servers/lobby:/data
    networks:
      - ph-net
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

  # ── Survival ──────────────────────────────────────────────────────────
  survival:
    image: itzg/minecraft-server:latest
    container_name: ph-survival
    mem_limit: 2g
    healthcheck:
      start_period: 3m
    environment:
      EULA: "TRUE"
      TYPE: PAPER
      VERSION: "1.21.4"
      INIT_MEMORY: "512m"
      MEMORY: "1700m"
      USE_AIKAR_FLAGS: "true"
      ONLINE_MODE: "false"
      ENABLE_RCON: "true"
      RCON_PORT: "25575"
      RCON_PASSWORD: "ph-admin-2024"
    ports:
      - "25576:25575"             # RCON
      - "25567:25567"             # Minecraft (intern für Velocity)
    volumes:
      - ./servers/survival:/data
    networks:
      - ph-net
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy


  # ── Minigames ─────────────────────────────────────────────────────────
  minigames:
    image: itzg/minecraft-server:latest
    container_name: ph-minigames
    mem_limit: 1g
    healthcheck:
      start_period: 3m
    environment:
      EULA: "TRUE"
      TYPE: PAPER
      VERSION: "1.21.4"
      INIT_MEMORY: "256m"
      MEMORY: "800m"
      USE_AIKAR_FLAGS: "true"
      ONLINE_MODE: "false"
      ENABLE_RCON: "true"
      RCON_PORT: "25575"
      RCON_PASSWORD: "ph-admin-2024"
      SERVER_PORT: "25569"
    ports:
      - "25578:25575"             # RCON
      - "25569:25569"             # Minecraft (intern für Velocity)
    volumes:
      - ./servers/minigames:/data
    networks:
      - ph-net
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

  # ── Dashboard ─────────────────────────────────────────────────────────
  dashboard:
    build: ./dashboard
    container_name: ph-dashboard
    mem_limit: 256m
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./servers/lobby:/data/lobby:ro
      - ./servers/survival:/data/survival:ro
    environment:
      DASHBOARD_PASSWORD: "pinkhorizon2024"
      LOBBY_RCON_HOST:    "lobby"
      SURVIVAL_RCON_HOST: "survival"
      RCON_PASSWORD:      "ph-admin-2024"
      DB_HOST:            "ph-mysql"
      DB_PORT:            "3306"
      DB_USER:            "ph_user"
      DB_PASS:            "ph-db-2024"
    networks:
      - ph-net
    restart: unless-stopped
    depends_on:
      - lobby
      - survival

networks:
  ph-net:
    driver: bridge

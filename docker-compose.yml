services:

  # ── MySQL Datenbank ───────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: ph-mysql
    mem_limit: 2g
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      MYSQL_DATABASE:      "${MYSQL_DATABASE}"
      MYSQL_USER:          "${MYSQL_USER}"
      MYSQL_PASSWORD:      "${MYSQL_PASSWORD}"
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./data/mysql-init:/docker-entrypoint-initdb.d:ro
    networks:
      - ph-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Velocity Proxy ────────────────────────────────────────────────────
  velocity:
    image: itzg/bungeecord:latest
    container_name: ph-velocity
    mem_limit: 1g
    environment:
      TYPE: VELOCITY
      MEMORY: "768m"
      TZ: Europe/Berlin
    ports:
      - "25565:25565"      # Spieler connecten hier
    volumes:
      - ./proxy:/server
    networks:
      - ph-net
    restart: unless-stopped
    depends_on:
      - lobby
      - survival

  # ── Lobby ─────────────────────────────────────────────────────────────
  lobby:
    image: itzg/minecraft-server:latest
    container_name: ph-lobby
    mem_limit: 2g
    healthcheck:
      start_period: 2m
    environment:
      EULA: "TRUE"
      TYPE: PAPER
      VERSION: "1.21.4"
      INIT_MEMORY: "512m"
      MEMORY: "1600m"
      USE_AIKAR_FLAGS: "true"
      ONLINE_MODE: "false"
      ENABLE_RCON: "true"
      RCON_PORT: "25575"
      RCON_PASSWORD: "${RCON_PASSWORD}"
      TZ: Europe/Berlin
    ports:
      - "25575:25575"             # RCON
      - "25566:25566"             # Minecraft (intern für Velocity)
    volumes:
      - ./servers/lobby:/data
    networks:
      - ph-net
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

  # ── Survival ──────────────────────────────────────────────────────────
  survival:
    image: itzg/minecraft-server:latest
    container_name: ph-survival
    mem_limit: 12g
    healthcheck:
      start_period: 3m
    environment:
      EULA: "TRUE"
      TYPE: PAPER
      VERSION: "1.21.4"
      INIT_MEMORY: "2g"
      MEMORY: "10240m"
      USE_AIKAR_FLAGS: "true"
      ONLINE_MODE: "false"
      ENABLE_RCON: "true"
      RCON_PORT: "25575"
      RCON_PASSWORD: "${RCON_PASSWORD}"
      TZ: Europe/Berlin
    ports:
      - "25576:25575"             # RCON
      - "25567:25567"             # Minecraft (intern für Velocity)
    volumes:
      - ./servers/survival:/data
    networks:
      - ph-net
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy


  # ── Minigames ─────────────────────────────────────────────────────────
  minigames:
    image: itzg/minecraft-server:latest
    container_name: ph-minigames
    mem_limit: 6g
    healthcheck:
      start_period: 3m
    environment:
      EULA: "TRUE"
      TYPE: PAPER
      VERSION: "1.21.4"
      INIT_MEMORY: "1g"
      MEMORY: "5000m"
      USE_AIKAR_FLAGS: "true"
      ONLINE_MODE: "false"
      ENABLE_RCON: "true"
      RCON_PORT: "25575"
      RCON_PASSWORD: "${RCON_PASSWORD}"
      SERVER_PORT: "25569"
      TZ: Europe/Berlin
    ports:
      - "25578:25575"             # RCON
      - "25569:25569"             # Minecraft (intern für Velocity)
    volumes:
      - ./servers/minigames:/data
    networks:
      - ph-net
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

  # ── Smash the Boss ────────────────────────────────────────────────────
  smash:
    image: itzg/minecraft-server:latest
    container_name: ph-smash
    mem_limit: 4g
    healthcheck:
      start_period: 3m
    environment:
      EULA: "TRUE"
      TYPE: PAPER
      VERSION: "1.21.4"
      INIT_MEMORY: "512m"
      MEMORY: "3500m"
      USE_AIKAR_FLAGS: "true"
      ONLINE_MODE: "false"
      ENABLE_RCON: "true"
      RCON_PORT: "25575"
      RCON_PASSWORD: "${RCON_PASSWORD}"
      SERVER_PORT: "25570"
      TZ: Europe/Berlin
    ports:
      - "25579:25575"             # RCON
      - "25570:25570"             # Minecraft (intern für Velocity)
    volumes:
      - ./servers/smash:/data
    networks:
      - ph-net
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

  # ── Dashboard ─────────────────────────────────────────────────────────
  dashboard:
    build: ./dashboard
    container_name: ph-dashboard
    mem_limit: 512m
    ports:
      - "3000:3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./servers/lobby:/data/lobby:ro
      - ./servers/survival:/data/survival:ro
    environment:
      DASHBOARD_PASSWORD: "${DASHBOARD_PASSWORD}"
      LOBBY_RCON_HOST:    "lobby"
      SURVIVAL_RCON_HOST: "survival"
      RCON_PASSWORD:      "${RCON_PASSWORD}"
      DB_HOST:            "ph-mysql"
      DB_PORT:            "3306"
      DB_USER:            "${MYSQL_USER}"
      DB_PASS:            "${MYSQL_PASSWORD}"
      TZ: Europe/Berlin
    networks:
      - ph-net
    restart: unless-stopped
    depends_on:
      - lobby
      - survival

networks:
  ph-net:
    driver: bridge

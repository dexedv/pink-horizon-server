<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pink Horizon – Dashboard</title>
<style>
  @import url("https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=JetBrains+Mono:wght@400;500&display=swap");
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#06060f; --surface:rgba(255,255,255,.04); --surface2:rgba(255,255,255,.07);
    --s-solid:#0c0c1a; --border:rgba(255,255,255,.08); --bh:rgba(255,255,255,.14);
    --text:#eeeeff; --muted:rgba(238,238,255,.4);
    --pink:#f472b6; --pink2:#ec4899; --purple:#a855f7;
    --green:#34d399; --red:#f87171; --blue:#60a5fa; --yellow:#fbbf24;
    --font:'Inter',system-ui,sans-serif;
    --mono:'JetBrains Mono','Cascadia Code',Consolas,monospace;
    --sw:224px; --hh:56px; --r:12px; --r-sm:8px; --r-lg:16px;
    --grad:linear-gradient(135deg,var(--pink),var(--purple));
    --sh:0 8px 32px rgba(0,0,0,.5); --sh-sm:0 2px 8px rgba(0,0,0,.3);
    --sh-glow:0 4px 20px rgba(244,114,182,.25);
    --blur:blur(24px) saturate(160%);
  }
  body { background:var(--bg); color:var(--text); font-family:var(--font); height:100vh; overflow:hidden; display:flex; flex-direction:column; -webkit-font-smoothing:antialiased; }
  body::before { content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background: radial-gradient(ellipse 70% 50% at 5% 0%,rgba(168,85,247,.13) 0%,transparent 55%),
                radial-gradient(ellipse 50% 40% at 95% 100%,rgba(244,114,182,.10) 0%,transparent 55%); }
  #login-screen,#app { position:relative; z-index:1; }

  /* Login */
  #login-screen { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:100; }
  .lbox { background:rgba(12,12,26,.88); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); border:1px solid rgba(255,255,255,.1); border-radius:20px; padding:44px 40px; width:380px; text-align:center; box-shadow:var(--sh),0 0 60px rgba(168,85,247,.15); }
  .lbox h1 { font-size:1.7rem; font-weight:700; background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:6px; letter-spacing:-.02em; }
  .lbox p { color:var(--muted); margin-bottom:28px; font-size:.88rem; }
  .lbox input { width:100%; padding:12px 16px; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); border-radius:var(--r-sm); color:var(--text); font-size:.95rem; outline:none; margin-bottom:12px; font-family:var(--font); transition:border-color .2s,box-shadow .2s; }
  .lbox input:focus { border-color:rgba(244,114,182,.5); box-shadow:0 0 0 3px rgba(244,114,182,.1); }
  .lbox .lbtn { width:100%; padding:12px; background:var(--grad); border:none; border-radius:var(--r-sm); color:#fff; font-size:.95rem; font-weight:600; cursor:pointer; font-family:var(--font); transition:opacity .2s,transform .1s; }
  .lbox .lbtn:hover { opacity:.88; } .lbox .lbtn:active { transform:scale(.98); }
  .lerr { color:var(--red); font-size:.83rem; margin-top:10px; display:none; }
  .hidden { display:none !important; }

  /* App */
  #app { display:flex; flex:1; overflow:hidden; }

  /* Sidebar */
  #sidebar { width:var(--sw); background:rgba(8,8,20,.82); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; box-shadow:4px 0 24px rgba(0,0,0,.3); }
  .nav-logo { padding:0 18px; height:var(--hh); display:flex; align-items:center; font-size:1.05rem; font-weight:700; background:var(--grad); -webkit-background-clip:text; -webkit-text-fill-color:transparent; border-bottom:1px solid var(--border); flex-shrink:0; letter-spacing:-.01em; }
  #nav-body { flex:1; overflow-y:auto; padding:10px 8px; display:flex; flex-direction:column; gap:2px; }
  .nav-sec { font-size:.63rem; text-transform:uppercase; letter-spacing:.13em; color:var(--muted); padding:12px 10px 4px; font-weight:600; }
  .nav-item { display:flex; align-items:center; gap:9px; padding:8px 10px; border-radius:var(--r-sm); cursor:pointer; border:1px solid transparent; background:none; color:rgba(238,238,255,.6); font-size:.85rem; text-align:left; width:100%; transition:all .18s; font-family:var(--font); font-weight:400; }
  .nav-item:hover { background:rgba(255,255,255,.06); color:var(--text); border-color:rgba(255,255,255,.06); }
  .nav-item.active { background:rgba(244,114,182,.1); border-color:rgba(244,114,182,.22); color:var(--pink); font-weight:500; }
  .ndot { width:7px; height:7px; border-radius:50%; flex-shrink:0; background:rgba(255,255,255,.2); }
  .ndot.on  { background:var(--green); animation:pulse-dot 2.2s infinite; }
  .ndot.off { background:var(--red); }
  @keyframes pulse-dot { 0%,100%{box-shadow:0 0 0 0 rgba(52,211,153,.5)} 50%{box-shadow:0 0 0 4px rgba(52,211,153,0)} }
  .nav-footer { padding:8px; border-top:1px solid var(--border); flex-shrink:0; }
  .logout-btn { width:100%; padding:8px 10px; background:none; border:1px solid transparent; color:var(--muted); border-radius:var(--r-sm); cursor:pointer; font-size:.83rem; text-align:left; transition:all .18s; font-family:var(--font); }
  .logout-btn:hover { border-color:rgba(248,113,113,.3); color:var(--red); background:rgba(248,113,113,.05); }

  /* Main */
  #main-area { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  #page-header { height:var(--hh); display:flex; align-items:center; gap:12px; padding:0 20px; border-bottom:1px solid var(--border); flex-shrink:0; background:rgba(8,8,20,.78); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); }
  #page-title { font-size:1.05rem; font-weight:600; flex:1; letter-spacing:-.01em; }
  #hdr-actions { display:flex; gap:8px; align-items:center; }
  #page-content { flex:1; overflow-y:auto; }

  /* Buttons */
  .btn { padding:7px 14px; border-radius:var(--r-sm); border:1px solid var(--border); background:rgba(255,255,255,.05); color:rgba(238,238,255,.8); cursor:pointer; font-size:.83rem; display:inline-flex; align-items:center; gap:6px; transition:all .18s; white-space:nowrap; font-family:var(--font); }
  .btn:hover { border-color:var(--bh); color:var(--text); background:rgba(255,255,255,.09); }
  .btn-d:hover { border-color:rgba(248,113,113,.4)!important; color:var(--red)!important; background:rgba(248,113,113,.07)!important; }
  .btn-s:hover { border-color:rgba(52,211,153,.4)!important; color:var(--green)!important; background:rgba(52,211,153,.07)!important; }
  .btn-p { background:var(--grad); border-color:transparent; color:#fff; font-weight:600; box-shadow:var(--sh-glow); }
  .btn-p:hover { opacity:.88; color:#fff; border-color:transparent; background:var(--grad); }
  .btn:disabled { opacity:.35; cursor:not-allowed; }
  .btn-xs { padding:3px 10px; border-radius:6px; border:1px solid var(--border); background:rgba(255,255,255,.04); color:rgba(238,238,255,.65); cursor:pointer; font-size:.74rem; transition:all .18s; white-space:nowrap; font-family:var(--font); }
  .btn-xs:hover { border-color:rgba(248,113,113,.4); color:var(--red); background:rgba(248,113,113,.07); }
  .btn-xs.g:hover { border-color:rgba(52,211,153,.4); color:var(--green); background:rgba(52,211,153,.07); }

  /* Cards */
  .card { background:rgba(255,255,255,.035); border:1px solid var(--border); border-radius:var(--r); padding:16px; backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); transition:border-color .2s; }
  .card:hover { border-color:rgba(255,255,255,.13); }
  .card-title { font-size:.66rem; text-transform:uppercase; letter-spacing:.12em; color:var(--muted); margin-bottom:12px; font-weight:600; }

  /* Badges */
  .badge { font-size:.71rem; padding:2px 10px; border-radius:20px; display:inline-flex; align-items:center; gap:4px; font-weight:500; }
  .b-green  { background:rgba(52,211,153,.1);  border:1px solid rgba(52,211,153,.25);  color:var(--green); }
  .b-red    { background:rgba(248,113,113,.1); border:1px solid rgba(248,113,113,.25); color:var(--red); }
  .b-purple { background:rgba(168,85,247,.1);  border:1px solid rgba(168,85,247,.25);  color:var(--purple); }
  .b-yellow { background:rgba(251,191,36,.1);  border:1px solid rgba(251,191,36,.25);  color:var(--yellow); }
  .b-blue   { background:rgba(96,165,250,.1);  border:1px solid rgba(96,165,250,.25);  color:var(--blue); }

  /* Form */
  .field { background:rgba(255,255,255,.05); border:1px solid var(--border); border-radius:var(--r-sm); padding:9px 13px; color:var(--text); font-size:.88rem; outline:none; width:100%; font-family:var(--font); transition:border-color .18s,box-shadow .18s; }
  .field:focus { border-color:rgba(244,114,182,.45); box-shadow:0 0 0 3px rgba(244,114,182,.08); }
  .fsm { padding:6px 10px; font-size:.83rem; border-radius:6px; }
  select.field { cursor:pointer; } .irow { display:flex; gap:8px; align-items:center; }

  /* Msg */
  .msg { font-size:.81rem; padding:6px 12px; border-radius:6px; font-weight:500; }
  .msg-ok  { background:rgba(52,211,153,.08);  color:var(--green); border:1px solid rgba(52,211,153,.25); }
  .msg-err { background:rgba(248,113,113,.08); color:var(--red);   border:1px solid rgba(248,113,113,.25); }

  /* Layout */
  .page { padding:20px; display:flex; flex-direction:column; gap:16px; }
  .g2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .g3 { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
  .g4 { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  @media(max-width:1000px){ .g3,.g4{grid-template-columns:1fr 1fr} }
  @media(max-width:650px) { .g2,.g3,.g4{grid-template-columns:1fr} }

  /* Dashboard server cards */
  .srv-card-hdr { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .srv-card-name { font-weight:600; font-size:.95rem; flex:1; }
  .srv-meta { display:flex; flex-direction:column; gap:5px; font-size:.84rem; margin-bottom:10px; }
  .srv-row { display:flex; justify-content:space-between; }
  .srv-row span:first-child { color:var(--muted); } .srv-row span:last-child { font-weight:600; }
  .srv-actions { display:flex; gap:6px; flex-wrap:wrap; }
  .stat-card { display:flex; align-items:center; gap:14px; }
  .stat-icon { font-size:1.7rem; }
  .stat-lbl  { font-size:.68rem; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.06em; }
  .stat-val  { font-size:1.5rem; font-weight:700; letter-spacing:-.02em; }

  /* DB Status */
  .db-row { display:flex; align-items:center; gap:10px; padding:8px 12px; background:rgba(255,255,255,.03); border:1px solid var(--border); border-radius:var(--r-sm); }
  .db-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .db-dot.ok  { background:var(--green); animation:pulse-dot 2.2s infinite; }
  .db-dot.err { background:var(--red); }
  .db-name { flex:1; font-family:var(--mono); font-size:.83rem; }
  .db-status { font-size:.78rem; font-weight:500; }
  .db-status.ok { color:var(--green); } .db-status.err { color:var(--red); }

  /* Console */
  .con-wrap  { display:flex; flex-direction:column; height:100%; padding:12px 16px; gap:10px; }
  .con-out   { flex:1; background:rgba(0,0,0,.45); border:1px solid var(--border); border-radius:var(--r); padding:12px 14px; overflow-y:auto; font-family:var(--mono); font-size:.79rem; line-height:1.6; white-space:pre-wrap; word-break:break-all; }
  .ll { color:rgba(200,200,225,.8); } .ll.warn { color:var(--yellow); } .ll.error { color:var(--red); } .ll.info { color:#7dd3fc; } .ll.cmd { color:var(--pink); }
  .con-in { display:flex; gap:8px; flex-shrink:0; } .con-in .field { font-family:var(--mono); }

  /* Players */
  .pl-page { display:flex; flex-direction:column; height:100%; }
  .pl-top  { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; flex-direction:column; gap:10px; flex-shrink:0; }
  .pl-body { flex:1; overflow-y:auto; padding:16px 20px; display:flex; flex-direction:column; gap:14px; }
  .chips { display:flex; flex-wrap:wrap; gap:6px; align-items:center; min-height:24px; }
  .chip-lbl { font-size:.76rem; color:var(--muted); font-weight:500; }
  .chip { padding:3px 12px; background:rgba(255,255,255,.05); border:1px solid var(--border); border-radius:20px; cursor:pointer; font-size:.81rem; color:rgba(238,238,255,.7); transition:all .18s; }
  .chip:hover { border-color:rgba(244,114,182,.35); color:var(--pink); background:rgba(244,114,182,.07); }
  .chip::before { content:'● '; color:var(--green); font-size:.68rem; }
  .pl-hdr { display:flex; align-items:center; gap:14px; flex-wrap:wrap; background:rgba(255,255,255,.035); border:1px solid var(--border); border-radius:var(--r); padding:14px 18px; transition:border-color .2s; }
  .pl-hdr:hover { border-color:rgba(255,255,255,.13); }
  .pl-name { font-size:1.15rem; font-weight:700; flex:1; letter-spacing:-.015em; }
  .pl-acts { display:flex; gap:6px; flex-wrap:wrap; }
  .stat-tbl { display:flex; flex-direction:column; }
  .stat-row { display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid rgba(255,255,255,.04); font-size:.86rem; }
  .stat-row:last-child { border-bottom:none; } .sl { color:var(--muted); } .sv { font-weight:600; }
  .coin-big { font-size:1.9rem; font-weight:700; color:var(--yellow); letter-spacing:-.02em; }
  .cbtns { display:flex; gap:6px; }
  .cbtn { flex:1; padding:8px 4px; border-radius:var(--r-sm); border:1px solid var(--border); background:rgba(255,255,255,.04); color:rgba(238,238,255,.7); cursor:pointer; font-size:.81rem; transition:all .18s; font-family:var(--font); }
  .cbtn.give:hover { border-color:rgba(52,211,153,.4);  color:var(--green); background:rgba(52,211,153,.07); }
  .cbtn.take:hover { border-color:rgba(248,113,113,.4); color:var(--red);   background:rgba(248,113,113,.07); }
  .cbtn.setv:hover { border-color:rgba(96,165,250,.4);  color:var(--blue);  background:rgba(96,165,250,.07); }

  /* Economy */
  .bt-row { display:flex; align-items:center; gap:12px; padding:9px 14px; background:rgba(255,255,255,.03); border:1px solid var(--border); border-radius:var(--r-sm); transition:all .18s; }
  .bt-row:hover { border-color:rgba(255,255,255,.11); background:rgba(255,255,255,.05); }
  .bt-rank { font-size:.88rem; font-weight:700; color:var(--muted); min-width:28px; font-family:var(--mono); }
  .bt-rank.gold { color:#fbbf24; } .bt-rank.silver { color:#e2e8f0; } .bt-rank.bronze { color:#d97706; }
  .bt-name { flex:1; font-weight:500; font-family:var(--mono); font-size:.88rem; cursor:pointer; }
  .bt-name:hover { color:var(--pink); } .bt-coins { color:var(--yellow); font-weight:700; }

  /* Rights / Permissions */
  .rtabs { display:flex; gap:4px; }
  .rtab { padding:5px 20px; border-radius:8px 8px 0 0; border:1px solid var(--border); border-bottom:none; background:none; color:var(--muted); cursor:pointer; font-size:.86rem; font-family:var(--font); transition:all .18s; }
  .rtab.active { background:rgba(0,0,0,.3); color:var(--text); }
  .rbody { background:rgba(0,0,0,.25); border:1px solid var(--border); border-radius:0 var(--r) var(--r) var(--r); padding:16px; display:flex; flex-direction:column; gap:20px; flex:1; overflow-y:auto; }
  .rsec { display:flex; flex-direction:column; gap:8px; }
  .rhdr { display:flex; align-items:center; gap:10px; margin-bottom:2px; }
  .rttl { font-size:.74rem; font-weight:600; text-transform:uppercase; letter-spacing:.09em; color:var(--muted); flex:1; }
  .pentries { display:flex; flex-direction:column; gap:4px; }
  .pentry { display:flex; align-items:center; gap:10px; padding:8px 12px; background:rgba(255,255,255,.03); border:1px solid var(--border); border-radius:var(--r-sm); }
  .pentry-name { flex:1; font-family:var(--mono); font-size:.86rem; }
  .wl-pill { font-size:.74rem; padding:3px 10px; border-radius:12px; font-weight:500; }
  .wl-on  { background:rgba(52,211,153,.1);  color:var(--green); border:1px solid rgba(52,211,153,.25); }
  .wl-off { background:rgba(107,107,138,.1); color:var(--muted); border:1px solid var(--border); }
  .rank-hierarchy { display:flex; flex-direction:column; gap:6px; }
  .rank-card { display:flex; align-items:center; gap:14px; padding:12px 16px; border-radius:var(--r); border:1px solid; transition:filter .2s; }
  .rank-card:hover { filter:brightness(1.06); }
  .rank-icon { font-size:1.35rem; } .rank-label { font-size:.95rem; font-weight:700; } .rank-desc { font-size:.8rem; color:var(--muted); } .rank-count { margin-left:auto; font-size:.8rem; font-family:var(--mono); }
  .perm-player-list { display:flex; flex-direction:column; gap:4px; max-height:320px; overflow-y:auto; }
  .rights-pill { font-family:var(--mono); font-size:.7rem; padding:2px 8px; border-radius:4px; background:rgba(52,211,153,.08); border:1px solid rgba(52,211,153,.22); color:var(--green); white-space:nowrap; }
  .rights-pill.neg { background:rgba(248,113,113,.08); border-color:rgba(248,113,113,.22); color:var(--red); }
  .perm-row { display:flex; align-items:center; gap:10px; padding:6px 12px; background:rgba(255,255,255,.03); border:1px solid var(--border); border-radius:var(--r-sm); }
  .perm-name { flex:1; font-family:var(--mono); font-size:.86rem; cursor:pointer; } .perm-name:hover { color:var(--pink); }
  .rank-badge { font-size:.7rem; padding:2px 8px; border-radius:10px; border:1px solid; font-weight:600; }

  /* Bans */
  .ban-row { display:flex; align-items:center; gap:10px; padding:8px 12px; background:rgba(248,113,113,.05); border:1px solid rgba(248,113,113,.2); border-radius:var(--r-sm); }
  .ban-name { flex:1; font-family:var(--mono); font-size:.88rem; font-weight:600; color:var(--red); }
  .ban-reason { font-size:.8rem; color:var(--muted); flex:2; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  /* Commands */
  .cg-title { font-size:.92rem; font-weight:600; padding:4px 0 8px; border-bottom:1px solid var(--border); margin-bottom:4px; }
  .csec { display:flex; flex-direction:column; gap:4px; }
  .csec-lbl { font-size:.67rem; text-transform:uppercase; letter-spacing:.11em; color:var(--muted); padding:8px 0 4px; font-weight:600; }
  .crow { display:grid; grid-template-columns:155px 1fr 2fr auto; align-items:center; gap:10px; padding:7px 12px; background:rgba(255,255,255,.03); border:1px solid var(--border); border-radius:var(--r-sm); font-size:.85rem; transition:border-color .18s; }
  .crow:hover { border-color:rgba(255,255,255,.11); }
  .cn { font-family:var(--mono); color:var(--pink); font-weight:500; }
  .cu { font-family:var(--mono); color:var(--muted); font-size:.76rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .cd { color:rgba(238,238,255,.8); }
  .ca { font-size:.68rem; padding:2px 8px; border-radius:10px; background:rgba(248,113,113,.1); border:1px solid rgba(248,113,113,.25); color:var(--red); white-space:nowrap; font-weight:500; }
  .ch { display:none!important; }

  /* Modal */
  .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.72); z-index:200; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); }
  .modal-box { background:rgba(10,10,24,.92); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); border:1px solid rgba(255,255,255,.12); border-radius:18px; padding:28px; width:400px; max-width:90vw; display:flex; flex-direction:column; gap:16px; box-shadow:var(--sh); }
  .modal-box h3 { font-size:1.02rem; font-weight:600; letter-spacing:-.01em; }
  .modal-actions { display:flex; gap:8px; justify-content:flex-end; }

  /* Toast */
  .toast-wrap { position:fixed; top:16px; right:16px; z-index:300; display:flex; flex-direction:column; gap:6px; pointer-events:none; }
  .toast { padding:10px 18px; border-radius:10px; font-size:.86rem; font-weight:600; border:1px solid; transition:opacity .5s; max-width:320px; backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); }
  .toast-ok  { background:rgba(52,211,153,.12);  border-color:rgba(52,211,153,.3);  color:var(--green); }
  .toast-err { background:rgba(248,113,113,.12); border-color:rgba(248,113,113,.3); color:var(--red); }

  /* Resource monitor */
  .res-card { display:flex; flex-direction:column; gap:8px; }
  .res-row  { display:flex; flex-direction:column; gap:4px; }
  .res-lbl  { display:flex; justify-content:space-between; font-size:.76rem; color:var(--muted); }
  .res-lbl span:last-child { color:var(--text); font-weight:600; }
  .res-bar  { height:5px; background:rgba(255,255,255,.07); border-radius:3px; overflow:hidden; }

async function login() {
  const pw = document.getElementById('pw-input').value;
  const r  = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:pw}) });
  const d  = await r.json();
  if (d.ok) {
    TOKEN = d.token; localStorage.setItem('ph_token', TOKEN);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.remove('hidden');
    init();
  } else { document.getElementById('lerr').style.display = 'block'; }

function logout() { localStorage.removeItem('ph_token'); location.reload(); }

function buildNav() {
  const nb = document.getElementById('nav-body');
  nb.innerHTML = '';
  for (const item of NAV_DEF) {
    if (item.sec) {
      const d = document.createElement('div');
      d.className = 'nav-sec'; d.textContent = item.sec;
      nb.appendChild(d); continue;
    }
    const btn = document.createElement('button');
    btn.className = 'nav-item' + (PAGE === item.id ? ' active' : '');
    btn.onclick = () => nav(item.id);
    if (item.dot) {
      const srv = srvData[item.srv];
      btn.innerHTML = `<span class="ndot ${srv?.running?'on':'off'}"></span><span>${escH(item.label)}</span>`;
    } else {
      btn.innerHTML = `<span>${item.icon}</span><span>${escH(item.label)}</span>`;
    }
    nb.appendChild(btn);
  }
}

let _autoRefreshTimer = null;
const AUTO_REFRESH_PAGES = new Set(['gen_dash','smash_lb','dashboard','survival_dash','skyblock_dash']);

function startAutoRefresh(fn, ms = 30000) {
  if (_autoRefreshTimer) clearInterval(_autoRefreshTimer);
  _autoRefreshTimer = setInterval(fn, ms);
}

function nav(p) {
  if (_autoRefreshTimer) { clearInterval(_autoRefreshTimer); _autoRefreshTimer = null; }
  const wasStats = PAGE === 'sysmon' || PAGE === 'dashboard';
  const isStats  = p   === 'sysmon' || p   === 'dashboard';
  if (wasStats && !isStats && ws?.readyState === 1)
    ws.send(JSON.stringify({ type: 'unsubscribe_stats' }));
  PAGE = p;
  if (location.hash.slice(1) !== p) history.replaceState(null, '', '#' + p);
  buildNav(); renderPage();
  if (!wasStats && isStats && ws?.readyState === 1)
    ws.send(JSON.stringify({ type: 'subscribe_stats' }));
}

window.addEventListener('hashchange', () => {
  const h = location.hash.slice(1);
  if (h && h !== PAGE) nav(h);
});

async function loadOnlinePanel() {
  const el = document.getElementById('online-section'); if (!el) return;
  const all = [];
  for (const [k, srv] of Object.entries(srvData)) {
    if (!srv.rcon || !srv.running) continue;
    try {
      const r = await apiFetch(`/api/players/online?server=${k}`);
      if (r?.ok) { const d = await r.json(); all.push(...(d.players||[]).map(n=>({name:n,srv:srv.label}))); }
    } catch {}
  }
  if (!all.length) { el.innerHTML=''; return; }
  el.innerHTML = `<div class="online-panel">
    <span class="op-lbl">🟢 Online (${all.length}):</span>
    ${all.map(p=>`<span class="op-chip" onclick="nav('players');setTimeout(()=>loadPl('${escH(p.name)}'),120)" title="${escH(p.srv)}">${escH(p.name)}</span>`).join('')}
  </div>`;
}

async function loadSparkline() {
  const el = document.getElementById('sparkline-section'); if (!el) return;
  const r = await apiFetch('/api/metrics/players');
  if (!r?.ok) return;
  const { data } = await r.json();
  if (!data || data.length < 2) { el.innerHTML=''; return; }
  const counts = data.map(d=>d.count);
  const max = Math.max(...counts, 1);
  const W = 600, H = 56, pad = 4;
  const pts = data.map((d,i) => {
    const x = pad + (i / (data.length-1)) * (W - pad*2);
    const y = H - pad - ((d.count / max) * (H - pad*2));
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const last = data[data.length-1];
  el.innerHTML = `<div class="card" style="padding:12px 16px 8px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <span class="card-title" style="margin:0">📈 Spieler-Verlauf (letzte ${data.length * 5} Min)</span>
      <span style="font-size:.78rem;color:var(--muted)">Jetzt: <b style="color:var(--green)">${last.count}</b> · Max: <b>${max}</b></span>
    </div>
    <div class="sparkline-wrap">
      <svg class="sparkline-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
        <defs><linearGradient id="spk-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="var(--green)" stop-opacity=".35"/>
          <stop offset="100%" stop-color="var(--green)" stop-opacity="0"/>
        </linearGradient></defs>
        <polygon points="${pts} ${(W-pad).toFixed(1)},${H} ${pad},${H}" fill="url(#spk-grad)"/>
        <polyline points="${pts}" fill="none" stroke="var(--green)" stroke-width="2" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>`;
}

  el.className = 'modal-bg';
  el.innerHTML = `
    <div class="modal-box" style="width:360px">
      <h3>🔄 Netzwerk-Neustart</h3>
      <p style="color:var(--muted);font-size:.88rem">Startet auf allen Servern einen Countdown mit Bossbar und Chat-Ankündigungen.</p>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin:4px 0">

        <button class="btn btn-d" onclick="doNetworkRestart()">🔄 Jetzt starten</button>
      </div>
    </div>`;
  document.body.appendChild(el);
  setRestartMin(5);
  document.getElementById('restart-custom-min').addEventListener('input', function() {
    const v = parseInt(this.value);
    if (v >= 1 && v <= 60) {
      document.querySelectorAll('[id^="rmin-"]').forEach(b => b.style.borderColor = '');
      document.getElementById('restart-chosen').textContent = v + ' Minuten';
      el._chosen = v;
    }
  });
  el.addEventListener('click', e => { if (e.target === el) el.remove(); });
}

function setRestartMin(m) {
  const el = document.getElementById('restart-modal');
  el._chosen = m;
  document.querySelectorAll('[id^="rmin-"]').forEach(b => b.style.borderColor = '');
  const btn = document.getElementById('rmin-' + m);
  if (btn) btn.style.borderColor = 'var(--pink)';
  document.getElementById('restart-chosen').textContent = m + ' Minuten';
  document.getElementById('restart-custom-min').value = '';
}

async function doNetworkRestart() {
  const el = document.getElementById('restart-modal');
  const minutes = el?._chosen || 5;
  const confirmBtn = el?.querySelector('.btn-d');
  if (confirmBtn) { confirmBtn.disabled = true; confirmBtn.textContent = '…'; }
  const r = await apiFetch('/api/network/restart', { method:'POST', body: JSON.stringify({ minutes }) });
  const d = r ? await r.json() : null;
  el?.remove();
  if (d?.ok) showToast(`🔄 Netzwerk-Neustart in ${minutes} Minute${minutes > 1 ? 'n' : ''} angesetzt!`);

function fmtUp(ms) {

  return d>0?`${d}d ${h%24}h`:h>0?`${h}h ${m%60}m`:`${m}m`;
}

function renderCon(k) {

  setHdr(`🖥️ ${srv.label}`, `

    ${srv.running
      ? `<button class="btn btn-d" onclick="doSrv('${k}','stop')">⏹ Stop</button>
         <button class="btn"       onclick="doSrv('${k}','restart')">🔄 Restart</button>`
      : `<button class="btn btn-s" onclick="doSrv('${k}','start')">▶ Start</button>`}`);
  const c = document.getElementById('page-content');
  c.style.cssText = 'display:flex;flex-direction:column;overflow:hidden;';
  c.innerHTML = `<div class="con-wrap">
    <div style="display:flex;gap:6px;padding:6px 8px 0;flex-shrink:0">
      <input class="field" id="con-filter" placeholder="🔍 Log filtern…" oninput="applyConFilter()" style="flex:1;font-size:.8rem;padding:4px 8px">
      <button class="btn" style="font-size:.75rem;padding:3px 10px" onclick="document.getElementById('con-filter').value='';applyConFilter()">✕</button>
    </div>
    <div class="con-out" id="con-out"></div>
    <div class="con-in">
      <input class="field" id="cmd-in" placeholder="Befehl eingeben…" ${!srv.rcon?'disabled':''}>
      <button class="btn btn-p" onclick="sendCmd('${k}')">Senden</button>
    </div>
  </div>`;
  const out = document.getElementById('con-out');
  for (const line of (logBuf[srv.container]||[])) addLine(out, line, false);
  if (autoScroll && out) out.scrollTop = out.scrollHeight;
  document.getElementById('cmd-in')?.addEventListener('keydown', e => {
    if (e.key==='Enter') sendCmd(k);
    if (e.key==='ArrowUp')   { histIdx=Math.min(histIdx+1,cmdHist.length-1); e.target.value=cmdHist[histIdx]||''; }
    if (e.key==='ArrowDown') { histIdx=Math.max(histIdx-1,-1); e.target.value=cmdHist[histIdx]||''; }
  });
  out?.addEventListener('scroll', ()=>{ autoScroll = out.scrollTop+out.clientHeight >= out.scrollHeight-20; });
  subscribeLog(srv.container);
}

async function sendCmd(k) {
  const el = document.getElementById('cmd-in');
  const cmd = el?.value?.trim(); if (!cmd) return;
  el.value = ''; cmdHist.unshift(cmd); histIdx = -1;
  const out = document.getElementById('con-out');
  addLine(out, `> ${cmd}`, false, 'cmd');
  const r = await apiFetch(`/api/servers/${k}/command`, { method:'POST', body:JSON.stringify({command:cmd}) });
  if (!r) return;
  const d = await r.json();
  if (d.output) addLine(out, `← ${d.output}`, false);
  if (d.error)  addLine(out, `✗ ${d.error}`,  false);
}

function addLine(out, text, buf=true, cls='') {
  if (buf && conSrv) { const b=logBuf[conSrv]||[]; b.push(text); while(b.length>500)b.shift(); logBuf[conSrv]=b; }
  if (!out) return;
  _logPending.push({text, cls});
  if (!_logFlushTimer) {
    _logFlushTimer = requestAnimationFrame(() => {
      _logFlushTimer = null;
      const frag = document.createDocumentFragment();
      for (const {text: t, cls: c} of _logPending.splice(0)) {
        for (const line of t.split('\n')) {
          if (!line.trim()) continue;
          const d = document.createElement('div');
          d.className = 'll ' + (c || classLine(line));
          d.textContent = line;
          frag.appendChild(d);
        }
      }
      out.appendChild(frag);
      while (out.children.length > 1000) out.removeChild(out.firstChild);
      applyConFilter();
      if (autoScroll) out.scrollTop = out.scrollHeight;
    });
  }
}

function classLine(l) {
  const s = l.toLowerCase();
  if (s.includes('error')||s.includes('exception')||s.includes('fatal')) return 'error';
  if (s.includes('warn')) return 'warn';
  if (s.includes('info')) return 'info';
  return '';
}

function applyConFilter() {
  const q = (document.getElementById('con-filter')?.value || '').toLowerCase();
  const out = document.getElementById('con-out'); if (!out) return;
  for (const d of out.children) {
    d.style.display = (!q || d.textContent.toLowerCase().includes(q)) ? '' : 'none';
  }
}

async function plSearchSuggest() {

async function loadPl(name) {
  const si = document.getElementById('pl-search');
  if (si) si.value = name;
  const el = document.getElementById('pl-body'); if (!el) return;
  el.innerHTML = '<div class="empty">Lade…</div>';
  const r = await apiFetch('/api/players/info', { method:'POST', body:JSON.stringify({name}) });
  if (!r) { el.innerHTML='<div class="empty" style="color:var(--red)">Verbindungsfehler</div>'; return; }
  if (r.status===404) { el.innerHTML='<div class="empty" style="color:var(--red)">Spieler nicht gefunden</div>'; return; }
  if (!r.ok) { const e=await r.json(); el.innerHTML=`<div class="empty" style="color:var(--red)">${escH(e.error||'Fehler')}</div>`; return; }
  curPlayer = await r.json();
  const [br, clr, ivr, tlr, vtr, dcr, ugr, xrr] = await Promise.all([
    apiFetch(`/api/bank/player?name=${encodeURIComponent(name)}`),
    apiFetch(`/api/survival/claims?player=${encodeURIComponent(name)}`),
    apiFetch(`/api/survival/inventory?player=${encodeURIComponent(name)}`),
    apiFetch(`/api/players/timeline?name=${encodeURIComponent(name)}`),
    apiFetch(`/api/vote/player?name=${encodeURIComponent(name)}`),
    apiFetch(`/api/discord/player?name=${encodeURIComponent(name)}`),
    apiFetch(`/api/survival/upgrades?player=${encodeURIComponent(name)}`),
    apiFetch(`/api/survival/xray?player=${encodeURIComponent(name)}`)
  ]);
  if (br?.ok)  { const bd = await br.json();  curPlayer.bankBalance = bd.balance; curPlayer.bankInterest = bd.lastInterest; }
  if (clr?.ok) { const cd = await clr.json(); curPlayer.claims = cd.claims; }
  if (ivr?.ok) { const id = await ivr.json(); curPlayer.inventory = id.items; curPlayer.inventoryTime = id.snapshotTime; }
  if (tlr?.ok) { const td = await tlr.json(); curPlayer.firstJoin = td.first_join; curPlayer.lastSeen = td.last_seen; }
  if (vtr?.ok) { const vd = await vtr.json(); curPlayer.voteCoins = vd.coins; curPlayer.totalVotes = vd.totalVotes || vd.total_votes; }
  if (dcr?.ok) { const dd = await dcr.json(); curPlayer.discordId = dd.discord_id; curPlayer.discordVerified = !!dd.discord_id; }
  if (ugr?.ok) { const ud = await ugr.json(); curPlayer.upgrades = ud; }
  if (xrr?.ok) { const xd = await xrr.json(); curPlayer.xray = xd; }
  renderPlCard(curPlayer);
}

function renderUpgradesCard(p) {
  const ud = p.upgrades;
  if (!ud) return '';
  const NAMES         = ['','Normal','Verbessert','Schnell','Präzise','Blitz','Turbo','Ultra','Hyper','Quantum','Plasma'];
  const FORTUNE_NAMES = ['–','Glücklich','Ertragreich','Üppig','Gesegnet','Prosper','Fruchtbar','Goldgriff','Schicksalhaft','Legendär','Goldener Touch'];
  const FORTUNE_PCT   = [0,5,10,15,20,25,30,35,40,45,50];

  function furnaceRows(list) {
    if (!list.length) return '<tr><td colspan="7" style="text-align:center;color:var(--muted);font-size:.82rem">Keine Einträge</td></tr>';
    return list.map(r => {
      const loc  = r.world ? `${escH(r.world)} ${r.x}/${r.y}/${r.z}` : '<span style="color:var(--muted)">Im Inventar</span>';
      const fl   = r.fortuneLevel || 0;
      const fort = fl > 0
        ? `<span style="color:#4ade80">Lv${fl} ${FORTUNE_NAMES[fl]} (${FORTUNE_PCT[fl]}%)</span>`
        : `<span style="color:var(--muted)">–</span>`;
      return `<tr>
        <td>Lv ${r.level} <span style="color:var(--muted);font-size:.78rem">${NAMES[r.level]||'?'}</span></td>
        <td>${fort}</td>
        <td style="font-family:var(--mono);font-size:.78rem">${loc}</td>
        <td style="color:var(--yellow)">${r.paidSpeed.toLocaleString('de-DE')} 💰</td>
        <td style="color:#4ade80">${r.paidFortune.toLocaleString('de-DE')} 💰</td>
        <td style="color:var(--yellow);font-weight:600">${r.paid.toLocaleString('de-DE')} 💰</td>
      </tr>`;
    }).join('');
  }

  function hopperRows(list) {
    if (!list.length) return '<tr><td colspan="3" style="text-align:center;color:var(--muted);font-size:.82rem">Keine Einträge</td></tr>';
    return list.map(r => {
      const loc = r.world ? `${escH(r.world)} ${r.x}/${r.y}/${r.z}` : '<span style="color:var(--muted)">Im Inventar</span>';
      return `<tr>
        <td>Lv ${r.level} <span style="color:var(--muted);font-size:.78rem">${NAMES[r.level]||'?'}</span></td>
        <td style="font-family:var(--mono);font-size:.78rem">${loc}</td>
        <td style="color:var(--yellow);font-weight:600">${r.paid.toLocaleString('de-DE')} 💰</td>
      </tr>`;
    }).join('');
  }

  const hasFurnaces = ud.furnaces?.length > 0;
  const hasHoppers  = ud.hoppers?.length  > 0;
  if (!hasFurnaces && !hasHoppers) return '';
  return `<div class="card" style="margin-top:12px">
    <div class="card-title">⚒ Upgrades (Öfen &amp; Trichter)</div>

    <div style="font-size:.82rem;font-weight:600;color:var(--gold,#f0a030);margin:8px 0 4px">🔥 Öfen (${ud.furnaces.length})</div>

        <tbody>${furnaceRows(ud.furnaces)}</tbody>
      </table>
    </div>` : ''}
    ${hasHoppers ? `
    <div style="font-size:.82rem;font-weight:600;color:var(--blue);margin:8px 0 4px">📦 Trichter (${ud.hoppers.length})</div>
    <div style="overflow-x:auto">
      <table class="sql-tbl" style="width:100%">
        <thead><tr><th>⚡ Speed</th><th>Koordinaten</th><th>Bezahlt 💰</th></tr></thead>
        <tbody>${hopperRows(ud.hoppers)}</tbody>
      </table>
    </div>` : ''}

      Gesamt investiert: <strong style="color:var(--yellow)">${(ud.totalPaid||0).toLocaleString('de-DE')} 💰</strong>

}

function slotLabel(s) {

  if (s===36) return 'Boots';
  if (s===37) return 'Leggings';
  if (s===38) return 'Brustpanzer';
  if (s===39) return 'Helm';
  if (s===40) return 'Nebenhand';
  return `Slot ${s}`;
}

function renderXrayCard(p) {
  const x = p.xray;
  if (!x) return '';

  const score = x.score ?? 0;
  const scoreColor = score >= 70 ? 'var(--red)' : score >= 40 ? '#f39c12' : 'var(--green)';
  const scoreLbl   = score >= 70 ? '⚠️ Verdächtig' : score >= 40 ? '🔶 Auffällig' : '✅ Unauffällig';

  const ORE_NAMES = {
    diamond: '💎 Diamant', ancient_debris: '🔥 Ancient Debris',
    emerald: '💚 Smaragd', gold: '🟡 Gold', iron: '🔘 Eisen',
    coal: '⬛ Kohle', lapis: '🔵 Lapislazuli', redstone: '🔴 Redstone', copper: '🟠 Kupfer'
  };
  const ores = x.ores || {};

  const oreRows = Object.entries(ORE_NAMES)
    .filter(([k]) => ores[k] > 0)
    .map(([k, label]) => {
      const cnt  = ores[k] || 0;
      const rate = x.totalBlocks >= 300 ? (cnt / x.totalBlocks * 1000).toFixed(2) : '—';

function drawClaimsMap(canvasId, claims, ownerName) {
  const canvas = document.getElementById(canvasId); if (!canvas) return;
  const rect = canvas.getBoundingClientRect();
  canvas.width  = Math.floor(rect.width  || 600);
  canvas.height = Math.floor(rect.height || 280);
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  if (!claims.length) return;

  const xs = claims.map(c => c.chunk_x), zs = claims.map(c => c.chunk_z);
  const minX = Math.min(...xs) - 2, maxX = Math.max(...xs) + 2;
  const minZ = Math.min(...zs) - 2, maxZ = Math.max(...zs) + 2;
  const rangeX = maxX - minX || 1, rangeZ = maxZ - minZ || 1;
  const cellW = canvas.width  / rangeX;
  const cellH = canvas.height / rangeZ;
  const cell  = Math.max(2, Math.min(cellW, cellH));

  const offX = (canvas.width  - cell * rangeX) / 2;
  const offZ = (canvas.height - cell * rangeZ) / 2;

  ctx.fillStyle = 'rgba(46,204,113,0.5)';
  ctx.strokeStyle = 'rgba(46,204,113,0.9)';
  ctx.lineWidth = 1;
  for (const c of claims) {
    const px = offX + (c.chunk_x - minX) * cell;
    const pz = offZ + (c.chunk_z - minZ) * cell;
    ctx.fillRect(px, pz, cell - 1, cell - 1);
    ctx.strokeRect(px, pz, cell - 1, cell - 1);
  }
  ctx.fillStyle = 'rgba(255,255,255,.35)';
  ctx.font = '10px monospace';
  ctx.fillText(`${claims.length} Chunks · ${ownerName}`, 6, 14);

  // Tooltip on hover
  canvas.onmousemove = ev => {
    const br = canvas.getBoundingClientRect();
    const mx = (ev.clientX - br.left) * (canvas.width  / br.width);
    const mz = (ev.clientY - br.top)  * (canvas.height / br.height);
    const cx = Math.floor((mx - offX) / cell) + minX;
    const cz = Math.floor((mz - offZ) / cell) + minZ;
    const hit = claims.find(c => c.chunk_x === cx && c.chunk_z === cz);
    canvas.title = hit ? `Chunk ${cx}/${cz} · Block ${cx*16+8}/${cz*16+8}` : '';
  };
}

async function renderPermRights(el) {
  el.innerHTML = `<div class="empty" style="margin-top:12px">Lade Rechte…</div>`;
  const r = await apiFetch('/api/permissions/groups');
  if (!r?.ok) {
    let msg = `HTTP ${r?.status||'?'}`;
    try { const e = await r.json(); msg = e.error || msg; } catch {}
    el.innerHTML = `<div class="empty" style="color:var(--red);margin-top:12px">Fehler: ${escH(msg)}</div>`;
    return;
  }
  const { groups } = await r.json();

  // Suchfeld + Filter-State
  let rightsFilter = '';
  const KNOWN_RANKS = RANK_DEFS.map(r => r.id);

  function buildRightsHtml() {
    const q = rightsFilter.toLowerCase();
    let html = '';
    // Zuerst bekannte Ränge in Reihenfolge, dann Rest
    const allGroups = [
      ...KNOWN_RANKS.filter(k => groups[k]),
      ...Object.keys(groups).filter(k => !KNOWN_RANKS.includes(k)).sort()
    ];
    for (const gname of allGroups) {
      const perms = groups[gname] || [];
      const filtered = q ? perms.filter(p => p.permission.toLowerCase().includes(q)) : perms;
      if (!filtered.length && q) continue;
      const rd = rankDef(gname);
      const granted  = filtered.filter(p => p.value);
      const negated  = filtered.filter(p => !p.value);
      html += `<div class="card" style="border-color:${rd.border};margin-top:0">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <span style="font-size:1.1rem">${rd.icon}</span>
          <span style="font-weight:700;color:${rd.color}">${escH(rd.label || gname)}</span>
          <span style="color:var(--muted);font-size:.78rem;margin-left:4px">${granted.length} Rechte${negated.length ? ` · ${negated.length} negiert` : ''}</span>
        </div>
        ${granted.length ? `<div style="display:flex;flex-wrap:wrap;gap:4px">
          ${granted.map(p => `<span class="rights-pill" title="${escH(p.server)}">${escH(p.permission)}</span>`).join('')}
        </div>` : '<span style="color:var(--muted);font-size:.82rem">Keine Rechte</span>'}
        ${negated.length ? `<div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:4px">
          ${negated.map(p => `<span class="rights-pill neg" title="${escH(p.server)}">- ${escH(p.permission)}</span>`).join('')}
        </div>` : ''}
      </div>`;
    }
    return html || '<div class="empty">Keine Gruppen gefunden</div>';
  }

  el.innerHTML = `
    <div style="display:flex;gap:8px;align-items:center;margin-top:8px;margin-bottom:12px;flex-wrap:wrap">
      <input class="field fsm" id="rights-search" placeholder="Permission filtern…" style="width:260px"
        oninput="document.getElementById('rights-q').textContent='';window._rightsFilter=this.value;document.getElementById('rights-grid').innerHTML=window._buildRightsHtml()">
      <span style="color:var(--muted);font-size:.82rem">${Object.values(groups).reduce((s,a)=>s+a.length,0)} Einträge in ${Object.keys(groups).length} Gruppen</span>
    </div>
    <div id="rights-grid" style="display:flex;flex-direction:column;gap:10px">${buildRightsHtml()}</div>`;

  // Live-Filter ohne Re-Fetch
  window._buildRightsHtml = () => {
    rightsFilter = document.getElementById('rights-search')?.value || '';
    return buildRightsHtml();
  };
}

  let html = `<div style="margin-top:8px;display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap">
    <input class="field fsm" id="perm-search" placeholder="Spieler filtern…" oninput="filterPermPlayers()" style="width:220px">
    <span style="color:var(--muted);font-size:.85rem;align-self:center">${players.length} Spieler gesamt</span>
  </div>
  <div id="perm-player-grid" style="display:flex;flex-direction:column;gap:12px">`;

  for (const rd of RANK_DEFS) {
    const list = grouped[rd.id];
    if (!list.length) continue;
    html += `<div class="perm-group" data-rank="${rd.id}">
      <div style="font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:${rd.color};margin-bottom:4px">
        ${rd.icon} ${rd.label} (${list.length})
      </div>
      <div class="perm-player-list">
        ${list.map(p=>`<div class="perm-row" data-name="${escH(p.name.toLowerCase())}">
          <span class="perm-name" onclick="nav('players');setTimeout(()=>loadPl('${escH(p.name)}'),150)">${escH(p.name)}</span>
          ${rankBadge(rd.id)}
          <button class="btn-xs g" onclick="quickRankChange('${escH(p.name)}','${rd.id}')">Ändern</button>
        </div>`).join('')}
      </div>
    </div>`;
  }
  html += '</div>';
  el.innerHTML = html;
}

function filterPermPlayers() {
  const q = (document.getElementById('perm-search')?.value || '').toLowerCase();
  document.querySelectorAll('#perm-player-grid .perm-row').forEach(row => {
    const name = row.dataset.name || '';
    row.style.display = name.includes(q) ? '' : 'none';
  });
  document.querySelectorAll('#perm-player-grid .perm-group').forEach(grp => {
    const visible = [...grp.querySelectorAll('.perm-row')].some(r => r.style.display !== 'none');
    grp.style.display = visible ? '' : 'none';
  });
}

function quickRankChange(name, currentRank) {
  const rankOpts = RANK_DEFS.map(r=>`<option value="${r.id}" ${r.id===currentRank?'selected':''}>${r.icon} ${r.label}</option>`).join('');
  showModal(`🎖️ Rang ändern: ${name}`, `
    <select class="field" id="m-rank">${rankOpts}</select>
  `, 'Setzen', async () => {
    const rank = document.getElementById('m-rank')?.value;
    const r = await apiFetch('/api/players/action',{method:'POST',body:JSON.stringify({name,type:'rank_set',rank})});
    const d = r ? await r.json() : null;
    showToast(d?.ok ? `✓ ${name} → ${rank}` : `✗ ${d?.error||'Fehler'}`, d?.ok);
    if (d?.ok) loadPermTab('players');
  });
}

function switchR(t) {
  rTab = t;
  const labels = { lobby:'Lobby', survival:'Survival', smash:'Smash' };
  document.querySelectorAll('.rtab').forEach(b=>b.classList.toggle('active',b.textContent.trim()===labels[t]));
  const el=document.getElementById('rbody'); if(el) el.innerHTML='<div class="empty">Lade…</div>';
  loadR(t);
}

async function loadR(srv) {
  const [or, wr] = await Promise.all([apiFetch(`/api/servers/${srv}/ops`), apiFetch(`/api/servers/${srv}/whitelist`)]);
  const od = or?.ok?await or.json():{ops:[]};
  const wd = wr?.ok?await wr.json():{whitelist:[],enabled:false};
  rCache[srv] = { ops:od.ops||[], wl:wd.whitelist||[], wlOn:!!wd.enabled };
  renderRBody(srv);
}

function renderRBody(srv) {
  const el = document.getElementById('rbody'); if (!el) return;
  const d = rCache[srv]||{ops:[],wl:[],wlOn:false};
  const opRows = d.ops.length
    ? d.ops.map(op=>`<div class="pentry"><span class="pentry-name">👑 ${escH(op.name||op)}</span><button class="btn-xs" onclick="rDeop('${srv}','${escH(op.name||op)}')">De-OP</button></div>`).join('')
    : '<div style="color:var(--muted);font-size:.85rem;padding:4px">Keine Operatoren</div>';
  const wlRows = d.wl.length
    ? d.wl.map(w=>`<div class="pentry"><span class="pentry-name">${escH(w.name||w)}</span><button class="btn-xs" onclick="rWlRm('${srv}','${escH(w.name||w)}')">Entfernen</button></div>`).join('')
    : '<div style="color:var(--muted);font-size:.85rem;padding:4px">Whitelist ist leer</div>';
  el.innerHTML = `
    <div class="rsec">
      <div class="rhdr"><span class="rttl">👑 Operatoren (OP)</span></div>
      <div class="pentries">${opRows}</div>
      <div class="irow" style="margin-top:4px">
        <input class="field fsm" id="op-in" placeholder="Spielername…" onkeydown="if(event.key==='Enter')rOp('${srv}')">
        <button class="btn-xs g" onclick="rOp('${srv}')">OP geben</button>
      </div>
      <div id="op-msg" style="display:none" class="msg"></div>
    </div>
    <hr class="divider">
    <div class="rsec">
      <div class="rhdr">
        <span class="rttl">📋 Whitelist</span>
        <span class="wl-pill ${d.wlOn?'wl-on':'wl-off'}">${d.wlOn?'AN':'AUS'}</span>
        <button class="btn-xs ${d.wlOn?'':'g'}" onclick="rWlToggle('${srv}')">${d.wlOn?'Deaktivieren':'Aktivieren'}</button>
      </div>
      <div class="pentries">${wlRows}</div>
      <div class="irow" style="margin-top:4px">
        <input class="field fsm" id="wl-in" placeholder="Spielername…" onkeydown="if(event.key==='Enter')rWlAdd('${srv}')">
        <button class="btn-xs g" onclick="rWlAdd('${srv}')">Hinzufügen</button>
      </div>
      <div id="wl-msg" style="display:none" class="msg"></div>
    </div>`;
}

async function rOp(srv) {
  const n=document.getElementById('op-in')?.value?.trim(); if(!n) return;

function renderCmds() {
  setHdr('📋 Befehlsreferenz', `<input class="field fsm" id="cmd-q" placeholder="Suchen…" oninput="filterCmds()" style="width:200px">`);
  document.getElementById('page-content').innerHTML = `<div class="page" id="cmd-page">${buildCmdHtml('')}</div>`;
}
function filterCmds() {
  const q=(document.getElementById('cmd-q')?.value||'').toLowerCase();
  const p=document.getElementById('cmd-page'); if(p) p.innerHTML=buildCmdHtml(q);
}
function buildCmdHtml(q) {
  let html='';
  for (const grp of CMD_DATA) {
    let gH=''; let gV=false;
    for (const sec of grp.sections) {
      let sH=''; let sV=false;
      for (const cmd of sec.cmds) {
        const show=!q||cmd.n.toLowerCase().includes(q)||cmd.d.toLowerCase().includes(q)||cmd.u.toLowerCase().includes(q);
        if(show){sV=true;gV=true;}
        sH+=`<div class="crow${show?'':' ch'}"><span class="cn">${escH(cmd.n)}</span><span class="cu">${escH(cmd.u)}</span><span class="cd">${escH(cmd.d)}</span>${cmd.admin?'<span class="ca">Admin</span>':'<span></span>'}</div>`;
      }
      gH+=`<div class="csec${sV?'':' ch'}"><div class="csec-lbl">${escH(sec.label)}</div>${sH}</div>`;
    }
    html+=`<div${gV?'':' class="ch"'}><div class="cg-title">${escH(grp.server)}</div>${gH}</div>`;
  }
  return html||'<div class="empty">Keine Befehle gefunden</div>';
}

async function loadFriendsStats() {
  const el = document.getElementById('stats-friends-section'); if (!el) return;
  const r = await apiFetch('/api/survival/friends');
  if (!r?.ok) return;
  const d = await r.json();
  if (!d.ok) return;
  const cls = ['g1','g2','g3'];
  el.innerHTML = `
    <div class="card">
      <div class="card-title">🤝 Freunde-Netzwerk</div>
      <div class="stat-tbl" style="margin-top:6px">
        <div class="stat-row"><span class="sl">Freundschaften gesamt</span><span class="sv" style="color:var(--green)">${Number(d.totalFriendships).toLocaleString('de-DE')}</span></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">👥 Top Vernetzte Spieler</div>
      <div class="lb-table" style="margin-top:6px">
        ${(d.top||[]).map((p,i)=>`<div class="lb-row">
          <span class="lb-pos ${cls[i]||''}">#${i+1}</span>
          <span class="lb-name" onclick="nav('players');setTimeout(()=>loadPl('${escH(p.name)}'),120)">${escH(p.name)}</span>

}

async function loadStatsData() {
  const r = await apiFetch('/api/stats/overview');
  if (!r?.ok) { document.getElementById('stats-kpi')?.querySelector &&
    (document.getElementById('stats-kpi').innerHTML='<div class="empty" style="grid-column:1/-1;color:var(--red)">Datenbankfehler</div>'); return; }
  statsData = await r.json();
  renderStatsPage();
}

function switchStatsTab(t) {
  statsTab = t;
  document.querySelectorAll('#stats-tabs .btn').forEach(b => {
    const map = { playtime:'⏱ Spielzeit', mob_kills:'⚔ Mob-Kills', deaths:'💀 Tode', blocks:'⛏ Blöcke' };
    b.className = 'btn' + (b.textContent.trim() === map[t] ? ' btn-p' : '');
  });
  renderStatsBody();
}

function renderStatsPage() {
  if (!statsData) return;

// ── Backup ────────────────────────────────────────────────────────────────
const BK_SERVERS = [
  { id:'survival',   label:'⛏️ Survival'  },
  { id:'lobby',      label:'🏛️ Lobby'     },
  { id:'smash',      label:'⚔️ Smash'     },
  { id:'skyblock',   label:'🌴 SkyBlock'  },
  { id:'generators', label:'⚙️ Generators'},
];

async function renderBackup() {
  setHdr('💾 Backup', '');
  document.getElementById('page-content').innerHTML = `<div class="page">
    <div class="card" style="margin-bottom:1rem">
      <div class="card-title">🚀 Alle Server sichern</div>
      <p style="font-size:.84rem;color:var(--muted);margin-bottom:.75rem">Führt <code style="color:var(--pink)">backup.sh</code> aus – sichert alle Welten auf einmal. Kann 1–3 Minuten dauern.</p>
      <button class="btn btn-p" id="bk-btn-all" onclick="doBackupAll()">💾 Alle jetzt sichern</button>
      <div class="bk-status" id="bk-status-all"></div>
    </div>
    <div class="g3" style="margin-bottom:1rem">
      ${BK_SERVERS.map(s=>`
        <div class="card bk-card">
          <div class="card-title" style="font-size:.9rem;font-weight:700">${s.label}</div>
          <button class="btn btn-sm" id="bk-btn-${s.id}" onclick="doBackup('${s.id}')" style="margin-top:.5rem">💾 Sichern</button>
          <div class="bk-status" id="bk-status-${s.id}"></div>
        </div>`).join('')}
    </div>
    <div class="card">
      <div class="card-title" style="display:flex;align-items:center;gap:.5rem">
        📁 Vorhandene Backups
        <button class="btn btn-sm" onclick="loadBackupList()" style="margin-left:auto">🔄 Aktualisieren</button>
      </div>
      <div id="bk-list" style="margin-top:.75rem;font-size:.84rem;color:var(--muted)">Wird geladen…</div>
    </div>
  </div>`;
  loadBackupList();
}

async function loadBackupList() {
  const el = document.getElementById('bk-list');
  if (!el) return;
  const r = await apiFetch('/api/backups');
  const d = r ? await r.json() : null;
  const list = d?.backups || [];
  if (!list.length) { el.textContent = 'Keine Backups vorhanden.'; return; }

  // Nach Server gruppieren
  const groups = {};
  for (const b of list) {
    const srv = b.name.split('_')[0];
    if (!groups[srv]) groups[srv] = [];
    groups[srv].push(b);
  }

  const icons = { survival:'⛏️', lobby:'🏛️', smash:'⚔️', skyblock:'🌴', generators:'⚙️' };

  el.innerHTML = Object.entries(groups).map(([srv, items]) => `
    <div style="margin-bottom:1rem">
      <div style="font-weight:700;color:var(--pink);margin-bottom:.4rem">${icons[srv]||'📦'} ${srv.charAt(0).toUpperCase()+srv.slice(1)} <span style="font-weight:400;color:var(--muted);font-size:.8rem">(${items.length})</span></div>
      <table style="width:100%;border-collapse:collapse">
        <thead><tr style="color:var(--muted);font-size:.8rem;text-align:left">
          <th style="padding:.25rem .5rem">Datei</th>
          <th style="padding:.25rem .5rem">Größe</th>
          <th style="padding:.25rem .5rem">Erstellt</th>
          <th style="padding:.25rem .5rem"></th>
        </tr></thead>
        <tbody>${items.map(b=>`<tr style="border-top:1px solid var(--border)">
          <td style="padding:.25rem .5rem;font-family:var(--mono);font-size:.78rem;color:var(--muted)">${b.name}</td>
          <td style="padding:.25rem .5rem;font-size:.83rem">${fmtBytes(b.size)}</td>
          <td style="padding:.25rem .5rem;font-size:.83rem">${new Date(b.mtime).toLocaleString('de-DE')}</td>
          <td style="padding:.25rem .5rem"><button class="btn btn-sm" style="background:var(--red,#c0392b);color:#fff;border-color:var(--red,#c0392b)" onclick="confirmRestore('${b.name}')">↩ Wiederherstellen</button></td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`).join('');
}

function fmtBytes(b) {
  if (b >= 1073741824) return (b/1073741824).toFixed(1)+' GB';
  if (b >= 1048576)    return (b/1048576).toFixed(1)+' MB';
  if (b >= 1024)       return (b/1024).toFixed(1)+' KB';
  return b+' B';
}

async function doBackupAll() {
  const btn = document.getElementById('bk-btn-all');
  const st  = document.getElementById('bk-status-all');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Läuft…'; }
  if (st)  { st.className = 'bk-status msg'; st.textContent = 'backup.sh wird ausgeführt…'; }
  const r = await apiFetch('/api/backups/run', { method:'POST' });
  const d = r ? await r.json() : null;
  if (btn) { btn.disabled = false; btn.textContent = '💾 Alle jetzt sichern'; }
  if (st)  {
    st.className = `bk-status msg ${d?.ok?'msg-ok':'msg-err'}`;
    st.textContent = d?.ok ? '✓ Alle Backups erstellt!' : `✗ ${d?.error||'Fehler'}`;
  }
  showToast(d?.ok ? '✓ Alle Backups erstellt' : '✗ Backup fehlgeschlagen', d?.ok);
  if (d?.ok) loadBackupList();
}

async function doBackup(srv) {
  const btn = document.getElementById(`bk-btn-${srv}`);
  const st  = document.getElementById(`bk-status-${srv}`);
  if (btn) { btn.disabled = true; btn.textContent = '⏳…'; }
  if (st)  { st.className = 'bk-status msg'; st.textContent = 'Wird erstellt…'; }
  const r = await apiFetch(`/api/backup/${srv}`, { method:'POST' });
  const d = r ? await r.json() : null;
  if (btn) { btn.disabled = false; btn.textContent = '💾 Sichern'; }
  if (st)  {
    st.className = `bk-status msg ${d?.ok?'msg-ok':'msg-err'}`;
    st.textContent = d?.ok ? `✓ ${fmtBytes(d.size||0)}` : `✗ ${d?.error||'Fehler'}`;
  }
  showToast(d?.ok ? `✓ Backup (${srv}) erstellt` : `✗ Backup (${srv}) fehlgeschlagen`, d?.ok);
  if (d?.ok) loadBackupList();
}

function confirmRestore(file) {
  const srv = file.split('_')[0];
  const modal = document.createElement('div');
  modal.id = 'restore-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center';
  modal.innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.5rem;max-width:440px;width:90%;box-shadow:0 8px 32px #0008">
      <div style="font-size:1.1rem;font-weight:700;color:var(--pink);margin-bottom:.75rem">↩ Backup wiederherstellen</div>
      <p style="font-size:.87rem;margin-bottom:.5rem">Du bist dabei, folgendes Backup einzuspielen:</p>
      <div style="font-family:var(--mono);font-size:.8rem;color:var(--muted);background:var(--bg);padding:.5rem .75rem;border-radius:6px;margin-bottom:.75rem;word-break:break-all">${file}</div>
      <p style="font-size:.84rem;color:#e67e22;margin-bottom:1rem">⚠️ Der Server <strong>${srv}</strong> wird dafür kurz gestoppt. Aktuelle Welt-Daten werden überschrieben!</p>
      <div style="display:flex;gap:.75rem;justify-content:flex-end">
        <button class="btn btn-sm" onclick="document.getElementById('restore-modal').remove()">Abbrechen</button>
        <button class="btn btn-sm" id="restore-confirm-btn" style="background:#c0392b;color:#fff;border-color:#c0392b" onclick="doRestore('${file}')">↩ Jetzt wiederherstellen</button>
      </div>
      <div id="restore-modal-status" style="margin-top:.75rem;font-size:.83rem"></div>
    </div>`;
  document.body.appendChild(modal);
}

async function doRestore(file) {
  const btn = document.getElementById('restore-confirm-btn');
  const st  = document.getElementById('restore-modal-status');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Wird wiederhergestellt…'; }
  if (st)  { st.textContent = 'Server wird gestoppt, Backup wird entpackt…'; st.style.color = 'var(--muted)'; }

  const r = await apiFetch('/api/restore', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ file }) });
  const d = r ? await r.json() : null;

  if (d?.ok) {
    if (st) { st.textContent = '✓ ' + (d.message || 'Erfolgreich wiederhergestellt!'); st.style.color = 'var(--green,#27ae60)'; }
    showToast('✓ Backup wiederhergestellt', true);
    setTimeout(() => { document.getElementById('restore-modal')?.remove(); loadBackupList(); }, 2500);
  } else {
    if (btn) { btn.disabled = false; btn.textContent = '↩ Jetzt wiederherstellen'; }
    if (st)  { st.textContent = '✗ ' + (d?.error || 'Fehler'); st.style.color = '#c0392b'; }
    showToast('✗ Wiederherstellung fehlgeschlagen', false);
  }
}

// ── SQL-Konsole ───────────────────────────────────────────────────────────
const SQL_HINTS = [
  { db:'pinkhorizon',  q:'SELECT uuid, name, rank FROM players ORDER BY FIELD(rank,\'owner\',\'admin\',\'dev\',\'moderator\',\'supporter\',\'vip\',\'spieler\') LIMIT 50' },
  { db:'ph_survival',  q:'SELECT p.name, e.balance FROM sv_economy e JOIN pinkhorizon.players p ON e.uuid=p.uuid ORDER BY e.balance DESC LIMIT 20' },

          <option value="pinkhorizon">pinkhorizon</option>

          <option value="ph_generators">ph_generators</option>

          <option value="ph_skyblock">ph_skyblock</option>
        </select>
        <span style="color:var(--muted);font-size:.82rem">Nur SELECT erlaubt</span>
      </div>
      <textarea class="field" id="sql-query" placeholder="SELECT …" rows="3" onkeydown="if(event.ctrlKey&&event.key==='Enter')runQuery()"></textarea>
      <div class="irow">
        <button class="btn btn-p" onclick="runQuery()">▶ Ausführen <span style="font-size:.72rem;opacity:.7">(Strg+Enter)</span></button>
        <div id="sql-info" style="font-size:.82rem;color:var(--muted)"></div>
      </div>
      <div class="sql-hints">
        ${SQL_HINTS.map((h,i)=>`<span class="sql-hint" onclick="setSqlHint(${i})" title="${escH(h.q)}">${escH(h.q.slice(0,55))}…</span>`).join('')}
      </div>
    </div>
    <div class="sql-body" id="sql-body"><div class="empty">Abfrage eingeben und ausführen</div></div>
  </div>`;
}

function setSqlHint(i) {
  const h = SQL_HINTS[i];
  const q = document.getElementById('sql-query');
  const d = document.getElementById('sql-db');
  if (q) q.value = h.q;
  if (d) d.value = h.db;
}

async function runQuery() {
  const query    = document.getElementById('sql-query')?.value?.trim();
  const database = document.getElementById('sql-db')?.value;
  const info     = document.getElementById('sql-info');
  const body     = document.getElementById('sql-body');
  if (!query) return;
  if (body) body.innerHTML = '<div class="empty">Lade…</div>';
  if (info) info.textContent = '';
  const t0 = Date.now();
  const r  = await apiFetch('/api/db/query', { method:'POST', body:JSON.stringify({ query, database }) });
  const d  = r ? await r.json() : null;
  const ms = Date.now() - t0;
  if (!d?.ok) {
    if (body) body.innerHTML = `<div class="empty" style="color:var(--red)">✗ ${escH(d?.error||'Verbindungsfehler')}</div>`;
    return;
  }
  if (info) info.textContent = `${d.count} Zeile(n) · ${ms}ms`;
  if (!body) return;
  if (!d.rows.length) { body.innerHTML = '<div class="empty">Keine Ergebnisse</div>'; return; }
  const cols = d.columns;
  body.innerHTML = `<div style="overflow-x:auto"><table class="sql-tbl">
    <thead><tr>${cols.map(c=>`<th>${escH(c)}</th>`).join('')}</tr></thead>
    <tbody>${d.rows.map(row=>`<tr>${cols.map(c=>`<td title="${escH(String(row[c]??''))}">${escH(String(row[c]??'NULL'))}</td>`).join('')}</tr>`).join('')}</tbody>
  </table></div>`;
}

function insertMotdCode(code) {
  const focused = document.activeElement;
  if (focused && (focused.id==='motd-lobby'||focused.id==='motd-survival')) {
    const s = focused.selectionStart, e = focused.selectionEnd;
    focused.value = focused.value.slice(0,s) + code + focused.value.slice(e);
    focused.selectionStart = focused.selectionEnd = s + code.length;
    focused.focus();
  }
}

async function saveMotd(srv) {

      tab === 'kills'    ? t.includes('kill')    :

      tab === 'coins'    ? t.includes('münz')    :
      tab === 'prestige' ? t.includes('prestige') :

}

      <div class="card stat-card"><span class="stat-icon">📈</span><div><div class="stat-lbl">Server $/h (24h)</div><div class="stat-val" id="gk-income" style="color:var(--green)">—</div></div></div>
    </div>
    <div class="g2">
      <div class="card" style="padding:14px 18px">
        <div style="font-weight:600;margin-bottom:10px">🟢 Online auf IdleForge</div>
        <div id="gen-online" style="color:var(--muted);font-size:0.9em">Lade…</div>
      </div>
      <div class="card" style="padding:14px 18px">
        <div style="font-weight:600;margin-bottom:10px">🔍 Spieler-Lookup</div>
        <div class="irow">
          <input class="field" id="gen-pl-search" placeholder="Spielername…" onkeydown="if(event.key==='Enter')genLookupPlayer()">
          <button class="btn btn-p" onclick="genLookupPlayer()">Suchen</button>
        </div>
        <div id="gen-pl-result" style="margin-top:10px"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">📈 Server-Einkommen (letzte 24h)</div>
      <div id="gen-income-chart" style="padding:8px 0"><div class="empty">Lade…</div></div>
    </div>
    <div class="card">
      <div class="card-title">🏆 Top 10 – Geld</div>
      <div id="gen-top-table"><div class="empty">Lade…</div></div>
    </div>
  </div>`;

  const [ovRes, onRes, lbRes, incRes] = await Promise.all([
    apiFetch('/api/generators/overview'),
    apiFetch('/api/generators/online'),
    apiFetch('/api/generators/leaderboard?type=money'),
    apiFetch('/api/generators/server-income')
  ]);

  if (ovRes?.ok) {
    const ov = await ovRes.json();
    document.getElementById('gk-players').textContent    = Number(ov.totalPlayers    ?? 0).toLocaleString('de-DE');
    document.getElementById('gk-money').textContent      = '$' + Number(ov.totalMoney ?? 0).toLocaleString('de-DE');
    document.getElementById('gk-gens').textContent       = Number(ov.totalGenerators  ?? 0).toLocaleString('de-DE');
    document.getElementById('gk-prestige').textContent   = Number(ov.topPrestige      ?? 0).toLocaleString('de-DE');
    document.getElementById('gk-guilds').textContent     = Number(ov.totalGuilds      ?? 0).toLocaleString('de-DE');
    document.getElementById('gk-shards').textContent     = Number(ov.totalShards      ?? 0).toLocaleString('de-DE');
    document.getElementById('gk-shard-gens').textContent = Number(ov.totalShardGens   ?? 0).toLocaleString('de-DE');
  }
  if (incRes?.ok) {
    const inc = await incRes.json();
    if (inc.data?.length) {
      const avg = inc.data.reduce((s,r)=>s+r.total,0) / inc.data.length;
      document.getElementById('gk-income').textContent = '$' + Math.round(avg).toLocaleString('de-DE') + '/h';
      const chartEl = document.getElementById('gen-income-chart');
      if (chartEl) {
        const vals = inc.data.map(r => r.total);
        const maxV = Math.max(...vals, 1);
        const bars = vals.map((v, i) => {
          const h = Math.max(4, Math.round((v / maxV) * 80));
          const hh = inc.data[i].hour % 24;
          const lbl = hh + ':00';
          const col = v > avg * 1.3 ? '#4CAF50' : v < avg * 0.5 ? '#e74c3c' : '#FFD700';
          return `<div title="${lbl}: $${Math.round(v).toLocaleString('de-DE')}" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:default">
            <div style="width:100%;height:${h}px;background:${col};border-radius:2px 2px 0 0;opacity:.85"></div>
            ${i % 4 === 0 ? `<span style="font-size:.6rem;color:var(--muted);white-space:nowrap">${lbl}</span>` : '<span style="font-size:.6rem">&nbsp;</span>'}
          </div>`;
        }).join('');
        chartEl.innerHTML = `<div style="display:flex;align-items:flex-end;gap:1px;height:100px;padding:0 4px">${bars}</div>
          <div style="text-align:center;font-size:.75rem;color:var(--muted);margin-top:4px">Ø ${Math.round(avg).toLocaleString('de-DE')} $/h · Gesamt: $${Math.round(vals.reduce((a,b)=>a+b,0)).toLocaleString('de-DE')}</div>`;
      }
    }
  }

  const onEl = document.getElementById('gen-online');
  if (onEl) {
    if (!onRes?.ok) {
      onEl.innerHTML = '<span style="color:var(--muted)">Nicht verfügbar</span>';
    } else {
      const on = await onRes.json();
      if (on.offline) {
        onEl.innerHTML = '<span class="badge b-red">Server offline</span>';
      } else if (!on.players.length) {
        onEl.innerHTML = '<span style="color:var(--muted)">Niemand online</span>';
      } else {
        onEl.innerHTML = on.players.map(p =>
          `<span style="display:inline-block;background:rgba(255,215,0,.15);color:#FFD700;border-radius:4px;padding:2px 10px;margin:2px 4px 2px 0;font-weight:600">${escH(p)}</span>`
        ).join('') + `<span style="color:var(--muted);font-size:0.82em;margin-left:6px">${on.count} Spieler</span>`;
      }
    }
  }

  const topEl = document.getElementById('gen-top-table');
  if (topEl && lbRes?.ok) {
    const lb = await lbRes.json();
    if (!lb.rows?.length) { topEl.innerHTML = '<div class="empty">Keine Daten</div>'; }
    else {
      const rankColor = i => i===0?'#FFD700':i===1?'#C0C0C0':i===2?'#CD7F32':'var(--muted)';
      topEl.innerHTML = `<div class="lb-table">${lb.rows.map((r,i) => `
        <div class="lb-row">
          <span class="lb-pos" style="color:${rankColor(i)}">#${i+1}</span>
          <span style="flex:2;font-weight:600">${escH(r.name)}</span>
          <span style="color:var(--yellow);font-weight:700;min-width:130px">💰 $${Number(r.money).toLocaleString('de-DE')}</span>
          <span style="color:#AA00FF;min-width:70px">✦ P${r.prestige}</span>
        </div>`).join('')}</div>`;
    }
  }
}

async function genLookupPlayer() {
  const name = document.getElementById('gen-pl-search')?.value?.trim();

  const el = document.getElementById('gen-pl-result');
  if (el) el.innerHTML = '<div style="color:var(--muted);font-size:.85rem">Suche…</div>';

  if (!el) return;
  if (!r?.ok) { el.innerHTML = '<div style="color:var(--red);font-size:.85rem">Spieler nicht gefunden</div>'; return; }

    <div style="font-size:.83rem;display:flex;flex-direction:column;gap:4px">

      <div class="srv-row"><span>Shards</span><span style="color:#d060ff">💎 ${Number(p.shards||0).toLocaleString('de-DE')}</span></div>
      <div class="srv-row"><span>Mining Lvl</span><span>⛏ ${p.mining_level||0}</span></div>
      <div class="srv-row"><span>Generatoren</span><span>${d.generators?.length||0}</span></div>
      ${p.booster_expiry && p.booster_expiry * 1000 > Date.now()
        ? `<div class="srv-row"><span>Booster</span><span style="color:#FFD700">⚡ x${p.booster_mult} (${Math.max(0,Math.ceil((p.booster_expiry-Date.now()/1000)/60))}m)</span></div>` : ''}

async function genTab(tab) {
  genLbTab = tab;
  document.querySelectorAll('#page-content .rtab').forEach(b => {
    b.classList.toggle('active',
      (tab==='money'      && b.textContent.includes('Geld')) ||
      (tab==='prestige'   && b.textContent.includes('Prestige')) ||
      (tab==='generators' && b.textContent.includes('Generator')) ||
      (tab==='shards'     && b.textContent.includes('Shard')) ||
      (tab==='guilds'     && b.textContent.includes('Gilden')) ||
      (tab==='seasons'    && b.textContent.includes('Saison')));
  });
  await genLoadLb();

async function genLoadLb() {
  const el = document.getElementById('gen-lb'); if (!el) return;
  el.innerHTML = '<div class="empty">Lade…</div>';
  const rankColor = i => i===0?'#FFD700':i===1?'#C0C0C0':i===2?'#CD7F32':'var(--muted)';

  try {
    if (genLbTab === 'seasons') {
      const r = await apiFetch('/api/generators/seasons');
      if (!r?.ok) { el.innerHTML = '<div class="empty" style="color:var(--red)">Fehler</div>'; return; }
      const { rows, season, maxSeason } = await r.json();
      if (!rows?.length) { el.innerHTML = `<div class="empty">Keine Saison-Daten (Saison ${season})</div>`; return; }
      el.innerHTML = `<div style="color:var(--muted);font-size:.8rem;margin-bottom:8px">🏅 Saison ${season} / ${maxSeason}</div>
        <div class="lb-table">${rows.map((row,i) => `
          <div class="lb-row">
            <span class="lb-pos" style="color:${['#FFD700','#C0C0C0','#CD7F32'][i]||'var(--muted)'}">#${row.rank_pos||i+1}</span>
            <span style="flex:2;font-weight:600">${escH(row.name)}</span>
            <span style="color:var(--yellow);font-weight:700;min-width:130px">💰 $${Number(row.money).toLocaleString('de-DE')}</span>
            <span style="color:#AA00FF;min-width:70px">✦ P${row.prestige}</span>
          </div>`).join('')}</div>`;
      return;
    }
    if (genLbTab === 'guilds') {
      const r = await apiFetch('/api/generators/guilds');
      if (!r) { el.innerHTML = '<div class="empty" style="color:var(--red)">Server nicht erreichbar</div>'; return; }
      if (!r.ok) {
        const err = await r.json().catch(() => ({}));
        el.innerHTML = `<div class="empty" style="color:var(--red)">Datenbankfehler: ${escH(err.error || 'ph_generators nicht verfügbar')}</div>`;
        return;
      }
      const { rows } = await r.json();
      if (!rows?.length) { el.innerHTML = '<div class="empty">Keine Gilden vorhanden</div>'; return; }
      el.innerHTML = `<div class="lb-table">${rows.map((g,i) => `
        <div class="lb-row">
          <span class="lb-pos" style="color:${rankColor(i)}">#${i+1}</span>
          <span style="flex:2;font-weight:600">🛡 ${escH(g.name)}</span>
          <span style="color:var(--yellow);font-weight:700;min-width:130px">💰 $${Number(g.total_money).toLocaleString('de-DE')}</span>
          <span style="color:var(--blue);min-width:80px">👥 ${g.member_count}/5</span>
          <span style="color:#AA00FF;min-width:70px">✦ P${g.max_prestige}</span>
        </div>`).join('')}</div>`;
      return;
    }

    const r = await apiFetch(`/api/generators/leaderboard?type=${genLbTab}`);
    if (!r) { el.innerHTML = '<div class="empty" style="color:var(--red)">Server nicht erreichbar</div>'; return; }
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      el.innerHTML = `<div class="empty" style="color:var(--red)">Datenbankfehler: ${escH(err.error || 'ph_generators nicht verfügbar')}</div>`;
      return;
    }
    const { rows } = await r.json();
    if (!rows?.length) { el.innerHTML = '<div class="empty">Keine Spieler gefunden</div>'; return; }
    el.innerHTML = `<div class="lb-table">${rows.map((row,i) => {
      const formatTier = tier => {
        const t = (tier||'').toUpperCase();
        if (t.startsWith('TITAN_'))  return { icon:'❋', label: t.replace('TITAN_','').replace(/_/g,' '), color:'#e040fb' };
        if (t.startsWith('GOD_'))    return { icon:'✦', label: t.replace('GOD_','').replace(/_/g,' '),   color:'#ff5252' };
        if (t.startsWith('ULTRA_'))  return { icon:'⬆', label: t.replace('ULTRA_','').replace(/_/g,' '), color:'#FFD700' };
        if (t.startsWith('MEGA_'))   return { icon:'★', label: t.replace('MEGA_','').replace(/_/g,' '),  color:'#ff9800' };
        return { icon:'⚙', label: t.replace(/_/g,' '), color:'#4CAF50' };
      };
      const cap = s => s.charAt(0) + s.slice(1).toLowerCase();

      if (genLbTab === 'generators' && row.generators?.length) {
        // Gruppieren nach Tier
        const grouped = {};
        row.generators.forEach(g => {
          if (!grouped[g.tier]) grouped[g.tier] = [];
          grouped[g.tier].push(g.level);
        });
        // Sortieren: Titan → God → Ultra → Mega → Normal
        const tierOrder = t => t.startsWith('TITAN')?0:t.startsWith('GOD')?1:t.startsWith('ULTRA')?2:t.startsWith('MEGA')?3:4;
        const tags = Object.entries(grouped)
          .sort((a,b) => tierOrder(a[0]) - tierOrder(b[0]))
          .map(([tier, levels]) => {
            const { icon, label, color } = formatTier(tier);
            levels.sort((a,b)=>b-a);
            const lvlStr = levels.length === 1
              ? `Lv.${levels[0]}`
              : `${levels.length}× Ø Lv.${Math.round(levels.reduce((s,v)=>s+v,0)/levels.length)}`;
            return `<span style="display:inline-block;background:${color}22;border:1px solid ${color}55;border-radius:4px;padding:1px 6px;margin:2px;font-size:.72rem;color:${color}">${icon} ${cap(label)} ${lvlStr}</span>`;
          }).join('');
        return `<div class="lb-row" style="flex-wrap:wrap;align-items:flex-start;row-gap:4px">
          <span class="lb-pos" style="color:${rankColor(i)}">#${i+1}</span>
          <span style="flex:2;font-weight:600;min-width:100px">${escH(row.name||'Unbekannt')}</span>
          <span style="color:#4CAF50;font-weight:700;min-width:110px">⚙ ${row.gen_count||0} Gen.</span>
          <span style="color:#AA00FF;min-width:70px">✦ P${row.prestige||0}</span>
          <div style="width:100%;padding-left:32px;margin-top:2px">${tags}</div>
        </div>`;
      }

      const extra = genLbTab === 'money'
        ? `<span style="color:var(--yellow);font-weight:700;min-width:130px">💰 $${Number(row.money||0).toLocaleString('de-DE')}</span><span style="color:#AA00FF;min-width:80px">✦ P${row.prestige||0}</span>`
        : genLbTab === 'prestige'
        ? `<span style="color:#AA00FF;font-weight:700;min-width:110px">✦ Prestige ${row.prestige||0}</span><span style="color:var(--yellow);min-width:130px">💰 $${Number(row.money||0).toLocaleString('de-DE')}</span>`
        : genLbTab === 'shards'
        ? `<span style="color:#d060ff;font-weight:700;min-width:120px">💎 ${Number(row.shards||0).toLocaleString('de-DE')} Shards</span><span style="color:var(--muted);min-width:80px">⛏ Lvl ${row.mining_level||0}</span>`
        : `<span style="color:#4CAF50;font-weight:700;min-width:120px">⚙ ${row.gen_count||0} Generatoren</span><span style="color:#AA00FF;min-width:80px">✦ P${row.prestige||0}</span>`;
      return `<div class="lb-row">
        <span class="lb-pos" style="color:${rankColor(i)}">#${i+1}</span>
        <span style="flex:2;font-weight:600">${escH(row.name||'Unbekannt')}</span>
        ${extra}
      </div>`;
    }).join('')}</div>`;
  } catch (e) {
    el.innerHTML = `<div class="empty" style="color:var(--red)">Fehler: ${escH(e.message)}</div>`;
  }
}

async function renderAudit() {
  setHdr('📜 Audit-Log', `

  `);

      <input class="field fsm" id="audit-filter" placeholder="Filtern…" oninput="filterAudit()" style="width:180px">

function renderAuditList(entries) {
  const el = document.getElementById('audit-list'); if (!el) return;
  const cnt = document.getElementById('audit-count');
  if (cnt) cnt.textContent = `${entries.length} Einträge`;
  if (!entries.length) { el.innerHTML='<div class="empty">Keine Einträge</div>'; return; }
  el.innerHTML = entries.map(e => {
    const col = AUDIT_COLORS[e.action] || 'var(--muted)';
    const ts  = new Date(e.ts).toLocaleString('de-DE');
    return `<div class="audit-row" data-q="${escH((e.action+' '+e.target+' '+e.detail).toLowerCase())}">
      <span class="audit-ts">${ts}</span>
      <span class="audit-action" style="color:${col}">${escH(e.action)}</span>
      <span class="audit-target">${escH(e.target||'—')}</span>
      <span class="audit-detail">${escH(e.detail||'')}</span>
    </div>`;
  }).join('');
}

function filterAudit() {
  const q = (document.getElementById('audit-filter')?.value||'').toLowerCase().trim();
  const rows = document.querySelectorAll('#audit-list .audit-row');
  let shown = 0;
  rows.forEach(r => { const v = !q || r.dataset.q.includes(q); r.style.display = v ? '' : 'none'; if (v) shown++; });
  const cnt = document.getElementById('audit-count');
  if (cnt) cnt.textContent = q ? `${shown} / ${rows.length} Einträge` : `${rows.length} Einträge`;
}

function csvExportAudit() {
  const entries = window._auditEntries || [];
  if (!entries.length) { showToast('Keine Daten', false); return; }
  const rows = [['Zeitstempel','Aktion','Ziel','Detail'], ...entries.map(e=>[e.ts, e.action, e.target, e.detail])];
  csvDownload('audit-log.csv', rows);
}

function showModal(title, bodyHtml, okLabel, onOk) {

  bg.innerHTML = `
    <div class="modal-box">

      <div class="modal-actions">

      </div>

  document.body.appendChild(bg);
  document.getElementById('modal-ok').onclick = async () => { const r = onOk ? await onOk() : true; if (r !== false) closeModal(); };

function showToast(msg, ok=true) {
  const wrap = document.getElementById('toast-wrap');
  const t = document.createElement('div');
  t.className = `toast ${ok?'toast-ok':'toast-err'}`;

}

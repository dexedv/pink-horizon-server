function updateSysmonStats(data) {
  // Gesamtverbrauch aller Container
  const totalEl = document.getElementById('sm-total');
  if (totalEl) {
    const HOST_MB = 32768;
    let totalUsed = 0; let totalLimit = 0;
    for (const k of SYSMON_ORDER) {
      const d = data[k]; if (!d) continue;
      totalUsed  += d.memUsed;
      totalLimit += d.memLimit;
    }
    const usedMb  = (totalUsed  / 1024 / 1024).toFixed(0);
    const limMb   = (totalLimit / 1024 / 1024).toFixed(0);
    const pctHost = Math.min((totalUsed / 1024 / 1024 / HOST_MB * 100), 100).toFixed(1);
    const pctLim  = Math.min((totalUsed / totalLimit * 100), 100).toFixed(1);
    const warn    = pctHost > 75;
    totalEl.innerHTML = `
      <div class="card-title">⚡ Gesamtverbrauch aller Container (Server: 32 GB)</div>
      <div style="display:flex;gap:32px;align-items:center;flex-wrap:wrap">
        <div>
          <div style="font-size:2rem;font-weight:700;color:${warn?'var(--yellow)':'var(--green)'}">${usedMb} MB</div>
          <div style="font-size:.8rem;color:var(--muted)">von 32 GB Server-RAM</div>
        </div>
        <div style="flex:1;min-width:200px">
          <div class="res-lbl" style="margin-bottom:4px"><span>Anteil am Server-RAM</span><span style="font-weight:700">${pctHost}%</span></div>
          <div class="res-bar" style="height:10px"><div class="res-fill ${warn?'rf-warn':'rf-mem'}" style="width:${pctHost}%"></div></div>
          <div style="font-size:.75rem;color:var(--muted);margin-top:4px">Summe aller Container-Limits: ${limMb} MB · davon belegt: ${pctLim}%</div>
        </div>
      </div>`;
  }

  for (const k of SYSMON_ORDER) {
    const el = document.getElementById(`sm-${k}`); if (!el) continue;
    const d = data[k];
    if (!d) {
      el.innerHTML = `<div style="font-weight:700;font-size:.95rem;margin-bottom:6px">${SYSMON_LABELS[k]||k}</div><span class="badge b-red">Offline</span>`;
      continue;
    }
    const cpuWarn = d.cpu > 70; const memWarn = d.memPct > 75;
    const memMb   = (d.memUsed  / 1024 / 1024).toFixed(0);
    const limMb   = (d.memLimit / 1024 / 1024).toFixed(0);
    el.innerHTML = `
      <div style="font-weight:700;font-size:.95rem;margin-bottom:8px">${SYSMON_LABELS[k]||k}</div>
      <div class="res-row">
        <div class="res-lbl"><span>CPU</span><span style="font-size:.82rem;font-weight:700;color:${cpuWarn?'var(--yellow)':'var(--text)'}">${d.cpu}%</span></div>
        <div class="res-bar" style="height:8px"><div class="res-fill ${cpuWarn?'rf-warn':'rf-cpu'}" style="width:${Math.min(d.cpu,100)}%"></div></div>
      </div>
      <div class="res-row" style="margin-top:6px">
        <div class="res-lbl"><span>RAM</span><span style="font-size:.82rem;font-weight:700;color:${memWarn?'var(--yellow)':'var(--text)'}">${memMb} / ${limMb} MB</span></div>
        <div class="res-bar" style="height:8px"><div class="res-fill ${memWarn?'rf-warn':'rf-mem'}" style="width:${Math.min(d.memPct,100)}%"></div></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:5px;font-size:.72rem;color:var(--muted)">
        <span>${d.memPct}% belegt</span>
        <span>Limit: ${limMb} MB</span>
      </div>`;
  }
  const ts = document.getElementById('sm-ts');
  if (ts) ts.textContent = 'Aktualisiert: ' + new Date().toLocaleTimeString('de-DE');
}

// ── WebSocket ─────────────────────────────────────────────────────────────
function connectWs() {
  const proto = location.protocol==='https:'?'wss':'ws';
  ws = new WebSocket(`${proto}://${location.host}`);
  ws.onopen = ()=>{
    ws.send(JSON.stringify({type:'auth',token:TOKEN}));
    ws.send(JSON.stringify({type:'subscribe_alerts'}));
    if(conSrv) ws.send(JSON.stringify({type:'subscribe',container:conSrv}));
    if(PAGE==='sysmon'||PAGE==='dashboard') ws.send(JSON.stringify({type:'subscribe_stats'}));
  };
  ws.onmessage = e=>{
    const msg=JSON.parse(e.data);
    if(msg.type==='xray_alert') {
      xrayAlerts.set(msg.uuid, msg);
      renderXrayAlerts();
      showToast(`🚨 XRay-Verdacht: ${msg.player} (Score ${msg.score}/100)`, false);
      if(Notification.permission==='granted') {
        new Notification(`⚠️ XRay – ${msg.player}`, { body: `Diamant-Rate: ${msg.dRate}/1000 · Score: ${msg.score}/100` });
      }
      return;
    }
    if(msg.type==='server_alert') {
      const icon = msg.running ? '✅' : '❌';
      showToast(`${icon} ${msg.label} ist jetzt ${msg.running?'online':'offline'}`, msg.running);
      if(Notification.permission==='granted') {
        new Notification(`Pink Horizon – ${msg.label}`, { body: `Server ${msg.running?'gestartet':'gestoppt'}` });
      }
      loadSrv();
      return;
    }
    if(msg.type==='stats') {
      if(PAGE==='dashboard') updateDashStats(msg.data);
      if(PAGE==='sysmon')   updateSysmonStats(msg.data);
      return;
    }
    if(msg.type==='log') {
      const cnt=msg.server;
      const buf=logBuf[cnt]||[];
      for(const line of msg.text.split('\n')) { if(line.trim()){buf.push(line);} }
      while(buf.length>500)buf.shift();
      logBuf[cnt]=buf;
      if(conSrv===cnt) {
        const out=document.getElementById('con-out');
        if(out) {
          for(const line of msg.text.split('\n')) {
            if(!line.trim()) continue;
            const d=document.createElement('div');
            d.className='ll '+classLine(line); d.textContent=line;
            out.appendChild(d);
          }
          while(out.children.length>1000) out.removeChild(out.firstChild);
          if(autoScroll) out.scrollTop=out.scrollHeight;
        }
      }
    }
  };
  ws.onclose = ()=>setTimeout(connectWs,3000);
}

function subscribeLog(cnt) {
  conSrv=cnt;
  if(ws?.readyState===1) ws.send(JSON.stringify({type:'subscribe',container:cnt}));
}

function csvDownload(filename, rows) {
  const content = rows.map(r => r.map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const blob = new Blob(['\uFEFF' + content], { type:'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function showMsg(el,ok,msg) {
  if(!el) return;
  el.textContent=msg; el.className='msg '+(ok?'msg-ok':'msg-err'); el.style.display='block';
  setTimeout(()=>{el.style.display='none';},5000);
}
function escH(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
async function apiFetch(url,opts={}) {
  try { return await fetch(url,{...opts,headers:{'Content-Type':'application/json','x-dashboard-token':TOKEN,...(opts.headers||{})}}); }
  catch { return null; }
}

async function loadDbTables() {
  const el = document.getElementById('db-tbl-list'); if (!el) return;
  const r = await apiFetch(`/api/db/tables?database=${encodeURIComponent(dbState.database)}`);
  if (!r) { el.innerHTML='<div class="empty" style="color:var(--red);padding:8px;font-size:.8rem">Netzwerkfehler</div>'; return; }
  if (!r.ok) {
    let errMsg = `HTTP ${r.status}`;
    try { const e = await r.json(); errMsg = e.error || errMsg; } catch {}
    el.innerHTML=`<div class="empty" style="color:var(--red);padding:8px;font-size:.8rem">Fehler: ${escH(errMsg)}</div>`;
    return;
  }
  const { tables } = await r.json();
  if (!tables?.length) { el.innerHTML='<div class="empty" style="padding:8px;font-size:.8rem">Keine Tabellen</div>'; return; }
  el.innerHTML = tables.map(t => `
    <div class="dbt-pill ${dbState.table===t.name?'active':''}" onclick="dbSelectTable('${escH(t.name)}')">
      <span class="dbt-name">${escH(t.name)}</span>
      <span class="dbt-cnt">${Number(t.approx_rows||0).toLocaleString('de-DE')}</span>
      <span class="dbt-size">${t.size_kb||0} KB</span>
    </div>`).join('');
  if (dbState.table) {
    // Re-select if already selected
    const active = el.querySelector(`.dbt-pill`);
    if (active) active.classList.toggle('active', active.querySelector('.dbt-name')?.textContent === dbState.table);
  }
}

async function dbSelectTable(name) {
  dbState.table = name;

    p.classList.toggle('active', p.querySelector('.dbt-name')?.textContent === name);

async function loadDbTableContent() {
  const main = document.getElementById('db-main'); if (!main || !dbState.table) return;
  main.innerHTML = `
    <div class="db-toolbar">
      <input class="field" id="db-search" placeholder="Suchen…" value="${escH(dbState.search)}" style="width:190px"
        oninput="dbState.search=this.value"
        onkeydown="if(event.key==='Enter'){dbState.page=1;loadDbTableContent()}">
      <button class="btn" onclick="dbState.page=1;loadDbTableContent()">🔍</button>
      <button class="btn" onclick="dbState.search='';dbState.page=1;loadDbTableContent()" title="Zurücksetzen">✕</button>
      <span style="font-size:.8rem;color:var(--muted);font-family:var(--mono)">${escH(dbState.database)} › ${escH(dbState.table)}</span>
      <span style="flex:1"></span>
      <div class="db-pg" id="db-pg"><div class="skl" style="width:160px;height:20px"></div></div>
    </div>
    <div class="db-tbl-wrap" id="db-tbl-wrap">
      ${[...Array(8)].map(()=>`<div style="display:flex;gap:8px;padding:7px 10px;border-bottom:1px solid rgba(255,255,255,.04)">
        ${[...Array(4)].map(()=>`<div class="skl" style="height:14px;flex:1;min-width:40px"></div>`).join('')}
      </div>`).join('')}
    </div>`;

  const params = new URLSearchParams({
    database: dbState.database,
    table: dbState.table,
    page: dbState.page - 1,
    limit: 50,
    search: dbState.search,
  });
  if (dbState.sort) { params.set('sort', dbState.sort); params.set('dir', dbState.dir); }

  const r = await apiFetch(`/api/db/table?${params}`);
  const wrap = document.getElementById('db-tbl-wrap');
  if (!r) { if (wrap) wrap.innerHTML = '<div class="empty" style="color:var(--red)">Netzwerkfehler</div>'; return; }
  if (!r.ok) {
    let errMsg = `HTTP ${r.status}`;
    try { const e = await r.json(); errMsg = e.error || errMsg; } catch {}
    if (wrap) wrap.innerHTML = `<div class="empty" style="color:var(--red)">Fehler: ${escH(errMsg)}</div>`;
    return;
  }
  const data = await r.json();
  dbState.cols = (data.columns || []).map(c => typeof c === 'object' ? c.name : c);
  dbState.pk   = data.pk || dbState.cols[0];
  const rows   = data.rows || [];
  const total  = data.total || 0;
  const pages  = Math.max(1, Math.ceil(total / 50));

  const pg = document.getElementById('db-pg');
  if (pg) pg.innerHTML = `
    <button onclick="dbState.page=Math.max(1,dbState.page-1);loadDbTableContent()" ${dbState.page<=1?'disabled':''}>‹</button>
    <span style="color:var(--muted)">${dbState.page}/${pages} · <b style="color:var(--text)">${total.toLocaleString('de-DE')}</b> Zeilen</span>
    <button onclick="dbState.page=Math.min(${pages},dbState.page+1);loadDbTableContent()" ${dbState.page>=pages?'disabled':''}>›</button>`;

  if (!rows.length) {
    if (wrap) wrap.innerHTML = '<div class="empty">Keine Daten gefunden</div>';
    return;
  }

  const cols = dbState.cols;
  const thHtml = cols.map(col => {
    const sorted = dbState.sort === col;
    const arrow  = sorted ? (dbState.dir === 'ASC' ? ' ↑' : ' ↓') : '';
    return `<th onclick="dbSort('${escH(col)}')" style="${sorted?'color:var(--pink)':''}">${escH(col)}${arrow}</th>`;
  }).join('') + '<th style="width:72px;text-align:right;cursor:default">Aktion</th>';

  window._dbRows = rows;
  const tdHtml = rows.map((row, rowIdx) => {
    const pkVal  = row[dbState.pk];
    const pkStr  = String(pkVal ?? '');
    const cells  = cols.map(col => {
      const v = row[col];
      const display = v === null
        ? `<span style="color:var(--muted);font-style:italic">NULL</span>`
        : escH(String(v));
      return `<td title="${escH(String(v ?? ''))}">${display}</td>`;
    }).join('');
    return `<tr>${cells}
      <td style="text-align:right;white-space:nowrap">
        <button class="btn-xs" onclick="dbEditRow(${rowIdx})" title="Bearbeiten">✏</button>
        <button class="btn-xs" style="color:var(--red);border-color:rgba(231,76,60,.35)" onclick="dbDeleteRow('${escH(pkStr)}')" title="Löschen">✕</button>
      </td>
    </tr>`;
  }).join('');

  if (wrap) wrap.innerHTML = `
    <table class="db-edit-tbl">
      <thead><tr>${thHtml}</tr></thead>
      <tbody>${tdHtml}</tbody>
    </table>`;
}

function dbSort(col) {
  if (dbState.sort === col) dbState.dir = dbState.dir === 'ASC' ? 'DESC' : 'ASC';
  else { dbState.sort = col; dbState.dir = 'ASC'; }
  dbState.page = 1;
  loadDbTableContent();
}

function dbEditRow(rowIdx) {
  const row = (window._dbRows || [])[rowIdx];
  if (!row) return;
  const cols = dbState.cols;
  const fieldHtml = cols.map(col => {
    const val = row[col] === null ? '' : String(row[col] ?? '');
    const isPk = col === dbState.pk;
    return `<div style="display:flex;flex-direction:column;gap:2px;margin-bottom:8px">
      <label style="font-size:.74rem;color:${isPk?'var(--pink)':'var(--muted)'};font-family:var(--mono)">${escH(col)}${isPk?' 🔑':''}</label>
      <input class="field" id="dbedit-${escH(col)}" value="${escH(val)}" ${isPk?'readonly style="opacity:.55;cursor:not-allowed"':''}/>
    </div>`;
  }).join('');

  showModal('✏ Zeile bearbeiten',
    `<div style="max-height:62vh;overflow-y:auto;padding-right:4px">${fieldHtml}</div>`,
    'Speichern', async () => {
    const updates = {};
    for (const col of cols) {
      if (col === dbState.pk) continue;
      const el = document.getElementById(`dbedit-${col}`);
      if (el) updates[col] = el.value === '' ? null : el.value;
    }
    const r = await apiFetch('/api/db/row', {
      method: 'PUT',
      body: JSON.stringify({ database: dbState.database, table: dbState.table, pk: dbState.pk, pkValue: row[dbState.pk], updates })
    });
    const d = r ? await r.json() : null;
    showToast(d?.ok ? '✓ Zeile gespeichert' : `✗ ${d?.error||'Fehler'}`, d?.ok);
    if (d?.ok) loadDbTableContent();
    return d?.ok !== false;
  });
}

function dbDeleteRow(pkValue) {
  showModal('✕ Zeile löschen',
    `<p style="color:var(--muted);font-size:.88rem">Zeile mit <code style="font-family:var(--mono);color:var(--pink)">${escH(dbState.pk)} = "${escH(pkValue)}"</code> dauerhaft löschen?</p>`,
    'Löschen', async () => {
    const r = await apiFetch('/api/db/row', {
      method: 'DELETE',
      body: JSON.stringify({ database: dbState.database, table: dbState.table, pk: dbState.pk, pkValue })
    });
    const d = r ? await r.json() : null;
    showToast(d?.ok ? '✓ Zeile gelöscht' : `✗ ${d?.error||'Fehler'}`, d?.ok);
    if (d?.ok) { loadDbTableContent(); loadDbTables(); }
    return d?.ok !== false;
  });
}

          <div class="auc-row">
            <span class="auc-seller">${escH(a.seller?.slice(0,8))}</span>
            <span style="flex:2;font-size:.85rem">${escH(a.item_name||'Unbekannt')}</span>
            <span class="auc-price">${a.bin_price ? Number(a.bin_price).toLocaleString('de-DE')+' BIN' : Number(a.highest_bid||a.start_price||0).toLocaleString('de-DE')}</span>

      </div>

  `;
}

async function cancelSkyAuction(id) {
  if (!confirm('Auktion #'+id+' löschen?')) return;
  const r = await apiFetch('/api/skyblock/auctions/'+id, {method:'DELETE'});
  toast(r?.ok ? 'Auktion gelöscht' : 'Fehler', r?.ok);
  if (r?.ok) renderSkyBlockAuction();
}

<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pink Horizon – Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f13; --surface: #1a1a24; --surface2: #1e1e2c; --border: #2a2a3a;
    --text: #e0e0f0; --muted: #6b6b8a;
    --pink: #ff69b4; --purple: #9b59b6;
    --green: #2ecc71; --red: #e74c3c; --blue: #3498db; --yellow: #f39c12;
    --font: 'Segoe UI', system-ui, sans-serif;
    --mono: 'Cascadia Code', 'Fira Code', Consolas, monospace;
    --sw: 220px; --hh: 52px;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

  /* Login */
  #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .lbox { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 360px; text-align: center; }
  .lbox h1 { font-size: 1.6rem; background: linear-gradient(135deg,var(--pink),var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
  .lbox p { color: var(--muted); margin-bottom: 28px; font-size: .9rem; }
  .lbox input { width: 100%; padding: 12px 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 1rem; outline: none; margin-bottom: 12px; }
  .lbox input:focus { border-color: var(--pink); }
  .lbox .lbtn { width: 100%; padding: 12px; background: linear-gradient(135deg,var(--pink),var(--purple)); border: none; border-radius: 8px; color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; }
  .lbox .lbtn:hover { opacity: .85; }
  .lerr { color: var(--red); font-size: .85rem; margin-top: 10px; display: none; }
  .hidden { display: none !important; }

  /* App */
  #app { display: flex; flex: 1; overflow: hidden; }

  /* Sidebar */
  #sidebar { width: var(--sw); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .nav-logo { padding: 0 16px; height: var(--hh); display: flex; align-items: center; font-size: 1rem; font-weight: 700; background: linear-gradient(135deg,var(--pink),var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  #nav-body { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 2px; }
  .nav-sec { font-size: .65rem; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); padding: 10px 8px 3px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; cursor: pointer; border: 1px solid transparent; background: none; color: var(--text); font-size: .88rem; text-align: left; width: 100%; transition: background .15s; }
  .nav-item:hover { background: rgba(255,255,255,.05); }
  .nav-item.active { background: rgba(255,105,180,.1); border-color: rgba(255,105,180,.3); }
  .ndot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: var(--muted); }
  .ndot.on  { background: var(--green); box-shadow: 0 0 5px var(--green); }
  .ndot.off { background: var(--red); }
  .nav-footer { padding: 8px; border-top: 1px solid var(--border); flex-shrink: 0; }
  .logout-btn { width: 100%; padding: 8px 10px; background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; cursor: pointer; font-size: .85rem; text-align: left; transition: all .15s; }
  .logout-btn:hover { border-color: var(--red); color: var(--red); }

  /* Main */
  #main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #page-header { height: var(--hh); display: flex; align-items: center; gap: 12px; padding: 0 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--surface); }
  #page-title { font-size: 1.1rem; font-weight: 700; flex: 1; }
  #hdr-actions { display: flex; gap: 8px; align-items: center; }
  #page-content { flex: 1; overflow-y: auto; }

  /* Buttons */
  .btn { padding: 7px 14px; border-radius: 7px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; font-size: .85rem; display: inline-flex; align-items: center; gap: 6px; transition: all .15s; white-space: nowrap; }
  .btn:hover { border-color: var(--pink); color: var(--pink); }
  .btn-d:hover { border-color: var(--red)   !important; color: var(--red)   !important; }
  .btn-s:hover { border-color: var(--green) !important; color: var(--green) !important; }
  .btn-p { background: linear-gradient(135deg,var(--pink),var(--purple)); border-color: transparent; color: #fff; font-weight: 600; }
  .btn-p:hover { opacity: .85; color: #fff; border-color: transparent; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-xs { padding: 3px 10px; border-radius: 5px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; font-size: .76rem; transition: all .15s; white-space: nowrap; }
  .btn-xs:hover { border-color: var(--red); color: var(--red); }
  .btn-xs.g:hover { border-color: var(--green); color: var(--green); }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .card-title { font-size: .7rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 10px; }

  /* Badges */
  .badge { font-size: .72rem; padding: 2px 10px; border-radius: 20px; display: inline-flex; align-items: center; gap: 4px; }
  .b-green  { background: rgba(46,204,113,.12); border: 1px solid rgba(46,204,113,.3); color: var(--green); }
  .b-red    { background: rgba(231,76,60,.12);  border: 1px solid rgba(231,76,60,.3);  color: var(--red); }
  .b-purple { background: rgba(155,89,182,.12); border: 1px solid rgba(155,89,182,.3); color: var(--purple); }
  .b-yellow { background: rgba(243,156,18,.12); border: 1px solid rgba(243,156,18,.3); color: var(--yellow); }
  .b-blue   { background: rgba(52,152,219,.12); border: 1px solid rgba(52,152,219,.3); color: var(--blue); }

  /* Form */
  .field { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 9px 13px; color: var(--text); font-size: .9rem; outline: none; width: 100%; font-family: inherit; }
  .field:focus { border-color: var(--pink); }
  .fsm { padding: 6px 10px; font-size: .85rem; border-radius: 6px; }
  select.field { cursor: pointer; }
  .irow { display: flex; gap: 8px; align-items: center; }

  /* Msg */
  .msg { font-size: .82rem; padding: 6px 12px; border-radius: 6px; }
  .msg-ok  { background: rgba(46,204,113,.1); color: var(--green); border: 1px solid rgba(46,204,113,.3); }
  .msg-err { background: rgba(231,76,60,.1);  color: var(--red);   border: 1px solid rgba(231,76,60,.3); }

  /* Layout */
  .page { padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .g3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
  .g4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }
  @media(max-width:1000px){ .g3,.g4 { grid-template-columns: 1fr 1fr; } }
  @media(max-width:650px) { .g2,.g3,.g4 { grid-template-columns: 1fr; } }

  /* Dashboard */
  .srv-card-hdr { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .srv-card-name { font-weight: 700; font-size: 1rem; flex: 1; }
  .srv-meta { display: flex; flex-direction: column; gap: 5px; font-size: .85rem; margin-bottom: 10px; }
  .srv-row { display: flex; justify-content: space-between; }
  .srv-row span:first-child { color: var(--muted); }
  .srv-row span:last-child  { font-weight: 600; }
  .srv-actions { display: flex; gap: 6px; flex-wrap: wrap; }

  .stat-card { display: flex; align-items: center; gap: 14px; }
  .stat-icon { font-size: 1.8rem; }
  .stat-lbl  { font-size: .75rem; color: var(--muted); }
  .stat-val  { font-size: 1.5rem; font-weight: 700; }

  /* DB Status */
  .db-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; }
  .db-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .db-dot.ok  { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .db-dot.err { background: var(--red); }
  .db-name { flex: 1; font-family: var(--mono); font-size: .85rem; }
  .db-status { font-size: .8rem; }
  .db-status.ok  { color: var(--green); }
  .db-status.err { color: var(--red); }

  /* Console */
  .con-wrap  { display: flex; flex-direction: column; height: 100%; padding: 12px 16px; gap: 10px; }
  .con-out   { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; overflow-y: auto; font-family: var(--mono); font-size: .8rem; line-height: 1.55; white-space: pre-wrap; word-break: break-all; }
  .ll        { color: #c0c0d0; }
  .ll.warn   { color: var(--yellow); }
  .ll.error  { color: var(--red); }
  .ll.info   { color: #7ec8e3; }
  .ll.cmd    { color: var(--pink); }
  .con-in    { display: flex; gap: 8px; flex-shrink: 0; }
  .con-in .field { font-family: var(--mono); }

  /* Players */
  .pl-page { display: flex; flex-direction: column; height: 100%; }
  .pl-top  { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; }
  .pl-body { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; }
  .chips   { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; min-height: 24px; }
  .chip-lbl { font-size: .78rem; color: var(--muted); }
  .chip { padding: 3px 12px; background: rgba(255,255,255,.06); border: 1px solid var(--border); border-radius: 20px; cursor: pointer; font-size: .82rem; color: var(--text); transition: all .15s; }
  .chip:hover { border-color: var(--pink); color: var(--pink); }
  .chip::before { content: '● '; color: var(--green); font-size: .7rem; }

  .pl-hdr { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; }
  .pl-name { font-size: 1.2rem; font-weight: 700; flex: 1; }
  .pl-acts { display: flex; gap: 6px; flex-wrap: wrap; }

  .stat-tbl { display: flex; flex-direction: column; }
  .stat-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,.05); font-size: .88rem; }
  .stat-row:last-child { border-bottom: none; }
  .sl { color: var(--muted); }
  .sv { font-weight: 600; }

  .coin-big { font-size: 2rem; font-weight: 700; color: var(--yellow); }
  .cbtns { display: flex; gap: 6px; }
  .cbtn { flex: 1; padding: 8px 4px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); cursor: pointer; font-size: .82rem; transition: all .15s; }
  .cbtn.give:hover { border-color: var(--green); color: var(--green); }
  .cbtn.take:hover { border-color: var(--red);   color: var(--red); }
  .cbtn.setv:hover { border-color: var(--blue);  color: var(--blue); }

  /* Economy */
  .bt-row { display: flex; align-items: center; gap: 12px; padding: 9px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
  .bt-rank { font-size: .9rem; font-weight: 700; color: var(--muted); min-width: 28px; }
  .bt-rank.gold   { color: #FFD700; }
  .bt-rank.silver { color: #C0C0C0; }
  .bt-rank.bronze { color: #CD7F32; }
  .bt-name { flex: 1; font-weight: 600; font-family: var(--mono); font-size: .9rem; cursor: pointer; }
  .bt-name:hover { color: var(--pink); }
  .bt-coins { color: var(--yellow); font-weight: 700; }

  /* Rights */
  .rtabs  { display: flex; gap: 4px; }
  .rtab   { padding: 5px 20px; border-radius: 6px 6px 0 0; border: 1px solid var(--border); border-bottom: none; background: none; color: var(--muted); cursor: pointer; font-size: .88rem; }
  .rtab.active { background: var(--bg); color: var(--text); }
  .rbody  { background: var(--bg); border: 1px solid var(--border); border-radius: 0 8px 8px 8px; padding: 16px; display: flex; flex-direction: column; gap: 20px; flex: 1; overflow-y: auto; }
  .rsec   { display: flex; flex-direction: column; gap: 8px; }
  .rhdr   { display: flex; align-items: center; gap: 10px; margin-bottom: 2px; }
  .rttl   { font-size: .78rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); flex: 1; }
  .pentries { display: flex; flex-direction: column; gap: 4px; }
  .pentry { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 7px; }
  .pentry-name { flex: 1; font-family: var(--mono); font-size: .88rem; }
  .wl-pill { font-size: .76rem; padding: 3px 10px; border-radius: 12px; }
  .wl-on  { background: rgba(46,204,113,.12); color: var(--green); border: 1px solid rgba(46,204,113,.3); }
  .wl-off { background: rgba(107,107,138,.12); color: var(--muted); border: 1px solid var(--border); }

  /* Permissions */
  .rank-hierarchy { display: flex; flex-direction: column; gap: 6px; }
  .rank-card { display: flex; align-items: center; gap: 14px; padding: 12px 16px; border-radius: 10px; border: 1px solid; }
  .rank-icon  { font-size: 1.4rem; }
  .rank-label { font-size: 1rem; font-weight: 700; }
  .rank-desc  { font-size: .82rem; color: var(--muted); }
  .rank-count { margin-left: auto; font-size: .82rem; font-family: var(--mono); }

  .perm-player-list { display: flex; flex-direction: column; gap: 4px; max-height: 320px; overflow-y: auto; }
  .perm-row { display: flex; align-items: center; gap: 10px; padding: 6px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 7px; }
  .perm-name { flex: 1; font-family: var(--mono); font-size: .88rem; cursor: pointer; }
  .perm-name:hover { color: var(--pink); }
  .rank-badge { font-size: .72rem; padding: 2px 8px; border-radius: 10px; border: 1px solid; font-weight: 600; }

  /* Ban list */
  .ban-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: var(--surface); border: 1px solid rgba(231,76,60,.25); border-radius: 7px; }
  .ban-name { flex: 1; font-family: var(--mono); font-size: .9rem; font-weight: 600; color: var(--red); }
  .ban-reason { font-size: .82rem; color: var(--muted); flex: 2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Commands */
  .cg-title { font-size: .95rem; font-weight: 700; padding: 4px 0 8px; border-bottom: 2px solid var(--border); margin-bottom: 4px; }
  .csec { display: flex; flex-direction: column; gap: 4px; }
  .csec-lbl { font-size: .7rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); padding: 6px 0 2px; }
  .crow { display: grid; grid-template-columns: 155px 1fr 2fr auto; align-items: center; gap: 10px; padding: 7px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 7px; font-size: .87rem; }
  .cn { font-family: var(--mono); color: var(--pink); font-weight: 600; }
  .cu { font-family: var(--mono); color: var(--muted); font-size: .78rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cd { color: var(--text); }
  .ca { font-size: .7rem; padding: 2px 8px; border-radius: 10px; background: rgba(231,76,60,.12); border: 1px solid rgba(231,76,60,.3); color: var(--red); white-space: nowrap; }
  .ch { display: none !important; }

  /* Modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 200; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
  .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 400px; max-width: 90vw; display: flex; flex-direction: column; gap: 16px; }
  .modal-box h3 { font-size: 1.05rem; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

  /* Toast */
  .toast-wrap { position: fixed; top: 16px; right: 16px; z-index: 300; display: flex; flex-direction: column; gap: 6px; pointer-events: none; }
  .toast { padding: 10px 18px; border-radius: 10px; font-size: .88rem; font-weight: 600; border: 1px solid; transition: opacity .5s; max-width: 320px; }
  .toast-ok  { background: rgba(46,204,113,.15); border-color: rgba(46,204,113,.4); color: var(--green); }
  .toast-err { background: rgba(231,76,60,.15);  border-color: rgba(231,76,60,.4);  color: var(--red); }

  /* Resource monitor */
  .res-card { display: flex; flex-direction: column; gap: 8px; }
  .res-row  { display: flex; flex-direction: column; gap: 4px; }
  .res-lbl  { display: flex; justify-content: space-between; font-size: .78rem; color: var(--muted); }
  .res-lbl span:last-child { color: var(--text); font-weight: 600; }
  .res-bar  { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .res-fill { height: 100%; border-radius: 3px; transition: width .4s; }
  .rf-cpu  { background: linear-gradient(90deg, #3498db, #9b59b6); }
  .rf-mem  { background: linear-gradient(90deg, #2ecc71, #f39c12); }
  .rf-warn { background: linear-gradient(90deg, #f39c12, #e74c3c); }

  /* Broadcast bar */
  .bcast-bar { display: flex; gap: 8px; padding: 12px 16px; background: rgba(255,105,180,.06); border: 1px solid rgba(255,105,180,.2); border-radius: 10px; align-items: center; }
  .bcast-label { font-size: .82rem; color: var(--muted); white-space: nowrap; }
  .bcast-input { flex: 1; }

  /* Leaderboard */
  .lb-table { display: flex; flex-direction: column; gap: 3px; }
  .lb-row { display: flex; align-items: center; gap: 10px; padding: 6px 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 7px; font-size: .85rem; }
  .lb-pos { min-width: 22px; font-weight: 700; color: var(--muted); font-family: var(--mono); }
  .lb-pos.g1 { color: #FFD700; } .lb-pos.g2 { color: #C0C0C0; } .lb-pos.g3 { color: #CD7F32; }
  .lb-name { flex: 1; font-family: var(--mono); cursor: pointer; }
  .lb-name:hover { color: var(--pink); }
  .lb-val { font-weight: 600; color: var(--text); white-space: nowrap; }

  /* Auction */
  .auc-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 7px; font-size: .86rem; }
  .auc-seller { font-family: var(--mono); min-width: 110px; cursor: pointer; }
  .auc-seller:hover { color: var(--pink); }
  .auc-price  { color: var(--yellow); font-weight: 700; min-width: 90px; text-align: right; }
  .auc-exp    { font-size: .76rem; color: var(--muted); flex: 1; }

  /* SQL Console */
  .sql-page  { display: flex; flex-direction: column; height: 100%; }
  .sql-top   { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; }
  .sql-body  { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .sql-tbl   { width: 100%; border-collapse: collapse; font-size: .82rem; font-family: var(--mono); }
  .sql-tbl th { text-align: left; padding: 6px 10px; background: var(--surface); border: 1px solid var(--border); color: var(--muted); font-size: .75rem; text-transform: uppercase; position: sticky; top: 0; }
  .sql-tbl td { padding: 5px 10px; border: 1px solid var(--border); max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sql-tbl tr:hover td { background: rgba(255,255,255,.03); }
  .sql-hints { display: flex; flex-wrap: wrap; gap: 6px; }
  .sql-hint  { font-size: .75rem; font-family: var(--mono); padding: 3px 10px; background: rgba(255,255,255,.05); border: 1px solid var(--border); border-radius: 4px; cursor: pointer; color: var(--muted); }
  .sql-hint:hover { border-color: var(--pink); color: var(--pink); }

  /* Backup */
  .bk-card { display: flex; flex-direction: column; gap: 10px; }
  .bk-status { font-size: .85rem; padding: 10px 14px; border-radius: 8px; min-height: 40px; display: flex; align-items: center; }

  /* Job pills */
  .job-pill { display: flex; align-items: center; gap: 10px; padding: 7px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; font-size: .86rem; }
  .job-name { flex: 1; font-weight: 600; }
  .job-cnt  { color: var(--pink); font-family: var(--mono); }
  .job-lvl  { color: var(--muted); font-size: .78rem; }

  /* Misc */
  .empty { display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: .9rem; padding: 32px; }
  .divider { border: none; border-top: 1px solid var(--border); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  input[type=number]::-webkit-inner-spin-button { opacity: .4; }
  textarea.field { resize: vertical; min-height: 80px; font-family: var(--mono); font-size: .85rem; }

  /* Global Search */
  .gsearch { background: var(--bg); border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; color: var(--text); font-size: .85rem; outline: none; width: 190px; transition: all .2s; }
  .gsearch:focus { border-color: var(--pink); width: 240px; }
  .gsearch::placeholder { color: var(--muted); }

  /* Quick-Actions */
  .qa-bar { display: flex; gap: 6px; flex-wrap: wrap; padding: 10px 14px; background: rgba(52,152,219,.05); border: 1px solid rgba(52,152,219,.18); border-radius: 10px; align-items: center; }
  .qa-label { font-size: .76rem; color: var(--muted); white-space: nowrap; margin-right: 2px; }
  .qa-btn { padding: 4px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; font-size: .8rem; transition: all .15s; white-space: nowrap; }
  .qa-btn:hover { border-color: var(--blue); color: var(--blue); }

  /* Sparkline */
  .sparkline-wrap { position: relative; height: 56px; }
  .sparkline-svg { width: 100%; height: 56px; }
  .sparkline-lbl { position: absolute; top: 0; right: 0; font-size: .72rem; color: var(--muted); }

  /* Online players panel */
  .online-panel { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 14px; background: rgba(46,204,113,.04); border: 1px solid rgba(46,204,113,.18); border-radius: 10px; align-items: center; min-height: 42px; }
  .op-lbl { font-size: .76rem; color: var(--muted); margin-right: 4px; }
  .op-chip { padding: 3px 10px; background: rgba(46,204,113,.1); border: 1px solid rgba(46,204,113,.3); border-radius: 12px; font-size: .8rem; color: var(--green); cursor: pointer; transition: all .15s; }
  .op-chip:hover { background: rgba(46,204,113,.2); }

  /* Audit Log */
  .audit-row { display: flex; align-items: center; gap: 10px; padding: 6px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 7px; font-size: .83rem; }
  .audit-ts { color: var(--muted); font-family: var(--mono); font-size: .72rem; white-space: nowrap; min-width: 135px; }
  .audit-action { font-family: var(--mono); min-width: 105px; font-size: .8rem; }
  .audit-target { font-weight: 600; min-width: 90px; font-family: var(--mono); }
  .audit-detail { color: var(--muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* Claims Map */
  .claims-canvas { display: block; border-radius: 8px; border: 1px solid var(--border); background: #0a0a12; cursor: crosshair; image-rendering: pixelated; }
  .claims-legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .cl-entry { display: flex; align-items: center; gap: 5px; font-size: .76rem; }
  .cl-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  /* Economy overview bars */
  .eco-bar-wrap { display: flex; flex-direction: column; gap: 3px; margin-bottom: 8px; }
  .eco-bar-lbl  { display: flex; justify-content: space-between; font-size: .78rem; color: var(--muted); }
  .eco-bar      { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .eco-bar-fill { height: 100%; border-radius: 4px; transition: width .4s; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="lbox">
    <h1>✦ Pink Horizon</h1>
    <p>Server Dashboard</p>
    <input type="password" id="pw-input" placeholder="Passwort" autocomplete="current-password">
    <button class="lbtn" onclick="login()">Einloggen</button>
    <div class="lerr" id="lerr">Falsches Passwort!</div>
  </div>
</div>

<div class="toast-wrap" id="toast-wrap"></div>

<div id="app" class="hidden">
  <nav id="sidebar">
    <div class="nav-logo">✦ Pink Horizon</div>
    <div id="nav-body"></div>
    <div class="nav-footer">
      <button class="logout-btn" onclick="logout()">⏻ Abmelden</button>
    </div>
  </nav>
  <div id="main-area">
    <header id="page-header">
      <span id="page-title"></span>
      <input class="gsearch" id="global-search" placeholder="🔍 Spieler suchen…" onkeydown="if(event.key==='Enter'&&this.value.trim()){nav('players');setTimeout(()=>loadPl(this.value.trim()),120);this.value=''}">
      <div id="hdr-actions"></div>
    </header>
    <main id="page-content"></main>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────
let TOKEN = localStorage.getItem('ph_token') || '';
let PAGE  = 'dashboard';
let srvData = {};
let curPlayer = null;
let rTab = 'lobby';
let rCache = {};
let ws = null;
let conSrv = null;
let cmdHist = [], histIdx = -1;
let autoScroll = true;
const logBuf = { 'ph-velocity': [], 'ph-lobby': [], 'ph-survival': [], 'ph-minigames': [], 'ph-smash': [] };

// ── Rang-Definitionen ─────────────────────────────────────────────────────
const RANK_DEFS = [
  { id:'owner',     label:'Owner',     color:'#ff4444', bg:'rgba(255,68,68,.1)',  border:'rgba(255,68,68,.3)',  icon:'👑', desc:'Serverbesitzer'  },
  { id:'admin',     label:'Admin',     color:'#ff7722', bg:'rgba(255,119,34,.1)', border:'rgba(255,119,34,.3)', icon:'⚙️',  desc:'Administrator'   },
  { id:'dev',       label:'DEV',       color:'#aa44ff', bg:'rgba(170,68,255,.1)', border:'rgba(170,68,255,.3)', icon:'💻', desc:'Entwickler'       },
  { id:'moderator', label:'Moderator', color:'#3388ff', bg:'rgba(51,136,255,.1)', border:'rgba(51,136,255,.3)', icon:'🛡️', desc:'Moderator'        },
  { id:'supporter', label:'Supporter', color:'#00ccaa', bg:'rgba(0,204,170,.1)',  border:'rgba(0,204,170,.3)',  icon:'🎧', desc:'Support-Team'     },
  { id:'vip',       label:'VIP',       color:'#ffcc00', bg:'rgba(255,204,0,.1)',  border:'rgba(255,204,0,.3)',  icon:'⭐', desc:'VIP-Spieler'      },
  { id:'spieler',   label:'Spieler',   color:'#888888', bg:'rgba(136,136,136,.1)',border:'rgba(136,136,136,.3)',icon:'🎮', desc:'Standard-Rang'    },
];

function rankDef(id) { return RANK_DEFS.find(r=>r.id===id) || RANK_DEFS[6]; }

function rankBadge(rankId) {
  const rd = rankDef(rankId);
  return `<span class="rank-badge" style="color:${rd.color};border-color:${rd.border};background:${rd.bg}">${rd.icon} ${rd.label}</span>`;
}

// ── Auth ──────────────────────────────────────────────────────────────────
async function login() {
  const pw = document.getElementById('pw-input').value;
  const r  = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:pw}) });
  const d  = await r.json();
  if (d.ok) {
    TOKEN = d.token; localStorage.setItem('ph_token', TOKEN);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.remove('hidden');
    init();
  } else { document.getElementById('lerr').style.display = 'block'; }
}
function logout() { localStorage.removeItem('ph_token'); location.reload(); }
document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key==='Enter') login(); });

// ── Init ──────────────────────────────────────────────────────────────────
async function init() {
  connectWs();
  await loadSrv();
  setInterval(loadSrv, 10000);
  nav('dashboard');
  if (Notification.permission === 'default') Notification.requestPermission();
}

async function loadSrv() {
  const r = await apiFetch('/api/servers');
  if (!r?.ok) return;
  srvData = await r.json();
  buildNav();
}

// ── Navigation ────────────────────────────────────────────────────────────
const NAV_DEF = [
  { sec: 'Übersicht' },
  { id:'dashboard',    icon:'📊', label:'Dashboard'       },
  { sec: 'Konsolen' },
  { id:'con_velocity', dot:true,  label:'Velocity Proxy', srv:'velocity'  },
  { id:'con_lobby',    dot:true,  label:'Lobby',          srv:'lobby'     },
  { id:'con_survival', dot:true,  label:'Survival',       srv:'survival'  },
  { id:'con_minigames',dot:true,  label:'Minigames',      srv:'minigames' },
  { id:'con_smash',    dot:true,  label:'Smash the Boss', srv:'smash' },
  { sec: 'Survival' },
  { id:'players',      icon:'👥', label:'Spieler'         },
  { id:'permissions',  icon:'🎖️', label:'Permissions'    },
  { id:'economy',      icon:'💰', label:'Wirtschaft'      },
  { id:'bank',         icon:'🏦', label:'Bank'            },
  { id:'jobs',         icon:'⛏',  label:'Jobs & Level'   },
  { id:'stats',        icon:'📈', label:'Statistiken'     },
  { id:'auction',      icon:'🏪', label:'Auktionshaus'    },
  { id:'rights',       icon:'🔑', label:'Rechte'          },
  { sec: 'Minigames' },
  { id:'mg_bedwars',   icon:'🛏', label:'BedWars'         },
  { sec: 'Smash the Boss' },
  { id:'smash_lb',     icon:'⚔', label:'Leaderboard'     },
  { sec: 'Tools' },
  { id:'commands',     icon:'📋', label:'Befehlsreferenz' },
  { id:'sqlconsole',   icon:'🖥️', label:'SQL-Konsole'    },
  { sec: 'System' },
  { id:'sysmon',       icon:'📡', label:'System-Monitor'  },
  { id:'backup',       icon:'💾', label:'Backup'          },
  { id:'motd',         icon:'📝', label:'MOTD-Editor'     },
  { id:'audit',        icon:'📜', label:'Audit-Log'       },
];

function buildNav() {
  const nb = document.getElementById('nav-body');
  nb.innerHTML = '';
  for (const item of NAV_DEF) {
    if (item.sec) {
      const d = document.createElement('div');
      d.className = 'nav-sec'; d.textContent = item.sec;
      nb.appendChild(d); continue;
    }
    const btn = document.createElement('button');
    btn.className = 'nav-item' + (PAGE === item.id ? ' active' : '');
    btn.onclick = () => nav(item.id);
    if (item.dot) {
      const srv = srvData[item.srv];
      btn.innerHTML = `<span class="ndot ${srv?.running?'on':'off'}"></span><span>${escH(item.label)}</span>`;
    } else {
      btn.innerHTML = `<span>${item.icon}</span><span>${escH(item.label)}</span>`;
    }
    nb.appendChild(btn);
  }
}

function nav(p) {
  const wasStats = PAGE === 'sysmon' || PAGE === 'dashboard';
  const isStats  = p   === 'sysmon' || p   === 'dashboard';
  if (wasStats && !isStats && ws?.readyState === 1)
    ws.send(JSON.stringify({ type: 'unsubscribe_stats' }));
  PAGE = p; buildNav(); renderPage();
  if (!wasStats && isStats && ws?.readyState === 1)
    ws.send(JSON.stringify({ type: 'subscribe_stats' }));
}

function setHdr(title, html) {
  document.getElementById('page-title').textContent = title;
  document.getElementById('hdr-actions').innerHTML = html || '';
  const c = document.getElementById('page-content');
  c.removeAttribute('style');
}

// ── Router ────────────────────────────────────────────────────────────────
function renderPage() {
  if (PAGE === 'dashboard')    return renderDash();
  if (PAGE.startsWith('con_')) return renderCon(PAGE.slice(4));
  if (PAGE === 'players')      return renderPlayers();
  if (PAGE === 'permissions')  return renderPermissions();
  if (PAGE === 'economy')      return renderEcon();
  if (PAGE === 'bank')         return renderBank();
  if (PAGE === 'jobs')         return renderJobs();
  if (PAGE === 'stats')        return renderStats();
  if (PAGE === 'auction')      return renderAuction();
  if (PAGE === 'rights')       return renderRights();
  if (PAGE === 'commands')     return renderCmds();
  if (PAGE === 'sqlconsole')   return renderSqlConsole();
  if (PAGE === 'backup')       return renderBackup();
  if (PAGE === 'motd')         return renderMotd();
  if (PAGE === 'mg_bedwars')   return renderBedWars();
  if (PAGE === 'smash_lb')     return renderSmash();
  if (PAGE === 'sysmon')       return renderSysmon();
  if (PAGE === 'audit')        return renderAudit();
}

// ── Dashboard ─────────────────────────────────────────────────────────────
async function renderDash() {
  setHdr('📊 Dashboard', `
    <button class="btn" onclick="renderDash()">↺ Aktualisieren</button>
    <button class="btn" onclick="openDiscordModal()">💬 Discord</button>
    <button class="btn btn-d" onclick="openRestartModal()">🔄 Netzwerk-Neustart</button>
  `);
  const c = document.getElementById('page-content');
  c.innerHTML = `<div class="page">
    <div class="bcast-bar">
      <span class="bcast-label">📡 Broadcast:</span>
      <input class="field bcast-input" id="bcast-msg" placeholder="Nachricht an alle Server…" onkeydown="if(event.key==='Enter')doBroadcast()">
      <button class="btn btn-p" onclick="doBroadcast()">Senden</button>
    </div>
    <div class="qa-bar">
      <span class="qa-label">⚡ Quick-Actions (Survival):</span>
      <button class="qa-btn" onclick="doQuickAction('survival','time_day')">☀️ Tag</button>
      <button class="qa-btn" onclick="doQuickAction('survival','time_night')">🌙 Nacht</button>
      <button class="qa-btn" onclick="doQuickAction('survival','weather_clear')">🌤 Klar</button>
      <button class="qa-btn" onclick="doQuickAction('survival','weather_rain')">🌧 Regen</button>
      <button class="qa-btn" onclick="doQuickAction('survival','itemclear')">🗑 Itemclear</button>
      <button class="qa-btn" onclick="doQuickAction('survival','save_all')">💾 Save</button>
    </div>
    <div class="g3" id="srv-cards"><div class="empty">Lade…</div></div>
    <div class="g4" id="stat-row"></div>
    <div id="online-section"></div>
    <div id="sparkline-section"></div>
    <div id="res-section"></div>
    <div class="g3" id="db-section"><div class="empty">Lade Datenbankstatus…</div></div>
  </div>`;

  let totalOn = 0; let totalRun = 0;
  let cards = '';
  for (const [k, srv] of Object.entries(srvData)) {
    if (srv.running) totalRun++;
    let onStr = '—'; let cnt = 0;
    if (srv.rcon && srv.running) {
      try {
        const r = await apiFetch(`/api/players/online?server=${k}`);
        if (r?.ok) { const d = await r.json(); cnt = d.players?.length||0; onStr = cnt; totalOn += cnt; }
      } catch {}
    }
    const up = srv.started ? fmtUp(Date.now() - new Date(srv.started).getTime()) : '—';
    cards += `<div class="card">
      <div class="srv-card-hdr">
        <span class="srv-card-name">${escH(srv.label)}</span>
        <span class="badge ${srv.running?'b-green':'b-red'}">${escH(srv.status)}</span>
      </div>
      <div class="srv-meta">
        <div class="srv-row"><span>Spieler online</span><span>${onStr}</span></div>
        <div class="srv-row"><span>Uptime</span><span>${up}</span></div>
        <div class="srv-row"><span>Container</span><span style="font-family:var(--mono);font-size:.78rem">${escH(srv.container)}</span></div>
      </div>
      <div class="srv-actions">
        ${srv.running
          ? `<button class="btn btn-d" style="font-size:.8rem" onclick="doSrv('${k}','stop')">⏹ Stop</button>
             <button class="btn"       style="font-size:.8rem" onclick="doSrv('${k}','restart')">🔄 Restart</button>`
          : `<button class="btn btn-s" style="font-size:.8rem" onclick="doSrv('${k}','start')">▶ Start</button>`}
        <button class="btn" style="font-size:.8rem" onclick="nav('con_${k}')">🖥️ Konsole</button>
      </div>
    </div>`;
    if (!document.getElementById('srv-cards')) return;
  }
  const sc = document.getElementById('srv-cards');
  if (sc) sc.innerHTML = cards || '<div class="empty">Keine Server</div>';

  const st = document.getElementById('stat-row');
  if (st) st.innerHTML = `
    <div class="card stat-card"><span class="stat-icon">🖥️</span><div><div class="stat-lbl">Server online</div><div class="stat-val">${totalRun}/${Object.keys(srvData).length}</div></div></div>
    <div class="card stat-card"><span class="stat-icon">👥</span><div><div class="stat-lbl">Spieler online</div><div class="stat-val">${totalOn}</div></div></div>
    <div class="card stat-card" style="cursor:pointer" onclick="nav('players')"><span class="stat-icon">👤</span><div><div class="stat-lbl">Spielerverwaltung</div><div class="stat-val" style="font-size:1rem;color:var(--pink)">→ Öffnen</div></div></div>
    <div class="card stat-card" style="cursor:pointer" onclick="nav('audit')"><span class="stat-icon">📜</span><div><div class="stat-lbl">Audit-Log</div><div class="stat-val" style="font-size:1rem;color:var(--pink)">→ Öffnen</div></div></div>`;

  loadOnlinePanel();
  loadSparkline();
  loadDbStatus();
  loadResStats();
}

async function loadOnlinePanel() {
  const el = document.getElementById('online-section'); if (!el) return;
  const all = [];
  for (const [k, srv] of Object.entries(srvData)) {
    if (!srv.rcon || !srv.running) continue;
    try {
      const r = await apiFetch(`/api/players/online?server=${k}`);
      if (r?.ok) { const d = await r.json(); all.push(...(d.players||[]).map(n=>({name:n,srv:srv.label}))); }
    } catch {}
  }
  if (!all.length) { el.innerHTML=''; return; }
  el.innerHTML = `<div class="online-panel">
    <span class="op-lbl">🟢 Online (${all.length}):</span>
    ${all.map(p=>`<span class="op-chip" onclick="nav('players');setTimeout(()=>loadPl('${escH(p.name)}'),120)" title="${escH(p.srv)}">${escH(p.name)}</span>`).join('')}
  </div>`;
}

async function loadSparkline() {
  const el = document.getElementById('sparkline-section'); if (!el) return;
  const r = await apiFetch('/api/metrics/players');
  if (!r?.ok) return;
  const { data } = await r.json();
  if (!data || data.length < 2) { el.innerHTML=''; return; }
  const counts = data.map(d=>d.count);
  const max = Math.max(...counts, 1);
  const W = 600, H = 56, pad = 4;
  const pts = data.map((d,i) => {
    const x = pad + (i / (data.length-1)) * (W - pad*2);
    const y = H - pad - ((d.count / max) * (H - pad*2));
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const last = data[data.length-1];
  el.innerHTML = `<div class="card" style="padding:12px 16px 8px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <span class="card-title" style="margin:0">📈 Spieler-Verlauf (letzte ${data.length * 5} Min)</span>
      <span style="font-size:.78rem;color:var(--muted)">Jetzt: <b style="color:var(--green)">${last.count}</b> · Max: <b>${max}</b></span>
    </div>
    <div class="sparkline-wrap">
      <svg class="sparkline-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
        <defs><linearGradient id="spk-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="var(--green)" stop-opacity=".35"/>
          <stop offset="100%" stop-color="var(--green)" stop-opacity="0"/>
        </linearGradient></defs>
        <polygon points="${pts} ${(W-pad).toFixed(1)},${H} ${pad},${H}" fill="url(#spk-grad)"/>
        <polyline points="${pts}" fill="none" stroke="var(--green)" stroke-width="2" stroke-linejoin="round"/>
      </svg>
    </div>
  </div>`;
}

async function doQuickAction(srv, action) {
  const labels = { time_day:'☀️ Tag gesetzt', time_night:'🌙 Nacht gesetzt', weather_clear:'🌤 Wetter klar', weather_rain:'🌧 Regen gesetzt', itemclear:'🗑 Items geclearet', save_all:'💾 Gespeichert' };
  const r = await apiFetch(`/api/servers/${srv}/quickaction`, { method:'POST', body:JSON.stringify({action}) });
  const d = r ? await r.json() : null;
  showToast(d?.ok ? `✓ ${labels[action]||action}` : `✗ ${d?.error||'Fehler'}`, d?.ok);
}

function openDiscordModal() {
  showModal('💬 Discord-Webhook', `
    <div style="display:flex;flex-direction:column;gap:10px">
      <div>
        <label style="font-size:.82rem;color:var(--muted)">Webhook-URL:</label>
        <input class="field" id="dc-url" placeholder="https://discord.com/api/webhooks/…" style="margin-top:4px">
      </div>
      <div>
        <label style="font-size:.82rem;color:var(--muted)">Nachricht:</label>
        <textarea class="field" id="dc-msg" placeholder="Nachricht an Discord…" rows="3" style="margin-top:4px"></textarea>
      </div>
    </div>`, 'Senden', async () => {
    const webhookUrl = document.getElementById('dc-url')?.value?.trim();
    const message    = document.getElementById('dc-msg')?.value?.trim();
    const r = await apiFetch('/api/network/discord', { method:'POST', body:JSON.stringify({ webhookUrl, message }) });
    const d = r ? await r.json() : null;
    showToast(d?.ok ? '✓ Discord-Nachricht gesendet!' : `✗ ${d?.error||'Fehler'}`, d?.ok);
  });
}

async function doBroadcast() {
  const el  = document.getElementById('bcast-msg');
  const msg = el?.value?.trim(); if (!msg) return;
  const r = await apiFetch('/api/broadcast', { method:'POST', body:JSON.stringify({ message: msg }) });
  const d = r ? await r.json() : null;
  if (d?.ok) { showToast(`📡 Broadcast gesendet: "${msg}"`); el.value = ''; }
  else        showToast('✗ Broadcast fehlgeschlagen', false);
}

function openRestartModal() {
  const existing = document.getElementById('restart-modal');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.id = 'restart-modal';
  el.className = 'modal-bg';
  el.innerHTML = `
    <div class="modal-box" style="width:360px">
      <h3>🔄 Netzwerk-Neustart</h3>
      <p style="color:var(--muted);font-size:.88rem">Startet auf allen Servern einen Countdown mit Bossbar und Chat-Ankündigungen.</p>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin:4px 0">
        ${[1,2,3,5,10].map(m=>`<button class="btn" onclick="setRestartMin(${m})" id="rmin-${m}">${m} Min</button>`).join('')}
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <label style="font-size:.88rem;color:var(--muted);white-space:nowrap">Eigene Minuten:</label>
        <input class="field" id="restart-custom-min" type="number" min="1" max="60" placeholder="z.B. 7" style="width:90px">
      </div>
      <div style="font-size:.85rem;color:var(--muted)">Gewählt: <b id="restart-chosen">5 Minuten</b></div>
      <div class="modal-actions">
        <button class="btn" onclick="document.getElementById('restart-modal').remove()">Abbrechen</button>
        <button class="btn btn-d" onclick="doNetworkRestart()">🔄 Jetzt starten</button>
      </div>
    </div>`;
  document.body.appendChild(el);
  setRestartMin(5);
  document.getElementById('restart-custom-min').addEventListener('input', function() {
    const v = parseInt(this.value);
    if (v >= 1 && v <= 60) {

}

         <button class="btn"       onclick="doSrv('${k}','restart')">🔄 Restart</button>`

      <input class="field" id="cmd-in" placeholder="Befehl eingeben…" ${!srv.rcon?'disabled':''}>
      <button class="btn btn-p" onclick="sendCmd('${k}')">Senden</button>
    </div>
  </div>`;
  const out = document.getElementById('con-out');
  for (const line of (logBuf[srv.container]||[])) addLine(out, line, false);
  if (autoScroll && out) out.scrollTop = out.scrollHeight;
  document.getElementById('cmd-in')?.addEventListener('keydown', e => {
    if (e.key==='Enter') sendCmd(k);
    if (e.key==='ArrowUp')   { histIdx=Math.min(histIdx+1,cmdHist.length-1); e.target.value=cmdHist[histIdx]||''; }
    if (e.key==='ArrowDown') { histIdx=Math.max(histIdx-1,-1); e.target.value=cmdHist[histIdx]||''; }
  });
  out?.addEventListener('scroll', ()=>{ autoScroll = out.scrollTop+out.clientHeight >= out.scrollHeight-20; });
  subscribeLog(srv.container);
}

async function sendCmd(k) {
  const el = document.getElementById('cmd-in');
  const cmd = el?.value?.trim(); if (!cmd) return;
  el.value = ''; cmdHist.unshift(cmd); histIdx = -1;
  const out = document.getElementById('con-out');
  addLine(out, `> ${cmd}`, false, 'cmd');
  const r = await apiFetch(`/api/servers/${k}/command`, { method:'POST', body:JSON.stringify({command:cmd}) });
  if (!r) return;
  const d = await r.json();
  if (d.output) addLine(out, `← ${d.output}`, false);
  if (d.error)  addLine(out, `✗ ${d.error}`,  false);
}

function addLine(out, text, buf=true, cls='') {
  if (buf && conSrv) { const b=logBuf[conSrv]||[]; b.push(text); while(b.length>500)b.shift(); logBuf[conSrv]=b; }
  if (!out) return;
  for (const line of text.split('\n')) {
    if (!line.trim()) continue;
    const d = document.createElement('div');
    d.className = 'll ' + (cls || classLine(line));
    d.textContent = line;
    out.appendChild(d);
  }
  while (out.children.length>1000) out.removeChild(out.firstChild);
  if (autoScroll) out.scrollTop = out.scrollHeight;
}

function classLine(l) {
  const s = l.toLowerCase();
  if (s.includes('error')||s.includes('exception')||s.includes('fatal')) return 'error';
  if (s.includes('warn')) return 'warn';
  if (s.includes('info')) return 'info';
  return '';
}

function drawClaimsMap(canvasId, claims, ownerName) {
  const canvas = document.getElementById(canvasId); if (!canvas) return;
  const rect = canvas.getBoundingClientRect();
  canvas.width  = Math.floor(rect.width  || 600);
  canvas.height = Math.floor(rect.height || 280);
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  if (!claims.length) return;

  const xs = claims.map(c => c.chunk_x), zs = claims.map(c => c.chunk_z);
  const minX = Math.min(...xs) - 2, maxX = Math.max(...xs) + 2;
  const minZ = Math.min(...zs) - 2, maxZ = Math.max(...zs) + 2;
  const rangeX = maxX - minX || 1, rangeZ = maxZ - minZ || 1;
  const cellW = canvas.width  / rangeX;
  const cellH = canvas.height / rangeZ;
  const cell  = Math.max(2, Math.min(cellW, cellH));

  const offX = (canvas.width  - cell * rangeX) / 2;
  const offZ = (canvas.height - cell * rangeZ) / 2;

  ctx.fillStyle = 'rgba(46,204,113,0.5)';
  ctx.strokeStyle = 'rgba(46,204,113,0.9)';
  ctx.lineWidth = 1;
  for (const c of claims) {
    const px = offX + (c.chunk_x - minX) * cell;
    const pz = offZ + (c.chunk_z - minZ) * cell;
    ctx.fillRect(px, pz, cell - 1, cell - 1);
    ctx.strokeRect(px, pz, cell - 1, cell - 1);
  }
  ctx.fillStyle = 'rgba(255,255,255,.35)';
  ctx.font = '10px monospace';
  ctx.fillText(`${claims.length} Chunks · ${ownerName}`, 6, 14);

  // Tooltip on hover
  canvas.onmousemove = ev => {
    const br = canvas.getBoundingClientRect();
    const mx = (ev.clientX - br.left) * (canvas.width  / br.width);
    const mz = (ev.clientY - br.top)  * (canvas.height / br.height);
    const cx = Math.floor((mx - offX) / cell) + minX;
    const cz = Math.floor((mz - offZ) / cell) + minZ;
    const hit = claims.find(c => c.chunk_x === cx && c.chunk_z === cz);
    canvas.title = hit ? `Chunk ${cx}/${cz} · Block ${cx*16+8}/${cz*16+8}` : '';
  };
}

  const d = r?await r.json():null;
  showMsg(msg, d?.ok, d?.output||d?.error||'Fehler');
  if (d?.ok) {
    const r2 = await apiFetch('/api/players/info',{method:'POST',body:JSON.stringify({name:curPlayer.name})});
    if (r2?.ok) { curPlayer=await r2.json(); const el=document.getElementById('coin-disp'); if(el) el.textContent=curPlayer.coins.toLocaleString('de-DE'); }

async function renderPermPlayers(el) {
  el.innerHTML = `<div style="margin-top:8px"><div class="empty">Lade Spielerliste…</div></div>`;
  const r = await apiFetch('/api/permissions/players');
  if (!r?.ok) { el.innerHTML=`<div class="empty" style="color:var(--red)">Datenbankfehler – Spielerliste nicht verfügbar</div>`; return; }
  const { players } = await r.json();
  if (!players?.length) { el.innerHTML=`<div class="empty">Keine Spieler in der Datenbank</div>`; return; }

  // Group by rank
  const grouped = {};
  for (const rd of RANK_DEFS) grouped[rd.id] = [];
  for (const p of players) (grouped[p.rank] || (grouped['spieler'])).push(p);

  let html = `<div style="margin-top:8px;display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap">
    <input class="field fsm" id="perm-search" placeholder="Spieler filtern…" oninput="filterPermPlayers()" style="width:220px">
    <span style="color:var(--muted);font-size:.85rem;align-self:center">${players.length} Spieler gesamt</span>
  </div>
  <div id="perm-player-grid" style="display:flex;flex-direction:column;gap:12px">`;

  for (const rd of RANK_DEFS) {
    const list = grouped[rd.id];
    if (!list.length) continue;
    html += `<div class="perm-group" data-rank="${rd.id}">
      <div style="font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:${rd.color};margin-bottom:4px">
        ${rd.icon} ${rd.label} (${list.length})
      </div>
      <div class="perm-player-list">
        ${list.map(p=>`<div class="perm-row" data-name="${escH(p.name.toLowerCase())}">
          <span class="perm-name" onclick="nav('players');setTimeout(()=>loadPl('${escH(p.name)}'),150)">${escH(p.name)}</span>
          ${rankBadge(rd.id)}
          <button class="btn-xs g" onclick="quickRankChange('${escH(p.name)}','${rd.id}')">Ändern</button>
        </div>`).join('')}
      </div>
    </div>`;
  }
  html += '</div>';
  el.innerHTML = html;
}

function filterPermPlayers() {
  const q = (document.getElementById('perm-search')?.value || '').toLowerCase();
  document.querySelectorAll('#perm-player-grid .perm-row').forEach(row => {
    const name = row.dataset.name || '';
    row.style.display = name.includes(q) ? '' : 'none';
  });
  document.querySelectorAll('#perm-player-grid .perm-group').forEach(grp => {
    const visible = [...grp.querySelectorAll('.perm-row')].some(r => r.style.display !== 'none');
    grp.style.display = visible ? '' : 'none';
  });
}

  const r = await apiFetch('/api/bank/overview');
  const el = document.getElementById('bank-kpi'); if (!el) return;
  if (!r?.ok) { el.innerHTML='<div class="empty" style="grid-column:1/-1">Nicht verfügbar</div>'; return; }
  const d = await r.json();
  const avg = d.accounts > 0 ? Math.round(d.total / d.accounts) : 0;
  el.innerHTML = `
    <div class="card stat-card"><span class="stat-icon">💰</span><div><div class="stat-lbl">Coins in der Bank</div><div class="stat-val" style="color:var(--blue)">${Number(d.total).toLocaleString('de-DE')}</div></div></div>
    <div class="card stat-card"><span class="stat-icon">👤</span><div><div class="stat-lbl">Aktive Konten</div><div class="stat-val">${Number(d.accounts).toLocaleString('de-DE')}</div></div></div>
    <div class="card stat-card"><span class="stat-icon">📊</span><div><div class="stat-lbl">Ø Guthaben</div><div class="stat-val" style="color:var(--blue)">${avg.toLocaleString('de-DE')}</div></div></div>`;
}

async function loadBankTop() {
  const el = document.getElementById('bank-top'); if (!el) return;
  const r = await apiFetch('/api/bank/top');
  if (!r?.ok) { el.innerHTML='<div class="empty">Nicht verfügbar</div>'; return; }
  const { rows } = await r.json();
  if (!rows.length) { el.innerHTML='<div class="empty">Keine Einträge</div>'; return; }
  const rc = ['gold','silver','bronze'];
  el.innerHTML = '<div style="display:flex;flex-direction:column;gap:4px;margin-top:6px">' +
    rows.map((e,i)=>`<div class="bt-row">
      <span class="bt-rank ${rc[i]||''}">#${i+1}</span>
      <span class="bt-name" onclick="nav('players');setTimeout(()=>loadPl('${escH(e.name)}'),150)">${escH(e.name)}</span>
      <span style="color:var(--blue);font-weight:700">🏦 ${e.balance.toLocaleString('de-DE')}</span>
      <span style="font-size:.74rem;color:var(--muted);font-family:var(--mono)">${e.last_interest||''}</span>

let bankPlTimer = null;
async function loadBankPlayer() {
  clearTimeout(bankPlTimer);
  bankPlTimer = setTimeout(async () => {
    const name = document.getElementById('bank-pl')?.value?.trim();
    const info = document.getElementById('bank-pl-info');
    const err  = document.getElementById('bank-pl-err');
    if (!name) { info.style.display='none'; err.style.display='none'; return; }
    const r = await apiFetch(`/api/bank/player?name=${encodeURIComponent(name)}`);
    const d = r ? await r.json() : null;
    if (!d?.ok) { info.style.display='none'; err.style.display='block'; err.textContent='Spieler nicht gefunden'; return; }
    err.style.display='none';
    document.getElementById('bank-pl-bal').textContent = d.balance.toLocaleString('de-DE') + ' Coins';
    document.getElementById('bank-pl-int').textContent = d.lastInterest || '–';
    info.style.display='block';
  }, 400);
}

async function doBankSet() {
  const name = document.getElementById('bank-pl')?.value?.trim();
  const amt  = parseInt(document.getElementById('bank-set-amt')?.value);
  const msg  = document.getElementById('bank-set-msg');
  if (!name || !Number.isInteger(amt) || amt < 0) { showMsg(msg, false, 'Spieler und Betrag angeben'); return; }
  const r = await apiFetch('/api/bank/player', { method:'POST', body:JSON.stringify({ name, balance: amt }) });
  const d = r ? await r.json() : null;
  showMsg(msg, d?.ok, d?.ok ? `✓ Guthaben auf ${amt.toLocaleString('de-DE')} gesetzt` : (d?.error||'Fehler'));
  if (d?.ok) {
    showToast(`✓ Bankkonto von ${name} aktualisiert`);
    document.getElementById('bank-pl-bal').textContent = amt.toLocaleString('de-DE') + ' Coins';
    loadBankTop();
    loadBankOverview();
  }
}

function switchR(t) {
  rTab = t;
  const labels = { lobby:'Lobby', survival:'Survival', minigames:'Minigames', smash:'Smash' };
  document.querySelectorAll('.rtab').forEach(b=>b.classList.toggle('active',b.textContent.trim()===labels[t]));
  const el=document.getElementById('rbody'); if(el) el.innerHTML='<div class="empty">Lade…</div>';
  loadR(t);
}

async function loadR(srv) {
  const [or, wr] = await Promise.all([apiFetch(`/api/servers/${srv}/ops`), apiFetch(`/api/servers/${srv}/whitelist`)]);
  const od = or?.ok?await or.json():{ops:[]};
  const wd = wr?.ok?await wr.json():{whitelist:[],enabled:false};
  rCache[srv] = { ops:od.ops||[], wl:wd.whitelist||[], wlOn:!!wd.enabled };
  renderRBody(srv);
}

function renderRBody(srv) {
  const el = document.getElementById('rbody'); if (!el) return;
  const d = rCache[srv]||{ops:[],wl:[],wlOn:false};
  const opRows = d.ops.length
    ? d.ops.map(op=>`<div class="pentry"><span class="pentry-name">👑 ${escH(op.name||op)}</span><button class="btn-xs" onclick="rDeop('${srv}','${escH(op.name||op)}')">De-OP</button></div>`).join('')
    : '<div style="color:var(--muted);font-size:.85rem;padding:4px">Keine Operatoren</div>';
  const wlRows = d.wl.length
    ? d.wl.map(w=>`<div class="pentry"><span class="pentry-name">${escH(w.name||w)}</span><button class="btn-xs" onclick="rWlRm('${srv}','${escH(w.name||w)}')">Entfernen</button></div>`).join('')
    : '<div style="color:var(--muted);font-size:.85rem;padding:4px">Whitelist ist leer</div>';
  el.innerHTML = `
    <div class="rsec">
      <div class="rhdr"><span class="rttl">👑 Operatoren (OP)</span></div>
      <div class="pentries">${opRows}</div>
      <div class="irow" style="margin-top:4px">
        <input class="field fsm" id="op-in" placeholder="Spielername…" onkeydown="if(event.key==='Enter')rOp('${srv}')">
        <button class="btn-xs g" onclick="rOp('${srv}')">OP geben</button>
      </div>
      <div id="op-msg" style="display:none" class="msg"></div>
    </div>
    <hr class="divider">
    <div class="rsec">
      <div class="rhdr">
        <span class="rttl">📋 Whitelist</span>
        <span class="wl-pill ${d.wlOn?'wl-on':'wl-off'}">${d.wlOn?'AN':'AUS'}</span>
        <button class="btn-xs ${d.wlOn?'':'g'}" onclick="rWlToggle('${srv}')">${d.wlOn?'Deaktivieren':'Aktivieren'}</button>
      </div>
      <div class="pentries">${wlRows}</div>
      <div class="irow" style="margin-top:4px">
        <input class="field fsm" id="wl-in" placeholder="Spielername…" onkeydown="if(event.key==='Enter')rWlAdd('${srv}')">
        <button class="btn-xs g" onclick="rWlAdd('${srv}')">Hinzufügen</button>
      </div>
      <div id="wl-msg" style="display:none" class="msg"></div>
    </div>`;
}

async function rOp(srv) {
  const n=document.getElementById('op-in')?.value?.trim(); if(!n) return;
  const r=await apiFetch(`/api/servers/${srv}/op`,{method:'POST',body:JSON.stringify({player:n,action:'op'})});
  const d=r?await r.json():null; showMsg(document.getElementById('op-msg'),d?.ok,d?.output||d?.error||'Fehler');
  if(d?.ok){document.getElementById('op-in').value='';await loadR(srv);}
}
async function rDeop(srv,name) {
  const r=await apiFetch(`/api/servers/${srv}/op`,{method:'POST',body:JSON.stringify({player:name,action:'deop'})});
  const d=r?await r.json():null; showMsg(document.getElementById('op-msg'),d?.ok,d?.output||d?.error||'Fehler');
  if(d?.ok) await loadR(srv);
}
async function rWlAdd(srv) {
  const n=document.getElementById('wl-in')?.value?.trim(); if(!n) return;
  const r=await apiFetch(`/api/servers/${srv}/whitelist`,{method:'POST',body:JSON.stringify({action:'add',player:n})});
  const d=r?await r.json():null; showMsg(document.getElementById('wl-msg'),d?.ok,d?.output||d?.error||'Fehler');
  if(d?.ok){document.getElementById('wl-in').value='';await loadR(srv);}
}
async function rWlRm(srv,name) {
  const r=await apiFetch(`/api/servers/${srv}/whitelist`,{method:'POST',body:JSON.stringify({action:'remove',player:name})});
  const d=r?await r.json():null; showMsg(document.getElementById('wl-msg'),d?.ok,d?.output||d?.error||'Fehler');
  if(d?.ok) await loadR(srv);
}
async function rWlToggle(srv) {
  const action=rCache[srv]?.wlOn?'off':'on';
  const r=await apiFetch(`/api/servers/${srv}/whitelist`,{method:'POST',body:JSON.stringify({action})});
  const d=r?await r.json():null; showMsg(document.getElementById('wl-msg'),d?.ok,d?.output||d?.error||'Fehler');
  if(d?.ok) await loadR(srv);
}

function renderCmds() {
  setHdr('📋 Befehlsreferenz', `<input class="field fsm" id="cmd-q" placeholder="Suchen…" oninput="filterCmds()" style="width:200px">`);
  document.getElementById('page-content').innerHTML = `<div class="page" id="cmd-page">${buildCmdHtml('')}</div>`;
}
function filterCmds() {
  const q=(document.getElementById('cmd-q')?.value||'').toLowerCase();
  const p=document.getElementById('cmd-page'); if(p) p.innerHTML=buildCmdHtml(q);
}
function buildCmdHtml(q) {
  let html='';
  for (const grp of CMD_DATA) {
    let gH=''; let gV=false;
    for (const sec of grp.sections) {
      let sH=''; let sV=false;
      for (const cmd of sec.cmds) {
        const show=!q||cmd.n.toLowerCase().includes(q)||cmd.d.toLowerCase().includes(q)||cmd.u.toLowerCase().includes(q);
        if(show){sV=true;gV=true;}
        sH+=`<div class="crow${show?'':' ch'}"><span class="cn">${escH(cmd.n)}</span><span class="cu">${escH(cmd.u)}</span><span class="cd">${escH(cmd.d)}</span>${cmd.admin?'<span class="ca">Admin</span>':'<span></span>'}</div>`;
      }
      gH+=`<div class="csec${sV?'':' ch'}"><div class="csec-lbl">${escH(sec.label)}</div>${sH}</div>`;
    }
    html+=`<div${gV?'':' class="ch"'}><div class="cg-title">${escH(grp.server)}</div>${gH}</div>`;
  }
  return html||'<div class="empty">Keine Befehle gefunden</div>';
}

async function doBackup(srv) {
  const btn = document.getElementById(`bk-btn-${srv}`);
  const st  = document.getElementById(`bk-status-${srv}`);
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Läuft…'; }
  if (st)  { st.className = 'bk-status msg'; st.textContent = 'Backup wird erstellt…'; }
  const r = await apiFetch(`/api/backup/${srv}`, { method:'POST' });
  const d = r ? await r.json() : null;
  if (btn) { btn.disabled = false; btn.textContent = '💾 Backup starten'; }
  if (st)  {
    st.className = `bk-status msg ${d?.ok?'msg-ok':'msg-err'}`;
    st.textContent = d?.ok ? `✓ ${d.message}` : `✗ ${d?.error||'Fehler'}`;
  }
  showToast(d?.ok ? `✓ Backup (${srv}) erstellt` : `✗ Backup (${srv}) fehlgeschlagen`, d?.ok);
}

const SQL_HINTS = [
  { db:'pinkhorizon',  q:'SELECT uuid, name, rank FROM players ORDER BY FIELD(rank,\'owner\',\'admin\',\'dev\',\'moderator\',\'supporter\',\'vip\',\'spieler\') LIMIT 50' },
  { db:'ph_survival',  q:'SELECT p.name, e.balance FROM sv_economy e JOIN pinkhorizon.players p ON e.uuid=p.uuid ORDER BY e.balance DESC LIMIT 20' },
  { db:'ph_survival',  q:'SELECT p.name, s.playtime, s.deaths, s.mob_kills FROM sv_stats s JOIN pinkhorizon.players p ON s.uuid=p.uuid ORDER BY s.playtime DESC LIMIT 20' },
  { db:'ph_survival',  q:'SELECT p.name, j.job_id, j.level, j.xp FROM sv_jobs j JOIN pinkhorizon.players p ON j.uuid=p.uuid WHERE j.active=TRUE ORDER BY j.level DESC LIMIT 20' },
  { db:'ph_survival',  q:'SELECT seller_name, COUNT(*) AS listings, SUM(price) AS total FROM sv_auction GROUP BY seller_name ORDER BY listings DESC' },
  { db:'ph_survival',  q:'SELECT quest_id, COUNT(*) AS done FROM sv_quests WHERE completed=TRUE GROUP BY quest_id ORDER BY done DESC' },
  { db:'ph_survival',  q:'SELECT COUNT(*) AS friends FROM sv_friends' },
  { db:'ph_survival',  q:'SELECT p.name, b.balance, b.last_interest FROM sv_bank b JOIN pinkhorizon.players p ON b.uuid=p.uuid WHERE b.balance > 0 ORDER BY b.balance DESC LIMIT 20' },
  { db:'ph_minigames', q:'SELECT p.name, s.wins, s.kills, s.beds_broken, s.games_played FROM mg_bedwars_stats s LEFT JOIN pinkhorizon.players p ON s.uuid=p.uuid ORDER BY s.wins DESC LIMIT 20' },
  { db:'ph_minigames', q:'SELECT name, world, max_teams, team_size FROM mg_bedwars_arenas ORDER BY name' },
];

async function renderSqlConsole() {
  setHdr('🖥️ SQL-Konsole', '');
  const c = document.getElementById('page-content');
  c.style.cssText = 'display:flex;flex-direction:column;overflow:hidden;';
  c.innerHTML = `<div class="sql-page">
    <div class="sql-top">
      <div class="irow">
        <select class="field fsm" id="sql-db" style="width:160px">
          <option value="pinkhorizon">pinkhorizon</option>
          <option value="ph_survival">ph_survival</option>
          <option value="ph_minigames">ph_minigames</option>
          <option value="ph_smash">ph_smash</option>
        </select>
        <span style="color:var(--muted);font-size:.82rem">Nur SELECT erlaubt</span>
      </div>
      <textarea class="field" id="sql-query" placeholder="SELECT …" rows="3" onkeydown="if(event.ctrlKey&&event.key==='Enter')runQuery()"></textarea>
      <div class="irow">
        <button class="btn btn-p" onclick="runQuery()">▶ Ausführen <span style="font-size:.72rem;opacity:.7">(Strg+Enter)</span></button>
        <div id="sql-info" style="font-size:.82rem;color:var(--muted)"></div>
      </div>
      <div class="sql-hints">
        ${SQL_HINTS.map((h,i)=>`<span class="sql-hint" onclick="setSqlHint(${i})" title="${escH(h.q)}">${escH(h.q.slice(0,55))}…</span>`).join('')}
      </div>
    </div>
    <div class="sql-body" id="sql-body"><div class="empty">Abfrage eingeben und ausführen</div></div>
  </div>`;
}

function setSqlHint(i) {
  const h = SQL_HINTS[i];
  const q = document.getElementById('sql-query');
  const d = document.getElementById('sql-db');
  if (q) q.value = h.q;
  if (d) d.value = h.db;
}

async function runQuery() {
  const query    = document.getElementById('sql-query')?.value?.trim();
  const database = document.getElementById('sql-db')?.value;
  const info     = document.getElementById('sql-info');
  const body     = document.getElementById('sql-body');
  if (!query) return;
  if (body) body.innerHTML = '<div class="empty">Lade…</div>';
  if (info) info.textContent = '';
  const t0 = Date.now();
  const r  = await apiFetch('/api/db/query', { method:'POST', body:JSON.stringify({ query, database }) });
  const d  = r ? await r.json() : null;
  const ms = Date.now() - t0;
  if (!d?.ok) {
    if (body) body.innerHTML = `<div class="empty" style="color:var(--red)">✗ ${escH(d?.error||'Verbindungsfehler')}</div>`;
    return;
  }
  if (info) info.textContent = `${d.count} Zeile(n) · ${ms}ms`;
  if (!body) return;
  if (!d.rows.length) { body.innerHTML = '<div class="empty">Keine Ergebnisse</div>'; return; }
  const cols = d.columns;
  body.innerHTML = `<div style="overflow-x:auto"><table class="sql-tbl">
    <thead><tr>${cols.map(c=>`<th>${escH(c)}</th>`).join('')}</tr></thead>
    <tbody>${d.rows.map(row=>`<tr>${cols.map(c=>`<td title="${escH(String(row[c]??''))}">${escH(String(row[c]??'NULL'))}</td>`).join('')}</tr>`).join('')}</tbody>
  </table></div>`;
}

async function renderMotd() {
  setHdr('📝 MOTD-Editor', '');
  document.getElementById('page-content').innerHTML = `<div class="page">
    ${['lobby','survival'].map(srv=>`
      <div class="card">
        <div class="card-title">${srv==='lobby'?'🏛️ Lobby':'⛏️ Survival'} – MOTD</div>
        <div style="display:flex;flex-direction:column;gap:10px;margin-top:4px">
          <input class="field" id="motd-${srv}" placeholder="Lade…" onkeydown="if(event.key==='Enter')saveMotd('${srv}')">
          <div style="display:flex;gap:8px;align-items:center">
            <button class="btn btn-p" onclick="saveMotd('${srv}')">💾 Speichern</button>
            <span style="font-size:.78rem;color:var(--muted)">§6, §a etc. für Farben · Tritt nach Neustart in Kraft</span>
          </div>
          <div id="motd-msg-${srv}" style="display:none" class="msg"></div>
        </div>
      </div>`).join('')}
    <div class="card">
      <div class="card-title">🎨 Farb-Codes</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px">
        ${[['§0','#000','Schwarz'],['§1','#0000AA','Dunkelblau'],['§2','#00AA00','Dunkelgrün'],['§3','#00AAAA','Türkis'],
           ['§4','#AA0000','Dunkelrot'],['§5','#AA00AA','Lila'],['§6','#FFAA00','Gold'],['§7','#AAAAAA','Grau'],
           ['§8','#555555','Dunkelgrau'],['§9','#5555FF','Blau'],['§a','#55FF55','Grün'],['§b','#55FFFF','Cyan'],
           ['§c','#FF5555','Rot'],['§d','#FF55FF','Pink'],['§e','#FFFF55','Gelb'],['§f','#FFFFFF','Weiß'],
           ['§l','','Fett'],['§o','','Kursiv'],['§n','','Unterstrichen'],['§r','','Reset']
          ].map(([code,col,name])=>`
          <span style="font-family:var(--mono);font-size:.76rem;padding:3px 8px;border-radius:4px;border:1px solid var(--border);cursor:pointer;background:var(--surface);${col?`color:${col};`:''}"
                onclick="insertMotdCode('${code}')" title="${name}">${code} ${name}</span>`).join('')}
      </div>
    </div>
  </div>`;
  for (const srv of ['lobby','survival']) {
    const r = await apiFetch(`/api/servers/${srv}/motd`);
    const d = r?.ok ? await r.json() : null;
    const el = document.getElementById(`motd-${srv}`);
    if (el) el.value = d?.motd || '';
  }
}

function insertMotdCode(code) {
  const focused = document.activeElement;
  if (focused && (focused.id==='motd-lobby'||focused.id==='motd-survival')) {
    const s = focused.selectionStart, e = focused.selectionEnd;
    focused.value = focused.value.slice(0,s) + code + focused.value.slice(e);
    focused.selectionStart = focused.selectionEnd = s + code.length;
    focused.focus();
  }
}

async function saveMotd(srv) {
  const el  = document.getElementById(`motd-${srv}`);
  const msg = document.getElementById(`motd-msg-${srv}`);
  if (!el) return;
  const r = await apiFetch(`/api/servers/${srv}/motd`, { method:'POST', body:JSON.stringify({ motd: el.value }) });
  const d = r ? await r.json() : null;
  showMsg(msg, d?.ok, d?.ok ? `✓ MOTD gespeichert (${srv})` : `✗ ${d?.error||'Fehler'}`);
  if (d?.ok) showToast(`✓ MOTD (${srv}) gespeichert`);
}

async function smashTab(tab) {
  smashLbTab = tab;
  document.querySelectorAll('#page-content .rtab').forEach(b => {
    const t = b.textContent.toLowerCase();
    b.classList.toggle('active',
      tab === 'kills'    ? t.includes('kill')    :
      tab === 'level'    ? t.includes('boss')    :
      tab === 'coins'    ? t.includes('münz')    :
      tab === 'prestige' ? t.includes('prestige') :
      tab === 'weekly'   ? t.includes('woche')   : false);
  });
  await smashLoadLb();
}

async function smashLoadLb() {

    kills:    '/api/smash/leaderboard',
    level:    '/api/smash/level-lb',
    coins:    '/api/smash/coins-lb',
    prestige: '/api/smash/prestige-lb',
    weekly:   '/api/smash/weekly-lb'

  if (!r?.ok) { el.innerHTML = '<div class="empty">Fehler beim Laden.</div>'; return; }

    el.innerHTML = '<div class="empty">Noch keine Daten vorhanden.</div>';

  if (smashLbTab === 'kills') {
    el.innerHTML = `<div class="lb-table">${data.rows.map((r,i) => `
      <div class="lb-row">

      document.getElementById('bw-table').innerHTML = '<div class="empty">Noch keine Daten.</div>';
    } else {
      let html = `<table class="sql-tbl"><thead><tr>
        <th>#</th><th>Spieler</th><th>Siege</th><th>Niederlagen</th>
        <th>Kills</th><th>Tode</th><th>K/D</th><th>Betten</th><th>Runden</th>
      </tr></thead><tbody>`;
      rows.forEach((r, i) => {
        const kd = r.deaths > 0 ? (r.kills / r.deaths).toFixed(2) : r.kills;
        const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i+1)+'.';
        html += `<tr>
          <td>${medal}</td>
          <td><b>${escH(r.name || '?')}</b></td>
          <td><span class="badge b-green">${r.wins}</span></td>
          <td><span class="badge b-red">${r.losses}</span></td>
          <td>${r.kills}</td><td>${r.deaths}</td>
          <td style="color:var(--yellow)">${kd}</td>
          <td><span class="badge b-yellow">${r.beds_broken}</span></td>
          <td>${r.games_played}</td>
        </tr>`;
      });
      html += '</tbody></table>';
      document.getElementById('bw-table').innerHTML = html;
    }
  }

  // Arenen
  const ar = await apiFetch('/api/minigames/bedwars/arenas');
  if (ar?.ok) {
    const { arenas } = await ar.json();
    if (arenas.length === 0) {
      document.getElementById('bw-arenas').innerHTML = '<div class="empty">Keine Arenen konfiguriert. Nutze <code>/bw create</code> im Minigames-Server.</div>';
    } else {
      let html = '<div style="display:flex;flex-direction:column;gap:8px">';
      for (const a of arenas) {
        const ok = a.spawns_set >= a.max_teams && a.beds_set >= a.max_teams;
        const badge = ok ? '<span class="badge b-green">✔ Bereit</span>' : '<span class="badge b-red">✗ Unvollständig</span>';
        html += `<div style="display:flex;align-items:center;gap:12px;padding:8px;background:var(--surface2);border-radius:6px">
          ${badge}
          <b>${escH(a.name)}</b>
          <span class="badge b-blue">${a.max_teams} Teams × ${a.team_size}</span>
          <span style="color:var(--muted)">Welt: ${escH(a.world)}</span>
          <span style="color:var(--muted)">Spawns: ${a.spawns_set}/${a.max_teams}</span>
          <span style="color:var(--muted)">Betten: ${a.beds_set}/${a.max_teams}</span>
          <span style="color:var(--muted)">Spawner: ${a.spawners}</span>
        </div>`;
      }
      html += '</div>';
      document.getElementById('bw-arenas').innerHTML = html;
    }
  }
}

// ── Audit-Log ────────────────────────────────────────────────────────────
const AUDIT_COLORS = {
  ban:'var(--red)', kick:'var(--yellow)', unban:'var(--green)', 'unban-ip':'var(--green)',
  rank_set:'var(--purple)', eco_give:'var(--green)', eco_take:'var(--red)', eco_set:'var(--blue)',
  quickaction:'var(--blue)', 'discord-webhook':'#7289DA'
};

async function renderAudit() {
  setHdr('📜 Audit-Log', `
    <button class="btn" onclick="renderAudit()">↺ Aktualisieren</button>
    <button class="btn" onclick="csvExportAudit()">⬇ CSV</button>
  `);
  const c = document.getElementById('page-content');
  c.innerHTML = `<div class="page">
    <div style="display:flex;gap:8px;margin-bottom:4px;flex-wrap:wrap;align-items:center">
      <input class="field fsm" id="audit-filter" placeholder="Filtern…" oninput="filterAudit()" style="width:180px">
      <span style="font-size:.82rem;color:var(--muted)" id="audit-count"></span>
    </div>
    <div style="display:flex;flex-direction:column;gap:4px" id="audit-list">
      <div class="empty">Lade…</div>
    </div>
  </div>`;
  const r = await apiFetch('/api/audit');
  if (!r?.ok) { document.getElementById('audit-list').innerHTML='<div class="empty" style="color:var(--red)">Nicht verfügbar</div>'; return; }
  const { entries } = await r.json();
  window._auditEntries = entries || [];
  renderAuditList(window._auditEntries);
}

function renderAuditList(entries) {
  const el = document.getElementById('audit-list'); if (!el) return;
  const cnt = document.getElementById('audit-count');
  if (cnt) cnt.textContent = `${entries.length} Einträge`;
  if (!entries.length) { el.innerHTML='<div class="empty">Keine Einträge</div>'; return; }
  el.innerHTML = entries.map(e => {
    const col = AUDIT_COLORS[e.action] || 'var(--muted)';
    const ts  = new Date(e.ts).toLocaleString('de-DE');
    return `<div class="audit-row" data-q="${escH((e.action+' '+e.target+' '+e.detail).toLowerCase())}">
      <span class="audit-ts">${ts}</span>
      <span class="audit-action" style="color:${col}">${escH(e.action)}</span>
      <span class="audit-target">${escH(e.target||'—')}</span>
      <span class="audit-detail">${escH(e.detail||'')}</span>
    </div>`;
  }).join('');
}

function filterAudit() {
  const q = (document.getElementById('audit-filter')?.value||'').toLowerCase().trim();
  const rows = document.querySelectorAll('#audit-list .audit-row');
  let shown = 0;
  rows.forEach(r => { const v = !q || r.dataset.q.includes(q); r.style.display = v ? '' : 'none'; if (v) shown++; });
  const cnt = document.getElementById('audit-count');
  if (cnt) cnt.textContent = q ? `${shown} / ${rows.length} Einträge` : `${rows.length} Einträge`;
}

function csvExportAudit() {
  const entries = window._auditEntries || [];
  if (!entries.length) { showToast('Keine Daten', false); return; }
  const rows = [['Zeitstempel','Aktion','Ziel','Detail'], ...entries.map(e=>[e.ts, e.action, e.target, e.detail])];
  csvDownload('audit-log.csv', rows);
}

// ── Modal ─────────────────────────────────────────────────────────────────
function showModal(title, bodyHtml, okLabel, onOk) {
  document.getElementById('active-modal')?.remove();
  const bg = document.createElement('div');
  bg.className = 'modal-bg'; bg.id = 'active-modal';
  bg.innerHTML = `
    <div class="modal-box">
      <h3>${escH(title)}</h3>
      <div id="modal-body">${bodyHtml}</div>
      <div class="modal-actions">
        <button class="btn" onclick="closeModal()">Abbrechen</button>
        <button class="btn btn-p" id="modal-ok">${escH(okLabel||'OK')}</button>
      </div>
    </div>`;
  document.body.appendChild(bg);
  document.getElementById('modal-ok').onclick = async () => { const r = onOk ? await onOk() : true; if (r !== false) closeModal(); };
  bg.addEventListener('click', e => { if(e.target===bg) closeModal(); });
  setTimeout(() => bg.querySelector('input,select')?.focus(), 50);
}
function closeModal() { document.getElementById('active-modal')?.remove(); }

// ── Toast ─────────────────────────────────────────────────────────────────
function showToast(msg, ok=true) {
  const wrap = document.getElementById('toast-wrap');
  const t = document.createElement('div');
  t.className = `toast ${ok?'toast-ok':'toast-err'}`;
  t.textContent = msg;
  wrap.appendChild(t);
  setTimeout(() => t.style.opacity='0', 2800);
  setTimeout(() => t.remove(), 3400);
}

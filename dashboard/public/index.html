<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pink Horizon – Dashboard</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f13; --surface: #1a1a24; --surface2: #1e1e2c; --border: #2a2a3a;
    --text: #e0e0f0; --muted: #6b6b8a;
    --pink: #ff69b4; --purple: #9b59b6;
    --green: #2ecc71; --red: #e74c3c; --blue: #3498db; --yellow: #f39c12;
    --font: 'Segoe UI', system-ui, sans-serif;
    --mono: 'Cascadia Code', 'Fira Code', Consolas, monospace;
    --sw: 220px; --hh: 52px;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

  /* Login */
  #login-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; }
  .lbox { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 360px; text-align: center; }
  .lbox h1 { font-size: 1.6rem; background: linear-gradient(135deg,var(--pink),var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
  .lbox p { color: var(--muted); margin-bottom: 28px; font-size: .9rem; }
  .lbox input { width: 100%; padding: 12px 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 1rem; outline: none; margin-bottom: 12px; }
  .lbox input:focus { border-color: var(--pink); }
  .lbox .lbtn { width: 100%; padding: 12px; background: linear-gradient(135deg,var(--pink),var(--purple)); border: none; border-radius: 8px; color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; }
  .lbox .lbtn:hover { opacity: .85; }
  .lerr { color: var(--red); font-size: .85rem; margin-top: 10px; display: none; }
  .hidden { display: none !important; }

  /* App */
  #app { display: flex; flex: 1; overflow: hidden; }

  /* Sidebar */
  #sidebar { width: var(--sw); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
  .nav-logo { padding: 0 16px; height: var(--hh); display: flex; align-items: center; font-size: 1rem; font-weight: 700; background: linear-gradient(135deg,var(--pink),var(--purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  #nav-body { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 2px; }
  .nav-sec { font-size: .65rem; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); padding: 10px 8px 3px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; cursor: pointer; border: 1px solid transparent; background: none; color: var(--text); font-size: .88rem; text-align: left; width: 100%; transition: background .15s; }
  .nav-item:hover { background: rgba(255,255,255,.05); }
  .nav-item.active { background: rgba(255,105,180,.1); border-color: rgba(255,105,180,.3); }
  .ndot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: var(--muted); }
  .ndot.on  { background: var(--green); box-shadow: 0 0 5px var(--green); }
  .ndot.off { background: var(--red); }
  .nav-footer { padding: 8px; border-top: 1px solid var(--border); flex-shrink: 0; }
  .logout-btn { width: 100%; padding: 8px 10px; background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px; cursor: pointer; font-size: .85rem; text-align: left; transition: all .15s; }
  .logout-btn:hover { border-color: var(--red); color: var(--red); }

  /* Main */
  #main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #page-header { height: var(--hh); display: flex; align-items: center; gap: 12px; padding: 0 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--surface); }
  #page-title { font-size: 1.1rem; font-weight: 700; flex: 1; }
  #hdr-actions { display: flex; gap: 8px; align-items: center; }
  #page-content { flex: 1; overflow-y: auto; }

  /* Buttons */
  .btn { padding: 7px 14px; border-radius: 7px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; font-size: .85rem; display: inline-flex; align-items: center; gap: 6px; transition: all .15s; white-space: nowrap; }
  .btn:hover { border-color: var(--pink); color: var(--pink); }
  .btn-d:hover { border-color: var(--red)   !important; color: var(--red)   !important; }
  .btn-s:hover { border-color: var(--green) !important; color: var(--green) !important; }
  .btn-p { background: linear-gradient(135deg,var(--pink),var(--purple)); border-color: transparent; color: #fff; font-weight: 600; }
  .btn-p:hover { opacity: .85; color: #fff; border-color: transparent; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-xs { padding: 3px 10px; border-radius: 5px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; font-size: .76rem; transition: all .15s; white-space: nowrap; }
  .btn-xs:hover { border-color: var(--red); color: var(--red); }
  .btn-xs.g:hover { border-color: var(--green); color: var(--green); }

  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .card-title { font-size: .7rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 10px; }

  /* Badges */
  .badge { font-size: .72rem; padding: 2px 10px; border-radius: 20px; display: inline-flex; align-items: center; gap: 4px; }
  .b-green  { background: rgba(46,204,113,.12); border: 1px solid rgba(46,204,113,.3); color: var(--green); }
  .b-red    { background: rgba(231,76,60,.12);  border: 1px solid rgba(231,76,60,.3);  color: var(--red); }
  .b-purple { background: rgba(155,89,182,.12); border: 1px solid rgba(155,89,182,.3); color: var(--purple); }
  .b-yellow { background: rgba(243,156,18,.12); border: 1px solid rgba(243,156,18,.3); color: var(--yellow); }

  /* Form */
  .field { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 9px 13px; color: var(--text); font-size: .9rem; outline: none; width: 100%; font-family: inherit; }
  .field:focus { border-color: var(--pink); }
  .fsm { padding: 6px 10px; font-size: .85rem; border-radius: 6px; }
  select.field { cursor: pointer; }
  .irow { display: flex; gap: 8px; align-items: center; }

  /* Msg */
  .msg { font-size: .82rem; padding: 6px 12px; border-radius: 6px; }
  .msg-ok  { background: rgba(46,204,113,.1); color: var(--green); border: 1px solid rgba(46,204,113,.3); }
  .msg-err { background: rgba(231,76,60,.1);  color: var(--red);   border: 1px solid rgba(231,76,60,.3); }

  /* Layout */
  .page { padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .g3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
  .g4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }
  @media(max-width:1000px){ .g3,.g4 { grid-template-columns: 1fr 1fr; } }
  @media(max-width:650px) { .g2,.g3,.g4 { grid-template-columns: 1fr; } }

  /* Dashboard */
  .srv-card-hdr { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .srv-card-name { font-weight: 700; font-size: 1rem; flex: 1; }
  .srv-meta { display: flex; flex-direction: column; gap: 5px; font-size: .85rem; margin-bottom: 10px; }
  .srv-row { display: flex; justify-content: space-between; }
  .srv-row span:first-child { color: var(--muted); }
  .srv-row span:last-child  { font-weight: 600; }
  .srv-actions { display: flex; gap: 6px; flex-wrap: wrap; }

  .stat-card { display: flex; align-items: center; gap: 14px; }
  .stat-icon { font-size: 1.8rem; }
  .stat-lbl  { font-size: .75rem; color: var(--muted); }
  .stat-val  { font-size: 1.5rem; font-weight: 700; }

  /* Console */
  .con-wrap  { display: flex; flex-direction: column; height: 100%; padding: 12px 16px; gap: 10px; }
  .con-out   { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; overflow-y: auto; font-family: var(--mono); font-size: .8rem; line-height: 1.55; white-space: pre-wrap; word-break: break-all; }
  .ll        { color: #c0c0d0; }
  .ll.warn   { color: var(--yellow); }
  .ll.error  { color: var(--red); }
  .ll.info   { color: #7ec8e3; }
  .ll.cmd    { color: var(--pink); }
  .con-in    { display: flex; gap: 8px; flex-shrink: 0; }
  .con-in .field { font-family: var(--mono); }

  /* Players */
  .pl-page { display: flex; flex-direction: column; height: 100%; }
  .pl-top  { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; }
  .pl-body { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 14px; }
  .chips   { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; min-height: 24px; }
  .chip-lbl { font-size: .78rem; color: var(--muted); }
  .chip { padding: 3px 12px; background: rgba(255,255,255,.06); border: 1px solid var(--border); border-radius: 20px; cursor: pointer; font-size: .82rem; color: var(--text); transition: all .15s; }
  .chip:hover { border-color: var(--pink); color: var(--pink); }
  .chip::before { content: '● '; color: var(--green); font-size: .7rem; }

  .pl-hdr { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; }
  .pl-name { font-size: 1.2rem; font-weight: 700; flex: 1; }
  .pl-acts { display: flex; gap: 6px; flex-wrap: wrap; }

  .stat-tbl { display: flex; flex-direction: column; }
  .stat-row { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,.05); font-size: .88rem; }
  .stat-row:last-child { border-bottom: none; }
  .sl { color: var(--muted); }
  .sv { font-weight: 600; }

  .coin-big { font-size: 2rem; font-weight: 700; color: var(--yellow); }
  .cbtns { display: flex; gap: 6px; }
  .cbtn { flex: 1; padding: 8px 4px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg); color: var(--text); cursor: pointer; font-size: .82rem; transition: all .15s; }
  .cbtn.give:hover { border-color: var(--green); color: var(--green); }
  .cbtn.take:hover { border-color: var(--red);   color: var(--red); }
  .cbtn.setv:hover { border-color: var(--blue);  color: var(--blue); }

  /* Economy */
  .bt-row { display: flex; align-items: center; gap: 12px; padding: 9px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
  .bt-rank { font-size: .9rem; font-weight: 700; color: var(--muted); min-width: 28px; }
  .bt-rank.gold   { color: #FFD700; }
  .bt-rank.silver { color: #C0C0C0; }
  .bt-rank.bronze { color: #CD7F32; }
  .bt-name { flex: 1; font-weight: 600; font-family: var(--mono); font-size: .9rem; cursor: pointer; }
  .bt-name:hover { color: var(--pink); }
  .bt-coins { color: var(--yellow); font-weight: 700; }

  /* Rights */
  .rtabs  { display: flex; gap: 4px; }
  .rtab   { padding: 5px 20px; border-radius: 6px 6px 0 0; border: 1px solid var(--border); border-bottom: none; background: none; color: var(--muted); cursor: pointer; font-size: .88rem; }
  .rtab.active { background: var(--bg); color: var(--text); }
  .rbody  { background: var(--bg); border: 1px solid var(--border); border-radius: 0 8px 8px 8px; padding: 16px; display: flex; flex-direction: column; gap: 20px; flex: 1; overflow-y: auto; }
  .rsec   { display: flex; flex-direction: column; gap: 8px; }
  .rhdr   { display: flex; align-items: center; gap: 10px; margin-bottom: 2px; }
  .rttl   { font-size: .78rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); flex: 1; }
  .pentries { display: flex; flex-direction: column; gap: 4px; }
  .pentry { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 7px; }
  .pentry-name { flex: 1; font-family: var(--mono); font-size: .88rem; }
  .wl-pill { font-size: .76rem; padding: 3px 10px; border-radius: 12px; }
  .wl-on  { background: rgba(46,204,113,.12); color: var(--green); border: 1px solid rgba(46,204,113,.3); }
  .wl-off { background: rgba(107,107,138,.12); color: var(--muted); border: 1px solid var(--border); }

  /* Commands */
  .cg-title { font-size: .95rem; font-weight: 700; padding: 4px 0 8px; border-bottom: 2px solid var(--border); margin-bottom: 4px; }
  .csec { display: flex; flex-direction: column; gap: 4px; }
  .csec-lbl { font-size: .7rem; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); padding: 6px 0 2px; }
  .crow { display: grid; grid-template-columns: 155px 1fr 2fr auto; align-items: center; gap: 10px; padding: 7px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 7px; font-size: .87rem; }
  .cn { font-family: var(--mono); color: var(--pink); font-weight: 600; }
  .cu { font-family: var(--mono); color: var(--muted); font-size: .78rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cd { color: var(--text); }
  .ca { font-size: .7rem; padding: 2px 8px; border-radius: 10px; background: rgba(231,76,60,.12); border: 1px solid rgba(231,76,60,.3); color: var(--red); white-space: nowrap; }
  .ch { display: none !important; }

  /* Misc */
  .empty { display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: .9rem; padding: 32px; }
  .divider { border: none; border-top: 1px solid var(--border); }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  input[type=number]::-webkit-inner-spin-button { opacity: .4; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="lbox">
    <h1>✦ Pink Horizon</h1>
    <p>Server Dashboard</p>
    <input type="password" id="pw-input" placeholder="Passwort" autocomplete="current-password">
    <button class="lbtn" onclick="login()">Einloggen</button>
    <div class="lerr" id="lerr">Falsches Passwort!</div>
  </div>
</div>

<div id="app" class="hidden">
  <nav id="sidebar">
    <div class="nav-logo">✦ Pink Horizon</div>
    <div id="nav-body"></div>
    <div class="nav-footer">
      <button class="logout-btn" onclick="logout()">⏻ Abmelden</button>
    </div>
  </nav>
  <div id="main-area">
    <header id="page-header">
      <span id="page-title"></span>
      <div id="hdr-actions"></div>
    </header>
    <main id="page-content"></main>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────
let TOKEN = localStorage.getItem('ph_token') || '';
let PAGE  = 'dashboard';
let srvData = {};
let curPlayer = null;
let rTab = 'lobby';
let rCache = {};
let ws = null;
let conSrv = null;
let cmdHist = [], histIdx = -1;
let autoScroll = true;
const logBuf = { 'ph-velocity': [], 'ph-lobby': [], 'ph-survival': [] };

// ── Auth ──────────────────────────────────────────────────────────────────
async function login() {
  const pw = document.getElementById('pw-input').value;
  const r  = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password:pw}) });
  const d  = await r.json();
  if (d.ok) {
    TOKEN = d.token; localStorage.setItem('ph_token', TOKEN);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.remove('hidden');
    init();
  } else { document.getElementById('lerr').style.display = 'block'; }
}
function logout() { localStorage.removeItem('ph_token'); location.reload(); }
document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key==='Enter') login(); });

// ── Init ──────────────────────────────────────────────────────────────────
async function init() {
  connectWs();
  await loadSrv();
  setInterval(loadSrv, 10000);
  nav('dashboard');
}

async function loadSrv() {
  const r = await apiFetch('/api/servers');
  if (!r?.ok) return;
  srvData = await r.json();
  buildNav();
}

// ── Navigation ────────────────────────────────────────────────────────────
const NAV_DEF = [
  { sec: 'Übersicht' },
  { id:'dashboard',        icon:'📊', label:'Dashboard' },
  { sec: 'Konsolen' },
  { id:'con_velocity',     dot:true,  label:'Velocity Proxy', srv:'velocity' },
  { id:'con_lobby',        dot:true,  label:'Lobby',          srv:'lobby'    },
  { id:'con_survival',     dot:true,  label:'Survival',       srv:'survival' },
  { sec: 'Verwaltung' },
  { id:'players',          icon:'👥', label:'Spieler' },
  { id:'economy',          icon:'💰', label:'Wirtschaft' },
  { id:'rights',           icon:'🔑', label:'Rechte' },
  { sec: 'Tools' },
  { id:'commands',         icon:'📋', label:'Befehlsreferenz' },
];

function buildNav() {
  const nb = document.getElementById('nav-body');
  nb.innerHTML = '';
  for (const item of NAV_DEF) {
    if (item.sec) {
      const d = document.createElement('div');
      d.className = 'nav-sec'; d.textContent = item.sec;
      nb.appendChild(d); continue;
    }
    const btn = document.createElement('button');
    btn.className = 'nav-item' + (PAGE === item.id ? ' active' : '');
    btn.onclick = () => nav(item.id);
    if (item.dot) {
      const srv = srvData[item.srv];
      btn.innerHTML = `<span class="ndot ${srv?.running?'on':'off'}"></span><span>${escH(item.label)}</span>`;
    } else {
      btn.innerHTML = `<span>${item.icon}</span><span>${escH(item.label)}</span>`;
    }
    nb.appendChild(btn);
  }
}

function nav(p) {
  PAGE = p; buildNav(); renderPage();
}

function setHdr(title, html) {
  document.getElementById('page-title').textContent = title;
  document.getElementById('hdr-actions').innerHTML = html || '';
  const c = document.getElementById('page-content');
  c.removeAttribute('style');
}

// ── Router ────────────────────────────────────────────────────────────────
function renderPage() {
  if (PAGE === 'dashboard') return renderDash();
  if (PAGE.startsWith('con_')) return renderCon(PAGE.slice(4));
  if (PAGE === 'players')  return renderPlayers();
  if (PAGE === 'economy')  return renderEcon();
  if (PAGE === 'rights')   return renderRights();
  if (PAGE === 'commands') return renderCmds();
}

// ── Dashboard ─────────────────────────────────────────────────────────────
async function renderDash() {
  setHdr('📊 Dashboard', `<button class="btn" onclick="renderDash()">↺ Aktualisieren</button>`);
  const c = document.getElementById('page-content');
  c.innerHTML = `<div class="page">
    <div class="g3" id="srv-cards"><div class="empty">Lade…</div></div>
    <div class="g4" id="stat-row"></div>
  </div>`;

  let totalOn = 0; let totalRun = 0;
  let cards = '';
  for (const [k, srv] of Object.entries(srvData)) {
    if (srv.running) totalRun++;
    let onStr = '—'; let cnt = 0;
    if (srv.rcon && srv.running) {
      try {
        const r = await apiFetch(`/api/players/online?server=${k}`);
        if (r?.ok) { const d = await r.json(); cnt = d.players?.length||0; onStr = cnt; totalOn += cnt; }
      } catch {}
    }
    const up = srv.started ? fmtUp(Date.now() - new Date(srv.started).getTime()) : '—';
    cards += `<div class="card">
      <div class="srv-card-hdr">
        <span class="srv-card-name">${escH(srv.label)}</span>
        <span class="badge ${srv.running?'b-green':'b-red'}">${escH(srv.status)}</span>
      </div>
      <div class="srv-meta">
        <div class="srv-row"><span>Spieler online</span><span>${onStr}</span></div>
        <div class="srv-row"><span>Uptime</span><span>${up}</span></div>
        <div class="srv-row"><span>Container</span><span style="font-family:var(--mono);font-size:.78rem">${escH(srv.container)}</span></div>
      </div>
      <div class="srv-actions">
        ${srv.running
          ? `<button class="btn btn-d" style="font-size:.8rem" onclick="doSrv('${k}','stop')">⏹ Stop</button>
             <button class="btn"       style="font-size:.8rem" onclick="doSrv('${k}','restart')">🔄 Restart</button>`
          : `<button class="btn btn-s" style="font-size:.8rem" onclick="doSrv('${k}','start')">▶ Start</button>`}
        <button class="btn" style="font-size:.8rem" onclick="nav('con_${k}')">🖥️ Konsole</button>
      </div>
    </div>`;
    if (!document.getElementById('srv-cards')) return;
  }
  const sc = document.getElementById('srv-cards');
  if (sc) sc.innerHTML = cards || '<div class="empty">Keine Server</div>';
  const st = document.getElementById('stat-row');
  if (st) st.innerHTML = `
    <div class="card stat-card"><span class="stat-icon">🖥️</span><div><div class="stat-lbl">Server online</div><div class="stat-val">${totalRun}/${Object.keys(srvData).length}</div></div></div>
    <div class="card stat-card"><span class="stat-icon">👥</span><div><div class="stat-lbl">Spieler online</div><div class="stat-val">${totalOn}</div></div></div>
    <div class="card stat-card" style="cursor:pointer" onclick="nav('players')"><span class="stat-icon">👤</span><div><div class="stat-lbl">Spielerverwaltung</div><div class="stat-val" style="font-size:1rem;color:var(--pink)">→ Öffnen</div></div></div>

function fmtUp(ms) {
  const m=Math.floor(ms/60000), h=Math.floor(m/60), d=Math.floor(h/24);
  return d>0?`${d}d ${h%24}h`:h>0?`${h}h ${m%60}m`:`${m}m`;
}

function renderCon(k) {
  const srv = srvData[k];
  if (!srv) { document.getElementById('page-content').innerHTML='<div class="empty">Server nicht gefunden</div>'; return; }
  setHdr(`🖥️ ${srv.label}`, `
    <span class="badge ${srv.running?'b-green':'b-red'}">${escH(srv.status)}</span>
    ${srv.running
      ? `<button class="btn btn-d" onclick="doSrv('${k}','stop')">⏹ Stop</button>
         <button class="btn"       onclick="doSrv('${k}','restart')">🔄 Restart</button>`
      : `<button class="btn btn-s" onclick="doSrv('${k}','start')">▶ Start</button>`}`);
  const c = document.getElementById('page-content');
  c.style.cssText = 'display:flex;flex-direction:column;overflow:hidden;';
  c.innerHTML = `<div class="con-wrap">
    <div class="con-out" id="con-out"></div>
    <div class="con-in">
      <input class="field" id="cmd-in" placeholder="Befehl eingeben…" ${!srv.rcon?'disabled':''}>
      <button class="btn btn-p" onclick="sendCmd('${k}')">Senden</button>
    </div>
  </div>`;
  // replay buffer
  const out = document.getElementById('con-out');
  for (const line of (logBuf[srv.container]||[])) addLine(out, line, false);
  if (autoScroll && out) out.scrollTop = out.scrollHeight;
  document.getElementById('cmd-in')?.addEventListener('keydown', e => {
    if (e.key==='Enter') sendCmd(k);
    if (e.key==='ArrowUp')   { histIdx=Math.min(histIdx+1,cmdHist.length-1); e.target.value=cmdHist[histIdx]||''; }
    if (e.key==='ArrowDown') { histIdx=Math.max(histIdx-1,-1); e.target.value=cmdHist[histIdx]||''; }
  });
  out?.addEventListener('scroll', ()=>{ autoScroll = out.scrollTop+out.clientHeight >= out.scrollHeight-20; });
  subscribeLog(srv.container);
}

async function sendCmd(k) {
  const el = document.getElementById('cmd-in');
  const cmd = el?.value?.trim(); if (!cmd) return;
  el.value = ''; cmdHist.unshift(cmd); histIdx = -1;
  const out = document.getElementById('con-out');
  addLine(out, `> ${cmd}`, false, 'cmd');
  const r = await apiFetch(`/api/servers/${k}/command`, { method:'POST', body:JSON.stringify({command:cmd}) });
  if (!r) return;
  const d = await r.json();
  if (d.output) addLine(out, `← ${d.output}`, false);
  if (d.error)  addLine(out, `✗ ${d.error}`,  false);
}

function addLine(out, text, buf=true, cls='') {
  if (buf && conSrv) { const b=logBuf[conSrv]||[]; b.push(text); while(b.length>500)b.shift(); logBuf[conSrv]=b; }
  if (!out) return;
  for (const line of text.split('\n')) {
    if (!line.trim()) continue;
    const d = document.createElement('div');
    d.className = 'll ' + (cls || classLine(line));
    d.textContent = line;
    out.appendChild(d);
  }
  while (out.children.length>1000) out.removeChild(out.firstChild);
  if (autoScroll) out.scrollTop = out.scrollHeight;
}

function classLine(l) {
  const s = l.toLowerCase();
  if (s.includes('error')||s.includes('exception')||s.includes('fatal')) return 'error';
  if (s.includes('warn')) return 'warn';
  if (s.includes('info')) return 'info';
  return '';
}

async function coinAct(type) {

  const amt = parseInt(document.getElementById('coin-amt')?.value);
  const msg = document.getElementById('coin-msg');
  if (!amt||amt<=0) { showMsg(msg,false,'Betrag eingeben'); return; }
  const r = await apiFetch('/api/players/action',{method:'POST',body:JSON.stringify({name:curPlayer.name,type:'eco_'+type,value:amt})});
  const d = r?await r.json():null;
  showMsg(msg, d?.ok, d?.output||d?.error||'Fehler');
  if (d?.ok) {
    const r2 = await apiFetch('/api/players/info',{method:'POST',body:JSON.stringify({name:curPlayer.name})});
    if (r2?.ok) { curPlayer=await r2.json(); const el=document.getElementById('coin-disp'); if(el) el.textContent=curPlayer.coins.toLocaleString('de-DE'); }
  }
}

async function doRank() {
  if (!curPlayer) return;
  const rank = document.getElementById('rank-sel')?.value;
  const msg  = document.getElementById('rank-msg');
  const r = await apiFetch('/api/players/action',{method:'POST',body:JSON.stringify({name:curPlayer.name,type:'rank_set',rank})});
  const d = r?await r.json():null;
  if (msg) { msg.textContent=(d?.ok?'✓ ':'✗ ')+(d?.output||d?.error||'Fehler'); msg.style.color=d?.ok?'var(--green)':'var(--red)'; setTimeout(()=>{msg.textContent='';},4000); }
  if (d?.ok) curPlayer.rank = rank;

async function doBan(name) {

async function loadR(srv) {
  const [or, wr] = await Promise.all([apiFetch(`/api/servers/${srv}/ops`), apiFetch(`/api/servers/${srv}/whitelist`)]);
  const od = or?.ok?await or.json():{ops:[]};
  const wd = wr?.ok?await wr.json():{whitelist:[],enabled:false};
  rCache[srv] = { ops:od.ops||[], wl:wd.whitelist||[], wlOn:!!wd.enabled };
  renderRBody(srv);
}

function renderRBody(srv) {
  const el = document.getElementById('rbody'); if (!el) return;

    : '<div style="color:var(--muted);font-size:.85rem;padding:4px">Keine Operatoren</div>';
  const wlRows = d.wl.length
    ? d.wl.map(w=>`<div class="pentry"><span class="pentry-name">${escH(w.name||w)}</span><button class="btn-xs" onclick="rWlRm('${srv}','${escH(w.name||w)}')">Entfernen</button></div>`).join('')
    : '<div style="color:var(--muted);font-size:.85rem;padding:4px">Whitelist ist leer</div>';
  el.innerHTML = `

      <div class="pentries">${opRows}</div>
      <div class="irow" style="margin-top:4px">
        <input class="field fsm" id="op-in" placeholder="Spielername…" onkeydown="if(event.key==='Enter')rOp('${srv}')">

    </div>
    <hr class="divider">
    <div class="rsec">
      <div class="rhdr">
        <span class="rttl">📋 Whitelist</span>
        <span class="wl-pill ${d.wlOn?'wl-on':'wl-off'}">${d.wlOn?'AN':'AUS'}</span>

function renderCmds() {
  setHdr('📋 Befehlsreferenz', `<input class="field fsm" id="cmd-q" placeholder="Suchen…" oninput="filterCmds()" style="width:200px">`);
  document.getElementById('page-content').innerHTML = `<div class="page" id="cmd-page">${buildCmdHtml('')}</div>`;
}
function filterCmds() {
  const q=(document.getElementById('cmd-q')?.value||'').toLowerCase();
  const p=document.getElementById('cmd-page'); if(p) p.innerHTML=buildCmdHtml(q);
}
function buildCmdHtml(q) {
  let html='';
  for (const grp of CMD_DATA) {
    let gH=''; let gV=false;
    for (const sec of grp.sections) {
      let sH=''; let sV=false;
      for (const cmd of sec.cmds) {
        const show=!q||cmd.n.toLowerCase().includes(q)||cmd.d.toLowerCase().includes(q)||cmd.u.toLowerCase().includes(q);
        if(show){sV=true;gV=true;}
        sH+=`<div class="crow${show?'':' ch'}"><span class="cn">${escH(cmd.n)}</span><span class="cu">${escH(cmd.u)}</span><span class="cd">${escH(cmd.d)}</span>${cmd.admin?'<span class="ca">Admin</span>':'<span></span>'}</div>`;
      }
      gH+=`<div class="csec${sV?'':' ch'}"><div class="csec-lbl">${escH(sec.label)}</div>${sH}</div>`;
    }
    html+=`<div${gV?'':' class="ch"'}><div class="cg-title">${escH(grp.server)}</div>${gH}</div>`;
  }
  return html||'<div class="empty">Keine Befehle gefunden</div>';
}

// ── WebSocket ─────────────────────────────────────────────────────────────
function connectWs() {
  const proto = location.protocol==='https:'?'wss':'ws';
  ws = new WebSocket(`${proto}://${location.host}`);
  ws.onopen = ()=>{
    ws.send(JSON.stringify({type:'auth',token:TOKEN}));
    if(conSrv) ws.send(JSON.stringify({type:'subscribe',container:conSrv}));
  };
  ws.onmessage = e=>{
    const msg=JSON.parse(e.data);
    if(msg.type==='log') {
      const cnt=msg.server;
      const buf=logBuf[cnt]||[];
      for(const line of msg.text.split('\n')) { if(line.trim()){buf.push(line);} }
      while(buf.length>500)buf.shift();
      logBuf[cnt]=buf;
      if(conSrv===cnt) {
        const out=document.getElementById('con-out');
        if(out) {
          for(const line of msg.text.split('\n')) {
            if(!line.trim()) continue;
            const d=document.createElement('div');
            d.className='ll '+classLine(line); d.textContent=line;
            out.appendChild(d);
          }
          while(out.children.length>1000) out.removeChild(out.firstChild);
          if(autoScroll) out.scrollTop=out.scrollHeight;
        }
      }
    }
  };
  ws.onclose = ()=>setTimeout(connectWs,3000);
}

function subscribeLog(cnt) {
  conSrv=cnt;
  if(ws?.readyState===1) ws.send(JSON.stringify({type:'subscribe',container:cnt}));
}

// ── Helpers ───────────────────────────────────────────────────────────────
function showMsg(el,ok,msg) {
  if(!el) return;
  el.textContent=msg; el.className='msg '+(ok?'msg-ok':'msg-err'); el.style.display='block';
  setTimeout(()=>{el.style.display='none';},5000);
}
function escH(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
async function apiFetch(url,opts={}) {
  try { return await fetch(url,{...opts,headers:{'Content-Type':'application/json','x-dashboard-token':TOKEN,...(opts.headers||{})}}); }
  catch { return null; }
}

  init();
